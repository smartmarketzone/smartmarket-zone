<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartMarket - Admin Nacional</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffeb3b; --neon-blue: #00e5ff; --danger: #ff5252; --bg: #050a0e; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; }
        
        /* HEADER ADMIN */
        .admin-header { background: linear-gradient(90deg, #0f2027, #203a43); padding: 20px; border-bottom: 2px solid var(--neon-blue); display: flex; justify-content: space-between; align-items: center; }
        .admin-header h1 { font-size: 18px; font-weight: 900; color: var(--neon-blue); margin: 0; }
        .badge-admin { background: var(--gold); color: black; padding: 4px 10px; border-radius: 5px; font-size: 10px; font-weight: 900; }

        /* DASHBOARD GRID */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
        .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(0,229,255,0.2); padding: 20px; border-radius: 15px; text-align: center; }
        .stat-card h2 { font-size: 28px; margin: 0; color: var(--gold); }
        .stat-card p { font-size: 10px; opacity: 0.6; margin: 5px 0 0; text-transform: uppercase; font-weight: 700; }

        /* TABLA DE GESTIÓN */
        .admin-container { padding: 0 20px 100px; }
        .section-title { font-size: 14px; font-weight: 900; margin: 20px 0; border-left: 4px solid var(--neon-blue); padding-left: 10px; }
        
        table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.02); border-radius: 10px; overflow: hidden; font-size: 12px; }
        th { background: rgba(0,229,255,0.1); color: var(--neon-blue); padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .status { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; }
        .status-comercio { background: #4caf50; color: white; }
        .status-persona { background: #2196f3; color: white; }

        .btn-del { background: var(--danger); border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>

<div class="admin-header">
    <h1>SMARTMARKET <span style="color:white">VENEZUELA</span></h1>
    <div class="badge-admin">MASTER ADMIN</div>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <h2 id="count-usuarios">0</h2>
        <p>Usuarios</p>
    </div>
    <div class="stat-card">
        <h2 id="count-comercios">0</h2>
        <p>Comercios</p>
    </div>
    <div class="stat-card">
        <h2 id="count-productos">0</h2>
        <p>Productos</p>
    </div>
</div>

<div class="admin-container">
    <div class="section-title">USUARIOS REGISTRADOS RECIENTEMENTE</div>
    <table>
        <thead>
            <tr>
                <th>NOMBRE</th>
                <th>CORREO</th>
                <th>TIPO</th>
                <th>ACCIÓN</th>
            </tr>
        </thead>
        <tbody id="tabla-usuarios">
            </tbody>
    </table>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Solo tú deberías entrar aquí. 
    // Podríamos añadir una validación de "admin@smartmarket.com" luego.

    async function cargarMétricas() {
        // Cargar contadores
        const userSnap = await db.collection("usuarios").get();
        document.getElementById('count-usuarios').innerText = userSnap.size;

        const comercioSnap = await db.collection("comercios").get();
        document.getElementById('count-comercios').innerText = comercioSnap.size;

        const prodSnap = await db.collection("productos").get();
        document.getElementById('count-productos').innerText = prodSnap.size;

        // Cargar Tabla
        const tabla = document.getElementById('tabla-usuarios');
        tabla.innerHTML = "";
        userSnap.forEach(doc => {
            const u = doc.data();
            tabla.innerHTML += `
                <tr>
                    <td><b>${u.nombre.toUpperCase()}</b></td>
                    <td>${u.email}</td>
                    <td><span class="status status-${u.tipo}">${u.tipo.toUpperCase()}</span></td>
                    <td><button class="btn-del" onclick="eliminarUsuario('${doc.id}')">BAN</button></td>
                </tr>
            `;
        });
    }

    async function eliminarUsuario(id) {
        if(confirm("¿Estás seguro de banear a este usuario? Se perderán sus datos.")) {
            await db.collection("usuarios").doc(id).delete();
            cargarMétricas();
        }
    }

    window.onload = cargarMétricas;
</script>
</body>
</html>
