<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>

<style>
body{font-family:Arial;background:#0f2027;color:white;margin:0}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#162a33;
padding:10px;
border-radius:10px;
}

img{
width:100%;
height:100px;
object-fit:cover;
}

.price{color:yellow;font-weight:bold}
.low{background:red;padding:3px;border-radius:5px}
</style>
</head>

<body>

<h2 style="text-align:center">CATÁLOGO</h2>

<div class="grid" id="lista"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
apiKey:"AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
authDomain:"smartmarket-zone-e7559.firebaseapp.com",
projectId:"smartmarket-zone-e7559"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function cargar(){

const snap = await db.collection("productos").get();

const lista = document.getElementById("lista");

snap.forEach(doc=>{
const p = doc.data();

const low = p.stock <= 5 ? "low" : "";

lista.innerHTML += `
<div class="card">
<img src="${p.imagen || 'https://via.placeholder.com/150'}">
<h4>${p.nombre}</h4>
<div class="price">Bs. ${p.precio}</div>
<div class="${low}">Stock: ${p.stock}</div>
</div>
`;
});

}

cargar();
</script>

</body>
</html>
