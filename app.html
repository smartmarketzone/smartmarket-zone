<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartMarket | App</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Outfit', sans-serif; }

.hero {
    background: linear-gradient(135deg,#1a73e8,#00d2ff);
    color:white;
    padding:60px;
    text-align:center;
}

.badge { margin-top:10px; }

button {
    margin-top:20px;
    padding:10px;
    border:none;
    background:red;
    color:white;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="hero">
    <h1>SmartMarket</h1>
    <div class="badge" id="city">Detectando ubicación...</div>
</div>

<div style="text-align:center;">
    <button onclick="logout()">Cerrar sesión</button>
</div>

<!-- ✅ FIREBASE UNIFICADO (v8 como todo tu proyecto) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
  authDomain: "smartmarket-zone-e7559.firebaseapp.com",
  projectId: "smartmarket-zone-e7559"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const db = firebase.firestore();

/* 🔐 CONTROL REAL DE SESIÓN (SOLO FIREBASE) */
firebase.auth().onAuthStateChanged(function(user) {

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    db.collection("usuarios").doc(user.uid).get()
    .then((doc) => {

        if (doc.exists && doc.data().tipo === "persona") {
            window.location.href = "cliente.html";
        } 
        else if (doc.exists && doc.data().tipo === "comercio") {
            window.location.href = "comercio.html";
        } 
        else {
            window.location.href = "selection.html";
        }

    });

});

/* 🌍 GEOLOCALIZACIÓN (IGUAL PERO MÁS ROBUSTO) */
function detectar(){
    const city = document.getElementById("city");

    if(!navigator.geolocation){
        city.innerText = "SmartMarket";
        return;
    }

    navigator.geolocation.getCurrentPosition(async pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        try{
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
            const data = await res.json();

            city.innerText =
                data.address.city ||
                data.address.town ||
                data.address.state ||
                "Tu zona";
        }catch{
            city.innerText = "SmartMarket";
        }
    }, () => {
        city.innerText = "SmartMarket";
    });
}

/* 🔒 LOGOUT LIMPIO */
function logout(){
    firebase.auth().signOut().then(()=>{
        window.location.href = "login.html";
    });
}

window.onload = detectar;
</script>

</body>
</html>
