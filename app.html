<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartMarket App</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Outfit', sans-serif;
    background:white;
}

.hero {
    background:linear-gradient(135deg,#1a73e8,#00d2ff);
    color:white;
    padding:60px;
    text-align:center;
}

.badge {
    margin-top:10px;
}

button {
    margin-top:20px;
    padding:10px;
    border:none;
    background:red;
    color:white;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="hero">
    <h1>SmartMarket</h1>
    <div class="badge" id="city">Detectando ubicación...</div>
</div>

<div style="text-align:center;">
    <button onclick="logout()">Cerrar sesión</button>
</div>

<script>

// PROTEGER ACCESO
if(localStorage.getItem("usuarioLogueado") !== "true"){
    window.location.href = "auth.html";
}

// GEOLOCALIZACIÓN
function detectar(){
    const city = document.getElementById("city");

    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(async pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            try{
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                const data = await res.json();

                city.innerHTML = data.address.city || data.address.state || "Venezuela";
            }catch{
                city.innerHTML = "Venezuela";
            }
        });
    }
}

// LOGOUT
function logout(){
    localStorage.removeItem("usuarioLogueado");
    window.location.href = "index.html";
}

window.onload = detectar;

</script>

</body>
</html>
