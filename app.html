<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartMarket | App</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Outfit', sans-serif; }

.hero {
    background: linear-gradient(135deg,#1a73e8,#00d2ff);
    color:white;
    padding:60px;
    text-align:center;
}

.badge {
    margin-top:10px;
}

button {
    margin-top:20px;
    padding:10px;
    border:none;
    background:red;
    color:white;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="hero">
    <h1>SmartMarket</h1>
    <div class="badge" id="city">Detectando ubicación...</div>
</div>

<div style="text-align:center;">
    <button onclick="logout()">Cerrar sesión</button>
</div>

<!-- 🔥 FIREBASE (AGREGADO) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
  authDomain: "smartmarket-zone-e7559.firebaseapp.com",
  projectId: "smartmarket-zone-e7559"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

/* 🔐 CONTROL DE LOGIN + REDIRECCIÓN POR TIPO */
if(localStorage.getItem("usuarioLogueado") !== "true"){
    window.location.href = "auth.html";
} else {

    firebase.auth().onAuthStateChanged(function(user) {
        if (user) {
            firebase.firestore().collection("usuarios").doc(user.uid).get()
            .then((doc) => {

                if (doc.exists && doc.data().tipo === "persona") {
                    window.location.href = "cliente.html";
                } 
                else if (doc.exists && doc.data().tipo === "comercio") {
                    window.location.href = "comercio.html";
                } 
                else {
                    window.location.href = "seleccion.html";
                }

            });
        }
    });

}

/* GEOLOCALIZACIÓN (NO SE TOCA) */
function detectar(){
    const city = document.getElementById("city");

    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(async pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            try{
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                const data = await res.json();

                city.innerHTML = data.address.city || data.address.state || "Venezuela";
            }catch{
                city.innerHTML = "Venezuela";
            }
        });
    }
}

/* LOGOUT */
function logout(){
    localStorage.removeItem("usuarioLogueado");
    firebase.auth().signOut().then(()=>{
        window.location.href = "index.html";
    });
}

window.onload = detectar;
</script>

</body>
</html>
