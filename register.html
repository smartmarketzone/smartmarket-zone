<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro SmartMarket</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="card">
    <h1 class="logo">Smart<span>Market</span></h1>
    <p>Crear cuenta nueva</p>

    <form id="formRegistro">
        <input type="email" name="email" placeholder="Correo electrónico" required>
        <input type="password" name="password" placeholder="Contraseña (6+ caracteres)" required>
        
        <button type="submit" class="btn-primary" id="btnAccion">
            REGISTRARSE
        </button>
    </form>
    
    <p style="margin-top:20px; font-size:14px;">
        <a href="login.html" style="color:#1e88e5;">Ya tengo cuenta</a>
    </p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    // Tu configuración (Verificada)
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    // EL TRUCO FINAL: FormData
    document.getElementById('formRegistro').addEventListener('submit', function(e) {
        e.preventDefault(); // Detiene el refresco de página

        const datos = new FormData(this);
        const email = datos.get('email').trim();
        const password = datos.get('password').trim();

        // Si esto sale, es que el navegador leyó bien los campos
        console.log("Datos listos:", email);

        if (!email || !password) {
            alert("El navegador no logra leer los datos. Por favor, limpia el historial (Caché).");
            return;
        }

        const boton = document.getElementById('btnAccion');
        boton.innerText = "Cargando...";
        boton.disabled = true;

        firebase.auth().createUserWithEmailAndPassword(email, password)
            .then(() => {
                alert("¡Cuenta creada!");
                window.location.href = "tipo.html";
            })
            .catch((error) => {
                boton.innerText = "REGISTRARSE";
                boton.disabled = false;
                alert("Error de Firebase: " + error.message);
            });
    });
</script>

</body>
</html>
