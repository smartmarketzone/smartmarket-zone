<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico SmartMarket</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="card">
    <h1 class="logo">Smart<span>Market</span></h1>
    <p>Prueba de Registro</p>

    <input type="email" id="testEmail" placeholder="Correo electrónico">
    <input type="password" id="testPass" placeholder="Contraseña">

    <button type="button" class="btn-primary" onclick="probarRegistro()">
        REGISTRARSE AHORA
    </button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    function probarRegistro() {
        // Capturamos los datos
        const correo = document.getElementById("testEmail").value.trim();
        const clave = document.getElementById("testPass").value.trim();

        // --- DIAGNÓSTICO ---
        // Esto nos dirá qué está leyendo el navegador realmente
        alert("El navegador leyó esto:\nCorreo: [" + correo + "]\nClave: [" + clave + "]");

        if (correo === "" || clave === "") {
            alert("❌ Error: El navegador dice que los campos están vacíos.");
            return;
        }

        if (clave.length < 6) {
            alert("❌ La clave debe tener al menos 6 caracteres.");
            return;
        }

        // Si pasó las pruebas, intentamos Firebase
        firebase.auth().createUserWithEmailAndPassword(correo, clave)
            .then(() => {
                alert("✅ ¡ÉXITO! Cuenta creada.");
                window.location.href = "tipo.html";
            })
            .catch((error) => {
                alert("❌ ERROR DE FIREBASE: " + error.message);
            });
    }
</script>

</body>
</html>
