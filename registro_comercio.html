<!DOCTYPE html>
<html>
<head>
<title>Registro Comercio</title>
<link rel="stylesheet" href="style.css">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
.container{
display:flex;
height:100vh;
}

.form{
width:30%;
padding:20px;
background:#f4f4f4;
}

#map{
width:70%;
height:100%;
}
</style>
</head>

<body>

<div class="container">

<div class="form">
<h2>Datos del Comercio</h2>

<input id="nombreComercio" placeholder="Nombre del comercio">
<input id="direccion" placeholder="Dirección">

<p>Selecciona tu ubicación:</p>

<button onclick="guardarComercio()">Guardar y continuar</button>
</div>

<div id="map"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
authDomain: "smartmarket-zone-e7559.firebaseapp.com",
projectId: "smartmarket-zone-e7559"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// MAPA
let map = L.map('map').setView([10.162, -68.007], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '© OpenStreetMap'
}).addTo(map);

let marcador;
let lat = null;
let lng = null;

// CLICK EN MAPA
map.on('click', function(e){

lat = e.latlng.lat;
lng = e.latlng.lng;

if(marcador){
map.removeLayer(marcador);
}

marcador = L.marker([lat, lng]).addTo(map);
});

// GUARDAR
function guardarComercio(){

let nombre = document.getElementById("nombreComercio").value;
let direccion = document.getElementById("direccion").value;
let user = firebase.auth().currentUser;

if(!lat || !lng){
alert("Selecciona ubicación en el mapa");
return;
}

db.collection("comercios").doc(user.uid).set({
nombre: nombre,
direccion: direccion,
lat: lat,
lng: lng
})
.then(()=>{
window.location.href = "comercio.html";
})
.catch(()=>{
alert("Error al guardar");
});

}
</script>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</body>
</html>
