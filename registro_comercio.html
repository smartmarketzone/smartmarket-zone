<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMarket - Registro Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif;
            background: linear-gradient(rgba(15, 32, 39, 0.85), rgba(30, 136, 229, 0.75)), 
                        url('https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-attachment: fixed;
            color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; padding: 25px; width: 90%; max-width: 450px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); margin: 20px; box-sizing: border-box;
        }

        h2 { font-weight: 900; text-align: center; color: #4fc3f7; margin-bottom: 20px; font-size: 20px; text-transform: uppercase; }

        .input-group { margin-bottom: 12px; text-align: left; }
        label { display: block; font-size: 10px; margin-bottom: 4px; opacity: 0.8; text-transform: uppercase; font-weight: bold; }
        
        input, select, textarea {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 10px; color: white; box-sizing: border-box; outline: none; font-family: 'Montserrat';
        }

        .row { display: flex; gap: 10px; margin-bottom: 12px; }
        .row div { flex: 1; }

        /* CONTENEDOR DE MAPA - IMPORTANTE EL HEIGHT */
        .map-container { 
            position: relative; 
            margin: 10px 0; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 2px solid #1e88e5;
            height: 220px; /* Forzamos altura */
            background: #222; /* Fondo mientras carga */
        }
        #map { height: 100%; width: 100%; z-index: 1; }
        
        .btn-gps {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: #ffffff; color: #1e88e5; border: none; border-radius: 50%;
            width: 40px; height: 40px; cursor: pointer; font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center;
        }

        .btn-save {
            width: 100%; background: #1e88e5; color: white; border: none;
            padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>CONFIGURAR COMERCIO 🏪</h2>
    
    <div class="input-group">
        <label>Nombre del Negocio</label>
        <input type="text" id="nombreNegocio" placeholder="Ej: Bodega El Éxito">
    </div>

    <div class="row">
        <div class="input-group">
            <label>Apertura</label>
            <input type="time" id="abre" value="08:00">
        </div>
        <div class="input-group">
            <label>Cierre</label>
            <input type="time" id="cierra" value="18:00">
        </div>
    </div>

    <div class="input-group">
        <label>Dirección (Manual o por Mapa)</label>
        <textarea id="direccionNegocio" rows="2" placeholder="Se llenará al tocar el mapa..."></textarea>
    </div>

    <div class="input-group">
        <label>Ubicación en Mapa</label>
        <div class="map-container">
            <div id="map"></div>
            <button class="btn-gps" onclick="usarGPS()" title="Ubicación Actual">🎯</button>
        </div>
    </div>

    <button class="btn-save" id="btnFinalizar" onclick="guardarComercio()">Guardar y Continuar</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let lat = 10.2461, lng = -67.5958;
    let map, marker;

    // INICIALIZACIÓN SEGURA DEL MAPA
    function initMap() {
        map = L.map('map', {
            zoomControl: false // Opcional para móviles más limpio
        }).setView([lat, lng], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        marker = L.marker([lat, lng], {draggable: true}).addTo(map);

        // EL TRUCO: Refrescar el tamaño después de un instante
        setTimeout(() => {
            map.invalidateSize();
        }, 400);

        map.on('click', (e) => {
            marker.setLatLng(e.latlng);
            lat = e.latlng.lat; lng = e.latlng.lng;
            actualizarDireccion(lat, lng);
        });
    }

    // Ejecutar al cargar
    window.onload = initMap;

    async function actualizarDireccion(l, g) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${l}&lon=${g}`);
            const data = await res.json();
            if (data.display_name) document.getElementById('direccionNegocio').value = data.display_name;
        } catch (e) { console.error(e); }
    }

    function usarGPS() {
        if (!navigator.geolocation) return alert("GPS no disponible");
        navigator.geolocation.getCurrentPosition((pos) => {
            lat = pos.coords.latitude; lng = pos.coords.longitude;
            map.flyTo([lat, lng], 18);
            marker.setLatLng([lat, lng]);
            actualizarDireccion(lat, lng);
        }, () => alert("Activa el GPS"));
    }

    function guardarComercio() {
        const nombre = document.getElementById('nombreNegocio').value.trim();
        const direccion = document.getElementById('direccionNegocio').value.trim();
        const abre = document.getElementById('abre').value;
        const cierra = document.getElementById('cierra').value;
        const user = firebase.auth().currentUser;

        if (!user || !nombre || !direccion) return alert("Completa los datos");

        document.getElementById('btnFinalizar').innerText = "GUARDANDO...";
        
        db.collection("comercios").doc(user.uid).set({
            nombre, direccion, abre, cierra, lat, lng,
            uid: user.uid,
            fecha: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            alert("¡Negocio registrado!");
            window.location.href = "comercio.html";
        }).catch(e => {
            alert("Error: " + e.message);
            document.getElementById('btnFinalizar').innerText = "Guardar y Continuar";
        });
    }
</script>

</body>
</html>
