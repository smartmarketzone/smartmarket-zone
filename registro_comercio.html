<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMarket - Registrar Comercio</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif;
            background: linear-gradient(rgba(15, 32, 39, 0.85), rgba(30, 136, 229, 0.75)), 
                        url('https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-attachment: fixed;
            color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px;
            padding: 25px; width: 90%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            margin: 20px; box-sizing: border-box;
        }

        h2 { font-weight: 900; text-align: center; margin-bottom: 20px; color: #4fc3f7; font-size: 22px; }

        .input-group { margin-bottom: 12px; text-align: left; }
        label { display: block; font-size: 11px; margin-bottom: 5px; opacity: 0.9; text-transform: uppercase; font-weight: bold; }
        
        input, select {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 12px; color: white; box-sizing: border-box; outline: none; font-family: 'Montserrat';
        }

        /* DISEÑO DEL MAPA */
        #map {
            height: 200px; width: 100%; border-radius: 15px;
            margin: 15px 0; border: 2px solid #1e88e5;
            z-index: 1; /* Evita que el mapa se encime a otros elementos */
        }

        .btn-save {
            width: 100%; background: #1e88e5; color: white; border: none;
            padding: 16px; border-radius: 12px; font-weight: 900; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(30, 136, 229, 0.3);
        }
        .btn-save:active { transform: scale(0.96); }

        .info-map { font-size: 10px; text-align: center; color: #ffca28; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>REGISTRAR NEGOCIO 🏪</h2>
    
    <div class="input-group">
        <label>Nombre de tu empresa</label>
        <input type="text" id="nombreNegocio" placeholder="Ej: Supermarket Central">
    </div>

    <div class="input-group">
        <label>Categoría</label>
        <select id="categoriaNegocio">
            <option value="viveres">Víveres / Alimentos</option>
            <option value="restaurante">Restaurante / Comida rápida</option>
            <option value="tecnologia">Electrónica / Tecnología</option>
            <option value="ropa">Ropa / Moda</option>
            <option value="farmacia">Farmacia / Salud</option>
            <option value="otro">Otros servicios</option>
        </select>
    </div>

    <div class="input-group">
        <label>Ubicación (Toca el mapa)</label>
        <p class="info-map">📍 TOCA EL PUNTO EXACTO DE TU LOCAL</p>
        <div id="map"></div>
    </div>

    <button class="btn-save" id="btnFinalizar" onclick="guardarComercio()">Guardar y Continuar</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    // Configuración Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Inicializar Mapa (Coordenadas por defecto)
    let lat = 10.2461; 
    let lng = -67.5958;

    const map = L.map('map').setView([lat, lng], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let marker = L.marker([lat, lng], {draggable: true}).addTo(map);

    map.on('click', function(e) {
        marker.setLatLng(e.latlng);
        lat = e.latlng.lat;
        lng = e.latlng.lng;
    });

    function guardarComercio() {
        const nombre = document.getElementById('nombreNegocio').value.trim();
        const cat = document.getElementById('categoriaNegocio').value;
        const user = firebase.auth().currentUser;

        if (!user) { alert("⚠️ Sesión expirada. Vuelve a entrar."); return; }
        if (!nombre) { alert("⚠️ Por favor, pon un nombre."); return; }

        const btn = document.getElementById('btnFinalizar');
        btn.innerText = "PROCESANDO...";
        btn.disabled = true;

        db.collection("comercios").doc(user.uid).set({
            nombre: nombre,
            categoria: cat,
            lat: lat,
            lng: lng,
            uid: user.uid,
            email: user.email,
            fechaRegistro: firebase.firestore.FieldValue.serverTimestamp()
        })
        .then(() => {
            alert("✅ ¡Registro exitoso!");
            window.location.href = "comercio.html";
        })
        .catch(e => {
            alert("❌ Error: " + e.message);
            btn.innerText = "Guardar y Continuar";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
