<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMarket - Registrar Comercio</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif;
            background: linear-gradient(rgba(15, 32, 39, 0.85), rgba(30, 136, 229, 0.75)), 
                        url('https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-attachment: fixed;
            color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px;
            padding: 25px; width: 90%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            margin: 20px; box-sizing: border-box; text-align: center;
        }

        h2 { font-weight: 900; margin-bottom: 20px; color: #4fc3f7; font-size: 22px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 11px; margin-bottom: 5px; opacity: 0.9; text-transform: uppercase; font-weight: bold; }
        
        input, select, textarea {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 12px; color: white; box-sizing: border-box; outline: none; font-family: 'Montserrat';
        }

        #map {
            height: 200px; width: 100%; border-radius: 15px;
            margin: 10px 0; border: 2px solid #1e88e5;
        }

        .btn-save {
            width: 100%; background: #1e88e5; color: white; border: none;
            padding: 16px; border-radius: 12px; font-weight: 900; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(30, 136, 229, 0.3); margin-top: 10px;
        }
        .btn-save:active { transform: scale(0.96); }

        .status-map { font-size: 10px; color: #ffca28; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>MI NEGOCIO 🏪</h2>
    
    <div class="input-group">
        <label>Nombre Comercial</label>
        <input type="text" id="nombreNegocio" placeholder="Ej: Tienda de Gabo">
    </div>

    <div class="input-group">
        <label>Categoría</label>
        <select id="categoriaNegocio">
            <option value="viveres">Víveres / Alimentos</option>
            <option value="restaurante">Comida rápida</option>
            <option value="tecnologia">Tecnología</option>
            <option value="ropa">Ropa / Moda</option>
        </select>
    </div>

    <div class="input-group">
        <label>Dirección Física</label>
        <textarea id="direccionNegocio" rows="2" placeholder="Escribe tu dirección o toca el mapa..."></textarea>
    </div>

    <div class="input-group">
        <label>Ubicación en Mapa</label>
        <div id="map"></div>
        <div class="status-map" id="statusMap">📍 Toca el mapa para fijar dirección</div>
    </div>

    <button class="btn-save" id="btnFinalizar" onclick="guardarComercio()">Finalizar Registro</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Coordenadas iniciales (Venezuela por defecto, puedes ajustarlas)
    let lat = 10.2461; 
    let lng = -67.5958;

    const map = L.map('map').setView([lat, lng], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let marker = L.marker([lat, lng], {draggable: true}).addTo(map);

    // FUNCIÓN PARA OBTENER DIRECCIÓN POR COORDENADAS (Reverse Geocoding)
    async function obtenerDireccion(lat, lng) {
        document.getElementById('statusMap').innerText = "🔍 Buscando dirección...";
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
            const data = await response.json();
            if (data.display_name) {
                document.getElementById('direccionNegocio').value = data.display_name;
                document.getElementById('statusMap').innerText = "✅ Ubicación fijada";
            }
        } catch (error) {
            console.error("Error al obtener dirección:", error);
            document.getElementById('direccionNegocio').value = `Lat: ${lat.toFixed(5)}, Lng: ${lng.toFixed(5)}`;
            document.getElementById('statusMap').innerText = "📍 Coordenadas fijadas";
        }
    }

    // Evento al tocar el mapa
    map.on('click', function(e) {
        marker.setLatLng(e.latlng);
        lat = e.latlng.lat;
        lng = e.latlng.lng;
        obtenerDireccion(lat, lng); // <--- Aquí ocurre la magia
    });

    // Evento al arrastrar el marcador
    marker.on('dragend', function(e) {
        const position = marker.getLatLng();
        lat = position.lat;
        lng = position.lng;
        obtenerDireccion(lat, lng);
    });

    function guardarComercio() {
        const nombre = document.getElementById('nombreNegocio').value.trim();
        const cat = document.getElementById('categoriaNegocio').value;
        const direccion = document.getElementById('direccionNegocio').value.trim();
        const user = firebase.auth().currentUser;

        if (!user) { alert("⚠️ Inicia sesión"); return; }
        if (!nombre || !direccion) { alert("⚠️ Completa nombre y dirección"); return; }

        const btn = document.getElementById('btnFinalizar');
        btn.innerText = "GUARDANDO...";
        btn.disabled = true;

        db.collection("comercios").doc(user.uid).set({
            nombre: nombre,
            categoria: cat,
            direccion: direccion,
            lat: lat,
            lng: lng,
            uid: user.uid,
            email: user.email,
            fecha: firebase.firestore.FieldValue.serverTimestamp()
        })
        .then(() => {
            alert("✅ ¡Negocio registrado con éxito!");
            window.location.href = "comercio.html";
        })
        .catch(e => {
            alert("❌ Error: " + e.message);
            btn.innerText = "Finalizar Registro";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
