<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMarket - Registro Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif;
            background: linear-gradient(rgba(15, 32, 39, 0.85), rgba(30, 136, 229, 0.75)), 
                        url('https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-attachment: fixed;
            color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; padding: 25px; width: 90%; max-width: 450px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); margin: 20px; box-sizing: border-box;
        }

        h2 { font-weight: 900; text-align: center; color: #4fc3f7; margin-bottom: 20px; font-size: 20px; text-transform: uppercase; }

        .input-group { margin-bottom: 12px; text-align: left; }
        label { display: block; font-size: 10px; margin-bottom: 4px; opacity: 0.8; text-transform: uppercase; font-weight: bold; }
        
        input, select, textarea {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 10px; color: white; box-sizing: border-box; outline: none; font-family: 'Montserrat';
        }

        /* DISEÑO DE HORARIOS EN FILA */
        .horarios-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .horarios-row div { flex: 1; }

        /* DISEÑO DEL MAPA Y BOTÓN GPS */
        .map-container { position: relative; margin: 10px 0; border-radius: 12px; overflow: hidden; border: 2px solid #1e88e5; }
        #map { height: 200px; width: 100%; z-index: 1; }
        
        .btn-gps {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: #ffffff; color: #1e88e5; border: none; border-radius: 50%;
            width: 40px; height: 40px; cursor: pointer; font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .btn-gps:active { transform: scale(0.9); background: #4fc3f7; color: white; }

        .btn-save {
            width: 100%; background: #1e88e5; color: white; border: none;
            padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; margin-top: 15px;
            box-shadow: 0 5px 15px rgba(30, 136, 229, 0.4);
        }
        .btn-save:active { transform: scale(0.96); }

        .info-gps { font-size: 10px; color: #ffca28; text-align: center; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>REGISTRO DE COMERCIO 🏪</h2>
    
    <div class="input-group">
        <label>Nombre del Negocio</label>
        <input type="text" id="nombreNegocio" placeholder="Ej: Super Market La Bendición">
    </div>

    <div class="horarios-row">
        <div class="input-group">
            <label>Apertura</label>
            <input type="time" id="horaAbre" value="08:00">
        </div>
        <div class="input-group">
            <label>Cierre</label>
            <input type="time" id="horaCierra" value="18:00">
        </div>
    </div>

    <div class="input-group">
        <label>Dirección Física (Se llena al usar el mapa)</label>
        <textarea id="direccionNegocio" rows="2" placeholder
