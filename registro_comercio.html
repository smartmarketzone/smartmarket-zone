<!DOCTYPE html>
<html>
<head>
<title>Registro Comercio</title>
<link rel="stylesheet" href="style.css">
<style>
.container{
display:flex;
height:100vh;
}

.form{
width:30%;
padding:20px;
background:#f4f4f4;
}

#map{
width:70%;
height:100%;
}
</style>
</head>

<body>

<div class="container">

<div class="form">
<h2>Datos del Comercio</h2>

<input id="nombreComercio" placeholder="Nombre del comercio">
<input id="direccion" placeholder="Dirección">

<p>Selecciona tu ubicación:</p>

<button onclick="guardarComercio()">Guardar y continuar</button>
</div>

<div id="map"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
authDomain: "smartmarket-zone-e7559.firebaseapp.com",
projectId: "smartmarket-zone-e7559"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let marcador;
let lat = null;
let lng = null;

function initMap(){
const map = new google.maps.Map(document.getElementById("map"), {
center: {lat: 10.162, lng: -68.007},
zoom: 12
});

map.addListener("click", function(e){
lat = e.latLng.lat();
lng = e.latLng.lng();

if(marcador) marcador.setMap(null);

marcador = new google.maps.Marker({
position: e.latLng,
map: map
});
});
}

function guardarComercio(){

let nombre = document.getElementById("nombreComercio").value;
let direccion = document.getElementById("direccion").value;
let user = firebase.auth().currentUser;

if(!lat || !lng){
alert("Selecciona ubicación en el mapa");
return;
}

db.collection("comercios").doc(user.uid).set({
nombre: nombre,
direccion: direccion,
lat: lat,
lng: lng
})
.then(()=>{
window.location.href = "comercio.html";
})
.catch(()=>{
alert("Error al guardar");
});

}
</script>

<!-- Google Maps -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAc5Bi2EWeROBesJTqczCUJemmsquLMStw&callback=initMap">
</script>

</body>
</html>
