<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMarket - Registrar Comercio</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif;
            background: linear-gradient(rgba(15, 32, 39, 0.85), rgba(30, 136, 229, 0.75)), 
                        url('https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-attachment: fixed;
            color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px;
            padding: 25px; width: 90%; max-width: 500px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            margin: 20px 0;
        }

        h2 { font-weight: 900; text-align: center; margin-bottom: 20px; color: #4fc3f7; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; opacity: 0.9; }
        input, select, textarea {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 12px; color: white; box-sizing: border-box; outline: none;
        }

        /* DISEÑO DEL MAPA */
        #map {
            height: 250px; width: 100%; border-radius: 15px;
            margin: 15px 0; border: 2px solid #1e88e5;
        }

        .btn-save {
            width: 100%; background: #1e88e5; color: white; border: none;
            padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-save:active { transform: scale(0.97); }

        .info-map { font-size: 11px; text-align: center; color: #ffca28; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Mi Comercio 🏪</h2>
    
    <div class="input-group">
        <label>Nombre del Negocio</label>
        <input type="text" id="nombreNegocio" placeholder="Ej: Panadería El Sol">
    </div>

    <div class="input-group">
        <label>Categoría</label>
        <select id="categoriaNegocio">
            <option value="comida">Comida / Restaurante</option>
            <option value="ropa">Ropa y Calzado</option>
            <option value="tecnologia">Tecnología</option>
            <option value="servicios">Servicios</option>
            <option value="otros">Otros</option>
        </select>
    </div>

    <label>Ubicación exacta (Toca el mapa)</label>
    <p class="info-map">Mueve el mapa y toca donde está tu local</p>
    <div id="map"></div>

    <button class="btn-save" onclick="guardarComercio()">Finalizar Registro</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    // 1. Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. Inicializar Mapa (Centrado en una posición inicial)
    let lat = 10.2461; // Coordenadas iniciales (puedes ajustarlas a tu ciudad)
    let lng = -67.5958;

    const map = L.map('map').setView([lat, lng], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let marker = L.marker([lat, lng], {draggable: true}).addTo(map);

    // Actualizar coordenadas al hacer clic
    map.on('click', function(e) {
        marker.setLatLng(e.latlng);
        lat = e.latlng.lat;
        lng = e.latlng.lng;
    });

    // 3. Guardar datos
    function guardarComercio() {
        const nombre = document.getElementById('nombreNegocio').value;
        const cat = document.getElementById('categoriaNegocio').value;
        const user = firebase.auth().currentUser;

        if (!user) { alert("Inicia sesión primero"); return; }
        if (!nombre) { alert("Ponle un nombre a tu negocio"); return; }

        const btn = document.querySelector('.btn-save');
        btn.innerText = "Guardando...";
        btn.disabled = true;

        db.collection("comercios").doc(user.uid).set({
            nombre: nombre,
            categoria: cat,
            ubicacion: new firebase.firestore.GeoPoint(lat, lng),
            uid: user.uid,
            ownerEmail: user.email
        }).then(() => {
            alert("¡Negocio registrado con éxito!");
            window.location.href = "comercio.html";
        }).catch(e => {
            alert("Error al guardar: " + e.message);
            btn.innerText = "Finalizar Registro";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
