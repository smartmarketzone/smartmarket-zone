<script>
const firebaseConfig = {
apiKey:"AIzaSy...",
authDomain:"smartmarket-zone-e7559.firebaseapp.com",
projectId:"smartmarket-zone-e7559"
};

if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let map;
let marker;
let mapReady = false; // 🔧 evita múltiples ejecuciones

/* AUTH */
firebase.auth().onAuthStateChanged(user=>{
if(!user){
    location.href="login.html";
    return;
}

// 🔧 CORRECCIÓN: evita que se ejecute varias veces
if(mapReady) return;
mapReady = true;

initMap();
});

/* MAPA */
function initMap(){
map = L.map('map').setView([10.48,-66.90],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

map.on('click', async function(e){
    colocarMarcador(e.latlng);
    obtenerDireccion(e.latlng.lat, e.latlng.lng);
});
}

/* MARCADOR */
function colocarMarcador(latlng){
if(marker) map.removeLayer(marker);
marker = L.marker(latlng).addTo(map);
}

/* GPS */
function detectarUbicacion(){
navigator.geolocation.getCurrentPosition(pos=>{
const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

const latlng = {lat:lat,lng:lng};

map.setView(latlng,15);
colocarMarcador(latlng);
obtenerDireccion(lat,lng);

});
}

/* DIRECCIÓN */
async function obtenerDireccion(lat,lng){
try{
const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
const data = await res.json();

direccion.value = data.display_name || "";
}catch{
direccion.value = "";
}
}

/* GUARDAR */
function guardarUbicacion(){
const user = firebase.auth().currentUser;

if(!marker) return alert("Selecciona ubicación");

const latlng = marker.getLatLng();

db.collection("usuarios").doc(user.uid).set({
ubicacion: {
    lat: latlng.lat,
    lng: latlng.lng
},
direccion: direccion.value || ""
},{merge:true})
.then(()=>{
location.href="comercio.html";
});
}
</script>
