<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Comercio</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root { --blue:#1e88e5; --dark:#0f2027; --yellow:#ffeb3b; --red:#f44336; }

body {
    margin:0;
    font-family:'Montserrat', sans-serif;
    background:var(--dark);
    color:white;
    padding-bottom:80px;
}

/* HEADER */
.header {
    text-align:center;
    padding:20px;
    border-bottom:2px solid var(--blue);
}

.header h1 { margin:0; }

/* FORM */
.card {
    margin:15px;
    padding:20px;
    border-radius:15px;
    background:#162a33;
}

input {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:none;
    border-radius:10px;
}

button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--blue);
    color:white;
    font-weight:900;
}

/* PRODUCTOS */
.lista { padding:15px; }

.prod {
    background:#162a33;
    padding:15px;
    border-radius:15px;
    margin-bottom:10px;
}

.low { border-left:5px solid var(--red); }

img {
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:10px;
}

.price { color:var(--yellow); font-weight:900; }

.actions {
    display:flex;
    gap:10px;
    margin-top:10px;
}

.actions button { flex:1; }
</style>
</head>

<body>

<div class="header">
    <h1>MI INVENTARIO</h1>
</div>

<div class="card">
    <input type="hidden" id="prodID">

    <input type="text" id="pNombre" placeholder="Nombre producto">
    <input type="number" id="pPrecio" placeholder="Precio">
    <input type="number" id="pStock" placeholder="Stock">
    <input type="file" id="pImagen">

    <button onclick="guardar()">GUARDAR PRODUCTO</button>
</div>

<div class="lista" id="lista"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
    authDomain: "smartmarket-zone-e7559.firebaseapp.com",
    projectId: "smartmarket-zone-e7559"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

let uid = "";

/* LOGIN */
firebase.auth().onAuthStateChanged(user=>{
    if(user){
        uid = user.uid;
        cargar();
    } else {
        window.location.href="auth.html";
    }
});

/* GUARDAR */
async function guardar(){

    const id = document.getElementById("prodID").value;
    const nombre = document.getElementById("pNombre").value;
    const precio = parseFloat(document.getElementById("pPrecio").value);
    const stock = parseInt(document.getElementById("pStock").value);
    const file = document.getElementById("pImagen").files[0];

    if(!nombre || isNaN(precio)) return alert("Completa datos");

    let imagen = "";

    if(file){
        const ref = storage.ref("productos/" + Date.now());
        await ref.put(file);
        imagen = await ref.getDownloadURL();
    }

    const datos = {
        nombre,
        precio,
        stock,
        comercioID: uid,
        imagen
    };

    if(id){
        await db.collection("productos").doc(id).update(datos);
    } else {
        await db.collection("productos").add(datos);
    }

    limpiar();
}

/* CARGAR */
function cargar(){
    db.collection("productos")
    .where("comercioID","==",uid)
    .onSnapshot(snap=>{
        const lista = document.getElementById("lista");
        lista.innerHTML="";

        snap.forEach(doc=>{
            const p = doc.data();

            const low = p.stock <= 5 ? "low" : "";

            lista.innerHTML += `
            <div class="prod ${low}">
                <img src="${p.imagen || 'https://via.placeholder.com/150'}">

                <h3>${p.nombre}</h3>
                <div class="price">Bs. ${p.precio}</div>
                <small>Stock: ${p.stock}</small>

                <div class="actions">
                    <button onclick="editar('${doc.id}','${p.nombre}',${p.precio},${p.stock})">
                        EDITAR
                    </button>
                    <button onclick="borrar('${doc.id}')">
                        BORRAR
                    </button>
                </div>
            </div>`;
        });
    });
}

/* EDITAR */
function editar(id,n,p,s){
    document.getElementById("prodID").value=id;
    document.getElementById("pNombre").value=n;
    document.getElementById("pPrecio").value=p;
    document.getElementById("pStock").value=s;
}

/* BORRAR */
function borrar(id){
    if(confirm("¿Eliminar producto?")){
        db.collection("productos").doc(id).delete();
    }
}

/* LIMPIAR */
function limpiar(){
    document.getElementById("prodID").value="";
    document.getElementById("pNombre").value="";
    document.getElementById("pPrecio").value="";
    document.getElementById("pStock").value="";
    document.getElementById("pImagen").value="";
}
</script>

</body>
</html>
