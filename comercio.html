<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMarket - Gestión Total</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif;
            background: linear-gradient(rgba(15, 32, 39, 0.85), rgba(30, 136, 229, 0.75)), 
                        url('https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-attachment: fixed; color: white;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header { width: 100%; padding: 20px; text-align: center; }
        .header h1 { font-weight: 900; font-size: 22px; color: #4fc3f7; margin: 0; }

        .card-form {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px; padding: 20px; width: 90%; max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); margin-bottom: 25px;
        }

        .input-group { margin-bottom: 12px; text-align: left; }
        label { display: block; font-size: 10px; margin-bottom: 4px; opacity: 0.8; font-weight: bold; text-transform: uppercase; }
        
        input, textarea {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 12px; color: white; box-sizing: border-box; outline: none; font-family: 'Montserrat';
        }

        .flex-row { display: flex; gap: 10px; }
        .flex-row div { flex: 1; }

        .price-box { position: relative; }
        .price-box span { position: absolute; left: 10px; top: 11px; font-weight: 900; color: #4fc3f7; }
        .price-box input { padding-left: 35px; color: #ffeb3b; font-weight: 900; }

        .btn-add {
            width: 100%; background: #1e88e5; color: white; border: none;
            padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; margin-top: 10px; box-shadow: 0 5px 15px rgba(30, 136, 229, 0.4);
        }

        /* LISTA DE PRODUCTOS */
        .products-container { width: 92%; max-width: 480px; padding-bottom: 40px; }
        
        .item-card {
            background: rgba(0, 0, 0, 0.5); border-radius: 18px; padding: 15px;
            margin-bottom: 15px; border-left: 4px solid #4fc3f7;
            display: flex; flex-direction: column; gap: 10px;
        }

        .item-main { display: flex; justify-content: space-between; align-items: flex-start; }
        .item-info h3 { margin: 0; font-size: 16px; color: #4fc3f7; }
        .item-info p { margin: 3px 0; font-size: 11px; opacity: 0.6; }

        .stock-tag {
            font-size: 9px; font-weight: 900; padding: 3px 8px; border-radius: 5px;
            text-transform: uppercase; display: inline-block; margin-top: 5px;
        }
        .stock-high { background: #4caf50; }
        .stock-low { background: #ff9800; }
        .stock-empty { background: #f44336; }

        .item-price { text-align: right; font-weight: 900; color: #ffeb3b; font-size: 18px; }

        /* BOTONES DE ACCIÓN */
        .item-actions {
            display: flex; justify-content: flex-end; gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;
        }
        .btn-action {
            background: rgba(255,255,255,0.1); border: none; color: white;
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
            display: flex; align-items: center; gap: 5px; transition: 0.3s;
        }
        .btn-edit:hover { background: #1e88e5; }
        .btn-delete:hover { background: #f44336; }

    </style>
</head>
<body>

<div class="header">
    <h1 id="nombreLocal">MI NEGOCIO</h1>
    <p style="font-size: 10px;">GESTIÓN DE INVENTARIO</p>
</div>

<div class="card-form">
    <input type="hidden" id="editID"> <div class="input-group">
        <label>Producto</label>
        <input type="text" id="nombreP" placeholder="Ej: Harina Pan">
    </div>

    <div class="flex-row">
        <div class="input-group">
            <label>Precio (Bs.)</label>
            <div class="price-box"><span>Bs</span><input type="number" id="precioP" step="0.01"></div>
        </div>
        <div class="input-group">
            <label>Stock</label>
            <input type="number" id="stockP" placeholder="Cant.">
        </div>
    </div>

    <div class="input-group">
        <label>Descripción</label>
        <input type="text" id="descP">
    </div>

    <button class="btn-add" id="btnGuardar" onclick="guardarProducto()">Publicar Producto</button>
</div>

<div class="products-container" id="lista"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let myUID = "";

    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            myUID = user.uid;
            db.collection("comercios").doc(myUID).get().then(doc => {
                if(doc.exists) document.getElementById('nombreLocal').innerText = doc.data().nombre;
            });
            mostrarProductos();
        } else { window.location.href = "auth.html"; }
    });

    function guardarProducto() {
        const id = document.getElementById('editID').value;
        const data = {
            comercioID: myUID,
            nombre: document.getElementById('nombreP').value,
            precio: parseFloat(document.getElementById('precioP').value),
            stock: parseInt(document.getElementById('stockP').value),
            descripcion: document.getElementById('descP').value,
            fecha: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(!data.nombre || isNaN(data.precio)) return alert("Datos incompletos");

        if(id) {
            // EDITAR
            db.collection("productos").doc(id).update(data).then(() => limpiar());
        } else {
            // NUEVO
            db.collection("productos").add(data).then(() => limpiar());
        }
    }

    function limpiar() {
        document.getElementById('editID').value = "";
        document.getElementById('nombreP').value = "";
        document.getElementById('precioP').value = "";
        document.getElementById('stockP').value = "";
        document.getElementById('descP').value = "";
        document.getElementById('btnGuardar').innerText = "Publicar Producto";
    }

    function editar(id, n, p, s, d) {
        document.getElementById('editID').value = id;
        document.getElementById('nombreP').value = n;
        document.getElementById('precioP').value = p;
        document.getElementById('stockP').value = s;
        document.getElementById('descP').value = d;
        document.getElementById('btnGuardar').innerText = "Actualizar Cambios";
        window.scrollTo(0,0);
    }

    function eliminar(id) {
        if(confirm("¿Seguro que quieres borrar este producto?")) {
            db.collection("productos").doc(id).delete();
        }
    }

    function mostrarProductos() {
        db.collection("productos").where("comercioID", "==", myUID)
        .onSnapshot(snap => {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                const id = doc.id;
                let c = p.stock > 5 ? 'stock-high' : (p.stock > 0 ? 'stock-low' : 'stock-empty');
                
                lista.innerHTML += `
                    <div class="item-card">
                        <div class="item-main">
                            <div class="item-info">
                                <h3>${p.nombre}</h3>
                                <p>${p.descripcion}</p>
                                <span class="stock-tag ${c}">Stock: ${p.stock}</span>
                            </div>
                            <div class="item-price">Bs. ${p.precio.toLocaleString('es-VE')}</div>
                        </div>
                        <div class="item-actions">
                            <button class="btn-action btn-edit" onclick="editar('${id}','${p.nombre}',${p.precio},${p.stock},'${p.descripcion}')">✏️ Editar</button>
                            <button class="btn-action btn-delete" onclick="eliminar('${id}')">🗑️ Borrar</button>
                        </div>
                    </div>`;
            });
        });
    }
</script>
</body>
</html>
