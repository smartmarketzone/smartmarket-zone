<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMarket - Mi Panel de Comercio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif;
            background: linear-gradient(rgba(15, 32, 39, 0.9), rgba(30, 136, 229, 0.85)), 
                        url('https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-attachment: fixed; color: white;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* HEADER CON BOTÓN SALIR */
        .header { 
            width: 100%; padding: 30px 0; text-align: center; position: relative;
            background: rgba(0,0,0,0.2); backdrop-filter: blur(5px);
        }
        .header h1 { font-weight: 900; font-size: 24px; color: #4fc3f7; margin: 0; text-transform: uppercase; }
        .user-info { font-size: 9px; color: #ffeb3b; font-weight: 700; margin-top: 5px; opacity: 0.8; }
        
        .btn-logout {
            position: absolute; top: 15px; right: 15px; 
            background: rgba(244, 67, 54, 0.2); border: 1px solid #f44336; 
            color: #f44336; padding: 6px 12px; border-radius: 8px; 
            font-size: 10px; font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .btn-logout:hover { background: #f44336; color: white; }

        /* FORMULARIO */
        .card-form {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; 
            padding: 20px; width: 90%; max-width: 450px; margin: 20px 0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 10px; margin-bottom: 5px; font-weight: 900; color: #4fc3f7; text-transform: uppercase; }
        
        input, textarea {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 12px; color: white; box-sizing: border-box; outline: none; font-family: 'Montserrat';
        }

        .flex-row { display: flex; gap: 10px; }
        .flex-row div { flex: 1; }

        /* PRECIO CON BS FUERA */
        .price-wrapper { position: relative; display: flex; align-items: center; }
        .price-tag { position: absolute; left: 12px; font-weight: 900; color: #4fc3f7; pointer-events: none; }
        .price-wrapper input { padding-left: 45px; color: #ffeb3b; font-weight: 900; font-size: 18px; }

        .btn-main {
            width: 100%; background: #1e88e5; color: white; border: none;
            padding: 16px; border-radius: 12px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; transition: 0.3s; margin-top: 10px;
        }

        /* LISTADO */
        .list-header { width: 90%; max-width: 450px; margin-bottom: 10px; border-bottom: 1px solid rgba(79, 195, 247, 0.3); padding-bottom: 5px; font-weight: 900; font-size: 12px; }
        .products-list { width: 90%; max-width: 450px; padding-bottom: 100px; }
        
        .product-card {
            background: rgba(0, 0, 0, 0.6); border-radius: 15px; padding: 15px;
            margin-bottom: 12px; border-left: 4px solid #4fc3f7;
        }
        .p-name { font-size: 16px; font-weight: 900; text-transform: uppercase; display: block; }
        .p-desc { font-size: 11px; opacity: 0.6; margin: 4px 0; display: block; }
        .p-price-row { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 10px; }
        .p-price { color: #ffeb3b; font-weight: 900; font-size: 20px; }
        .p-stock { font-size: 10px; background: #4caf50; padding: 3px 8px; border-radius: 5px; font-weight: 900; }

        .actions { display: flex; gap: 8px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        .btn-sm { flex: 1; padding: 8px; border-radius: 8px; border: none; font-weight: 900; font-size: 10px; cursor: pointer; color: white; }
    </style>
</head>
<body>

<div class="header">
    <button class="btn-logout" onclick="cerrarSesion()">CERRAR SESIÓN</button>
    <h1 id="localName">CARGANDO...</h1>
    <div id="userEmail" class="user-info">...</div>
</div>

<div class="card-form">
    <input type="hidden" id="prodID">
    
    <div class="input-group">
        <label>Producto</label>
        <input type="text" id="pNombre" placeholder="Ej: PAN SALADO">
    </div>

    <div class="flex-row">
        <div class="input-group">
            <label>Precio (Bs.)</label>
            <div class="price-wrapper">
                <span class="price-tag">Bs</span>
                <input type="number" id="pPrecio" step="0.01" placeholder="0.00">
            </div>
        </div>
        <div class="input-group">
            <label>Unidades</label>
            <input type="number" id="pStock" placeholder="0">
        </div>
    </div>

    <div class="input-group">
        <label>Descripción Breve</label>
        <textarea id="pDesc" rows="2" placeholder="Ej: Recién horneado, por unidad..."></textarea>
    </div>

    <button class="btn-main" id="btnAccion" onclick="procesar()">PUBLICAR PRODUCTO</button>
</div>

<div class="list-header">📦 MI INVENTARIO PUBLICADO</div>
<div class="products-list" id="lista"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let uid = "";

    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            uid = user.uid;
            document.getElementById('userEmail').innerText = "CUENTA: " + user.email.toUpperCase();
            db.collection("comercios").doc(uid).get().then(doc => {
                if(doc.exists) document.getElementById('localName').innerText = doc.data().nombre.toUpperCase();
            });
            cargarLista();
        } else { window.location.href = "auth.html"; }
    });

    function procesar() {
        const id = document.getElementById('prodID').value;
        const nombre = document.getElementById('pNombre').value.trim();
        const precio = parseFloat(document.getElementById('pPrecio').value);
        const stock = parseInt(document.getElementById('pStock').value);
        const desc = document.getElementById('pDesc').value.trim();

        if(!nombre || isNaN(precio) || isNaN(stock)) {
            alert("⚠️ Por favor, ingresa el nombre, precio y stock correctamente.");
            return;
        }

        const datos = { 
            nombre: nombre, precio: precio, stock: stock, 
            descripcion: desc, comercioID: uid, fecha: new Date() 
        };

        if(id) {
            db.collection("productos").doc(id).update(datos).then(() => limpiar());
        } else {
            db.collection("productos").add(datos).then(() => limpiar());
        }
    }

    function cargarLista() {
        db.collection("productos").where("comercioID", "==", uid).onSnapshot(snap => {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                const id = doc.id;
                // Formateador de moneda (Coma para decimales, Punto para miles)
                const precioFormateado = new Intl.NumberFormat('de-DE', {minimumFractionDigits: 2}).format(p.precio);
                
                lista.innerHTML += `
                    <div class="product-card">
                        <span class="p-name">${p.nombre}</span>
                        <span class="p-desc">${p.descripcion}</span>
                        <div class="p-price-row">
                            <span class="p-stock">STOCK: ${p.stock}</span>
                            <span class="p-price">Bs. ${precioFormateado}</span>
                        </div>
                        <div class="actions">
                            <button class="btn-sm" style="background:#1e88e5" onclick="editar('${id}','${p.nombre}',${p.precio},${p.stock},'${p.descripcion}')">EDITAR</button>
                            <button class="btn-sm" style="background:#f44336" onclick="borrar('${id}')">BORRAR</button>
                        </div>
                    </div>`;
            });
        });
    }

    function limpiar() {
        document.getElementById('prodID').value = "";
        document.getElementById('pNombre').value = "";
        document.getElementById('pPrecio').value = "";
        document.getElementById('pStock').value = "";
        document.getElementById('pDesc').value = "";
        document.getElementById('btnAccion').innerText = "PUBLICAR PRODUCTO";
    }

    function editar(id, n, p, s, d) {
        document.getElementById('prodID').value = id;
        document.getElementById('pNombre').value = n;
        document.getElementById('pPrecio').value = p;
        document.getElementById('pStock').value = s;
        document.getElementById('pDesc').value = d;
        document.getElementById('btnAccion').innerText = "GUARDAR CAMBIOS";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function borrar(id) {
        if(confirm("¿Eliminar este producto?")) db.collection("productos").doc(id).delete();
    }

    function cerrarSesion() {
        if(confirm("¿Deseas salir del panel?")) {
            firebase.auth().signOut().then(() => window.location.href = "auth.html");
        }
    }
</script>
</body>
</html>
