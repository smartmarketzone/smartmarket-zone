<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Comercio - SmartMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --blue:#1e88e5;
    --cyan:#4fc3f7;
    --dark:#0f2027;
    --yellow:#ffeb3b;
    --red:#f44336;
    --green:#4caf50;
}

body{
    margin:0;
    font-family:'Montserrat';
    background:var(--dark);
    color:white;
}

/* HEADER */
.header{
    padding:20px;
    text-align:center;
    border-bottom:2px solid var(--cyan);
}

.header h1{margin:0;font-size:20px;color:var(--cyan);}

/* TABS */
.tabs{
    display:flex;
    margin:10px;
    gap:10px;
}

.tab{
    flex:1;
    padding:10px;
    text-align:center;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
    cursor:pointer;
}

.tab.active{
    background:var(--blue);
}

/* FORM */
.card{
    padding:15px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
    border:none;
}

/* BOTON */
.btn{
    width:100%;
    padding:12px;
    background:var(--blue);
    border:none;
    color:white;
    border-radius:10px;
    font-weight:bold;
}

/* PRODUCTOS */
.producto{
    background:rgba(255,255,255,0.05);
    padding:15px;
    margin:10px;
    border-radius:15px;
}

.stock-ok{color:var(--green);}
.stock-low{color:var(--red);}

.precio{color:var(--yellow); font-weight:bold;}

</style>
</head>

<body>

<div class="header">
    <h1 id="nombreLocal">MI COMERCIO</h1>
</div>

<div class="tabs">
    <div class="tab active" onclick="cambiarTab('inv',this)">INVENTARIO</div>
    <div class="tab" onclick="cambiarTab('cat',this)">CATÁLOGO</div>
</div>

<!-- INVENTARIO -->
<div id="inv">

<div class="card">
    <input id="nombre" placeholder="Producto">
    <input id="precio" type="number" placeholder="Precio">
    <input id="stock" type="number" placeholder="Stock">
    <button class="btn" onclick="guardar()">Guardar Producto</button>
</div>

<div id="lista"></div>

</div>

<!-- CATALOGO -->
<div id="cat" style="display:none;">
    <div id="catalogo"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
 apiKey:"AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
 authDomain:"smartmarket-zone-e7559.firebaseapp.com",
 projectId:"smartmarket-zone-e7559"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let uid="";

firebase.auth().onAuthStateChanged(user=>{
 if(!user){ location.href="auth.html"; return; }
 uid=user.uid;
 cargar();
});

function cambiarTab(tab,el){
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 el.classList.add('active');

 document.getElementById('inv').style.display = tab=="inv"?"block":"none";
 document.getElementById('cat').style.display = tab=="cat"?"block":"none";
}

function guardar(){
 const n=document.getElementById('nombre').value;
 const p=parseFloat(document.getElementById('precio').value);
 const s=parseInt(document.getElementById('stock').value);

 if(!n || !p) return alert("Completa datos");

 db.collection("productos").add({
  nombre:n,
  precio:p,
  stock:s,
  comercioID:uid
 });

 limpiar();
}

function limpiar(){
 document.getElementById('nombre').value="";
 document.getElementById('precio').value="";
 document.getElementById('stock').value="";
}

function cargar(){
 db.collection("productos").where("comercioID","==",uid)
 .onSnapshot(snap=>{

  const lista=document.getElementById('lista');
  const cat=document.getElementById('catalogo');

  lista.innerHTML="";
  cat.innerHTML="";

  snap.forEach(doc=>{
   const p=doc.data();

   const stockClass = p.stock <=5 ? "stock-low" : "stock-ok";

   lista.innerHTML+=`
    <div class="producto">
     <b>${p.nombre}</b><br>
     <span class="precio">Bs ${p.precio}</span><br>
     <span class="${stockClass}">Stock: ${p.stock}</span>
    </div>
   `;

   cat.innerHTML+=`
    <div class="producto">
     <b>${p.nombre}</b><br>
     <span class="precio">Bs ${p.precio}</span>
    </div>
   `;
  });

 });
}

</script>

</body>
</html>
