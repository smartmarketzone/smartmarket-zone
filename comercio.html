```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Comercio | SmartMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">

<!-- MAPA -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:'Outfit',sans-serif;display:flex;background:#f1f5f9;}
.sidebar{width:250px;background:#0f172a;color:white;height:100vh;padding:20px;display:flex;flex-direction:column;gap:20px;}
.menu button{width:100%;padding:12px;border:none;background:none;color:white;text-align:left;cursor:pointer;border-radius:10px;}
.menu button:hover{background:#1e293b;}
.main{flex:1;padding:30px;}
.section{display:none;}
.active{display:block;}
.card{background:white;padding:20px;border-radius:15px;margin-bottom:20px;box-shadow:0 10px 25px rgba(0,0,0,0.1);}
input{width:100%;padding:10px;margin-top:10px;border-radius:10px;border:1px solid #cbd5e1;}
button.primary{margin-top:10px;padding:10px;background:#1a73e8;color:white;border:none;border-radius:10px;cursor:pointer;}
.product{display:flex;justify-content:space-between;margin-top:10px;padding:10px;border-bottom:1px solid #e2e8f0;}
img{width:60px;height:60px;border-radius:10px;object-fit:cover;}
#map{height:400px;border-radius:15px;}
.danger{background:#ef4444;}
</style>
</head>

<body>

<div class="sidebar">
    <h2>SmartMarket</h2>
    <div class="menu">
        <button onclick="mostrar('dashboard')">📊 Dashboard</button>
        <button onclick="mostrar('productos')">📦 Productos</button>
        <button onclick="mostrar('mapaSec')">📍 Ubicación</button>
        <button onclick="mostrar('perfil')">⚙️ Perfil</button>
    </div>
    <button onclick="logout()">🔒 Cerrar sesión</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
    <div class="card">
        <h3>📊 Panel del comercio</h3>
        <p id="estadoUbicacion">Cargando ubicación...</p>
    </div>
</div>

<!-- PRODUCTOS -->
<div id="productos" class="section">
    <div class="card">
        <h3>📦 Agregar producto</h3>
        <input id="nombre" placeholder="Nombre">
        <input id="precio" placeholder="Precio (Bs)">
        <input id="categoria" placeholder="Categoría">
        <input id="descripcion" placeholder="Descripción">
        <input type="file" id="imagen">
        <button class="primary" onclick="agregarProducto()">Agregar</button>
    </div>

    <div class="card">
        <h3>Lista de productos</h3>
        <div id="lista"></div>
    </div>
</div>

<!-- MAPA -->
<div id="mapaSec" class="section">
    <div class="card">
        <h3>📍 Ubicación del negocio</h3>
        <div id="map"></div>
        <button class="primary" onclick="volver()">⬅ Volver</button>
    </div>
</div>

<!-- PERFIL -->
<div id="perfil" class="section">
    <div class="card">
        <h3>⚙️ Perfil</h3>
        <input id="negocio" placeholder="Nombre negocio">
        <input id="telefono" placeholder="Teléfono">
        <button class="primary" onclick="guardarPerfil()">Guardar</button>
    </div>

    <div class="card">
        <button class="primary danger" onclick="eliminarCuenta()">Eliminar cuenta</button>
    </div>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- MAPA -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "smartmarket-zone-e7559.firebaseapp.com",
  projectId: "smartmarket-zone-e7559"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let seccionAnterior = "dashboard";
let map, marker;

/* AUTH */
firebase.auth().onAuthStateChanged(user=>{
    if(!user) window.location.href="login.html";
    else{
        cargarProductos();
        cargarUbicacion();
    }
});

/* NAVEGACIÓN */
function mostrar(id){
    seccionAnterior = document.querySelector('.active')?.id || "dashboard";
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    if(id==="mapaSec") setTimeout(initMap,500);
}

function volver(){
    mostrar(seccionAnterior);
}

/* PRODUCTOS */
function agregarProducto(){
    const user = firebase.auth().currentUser;
    const file = imagen.files[0];

    const reader = new FileReader();
    reader.onload = function(){
        db.collection("productos").add({
            nombre:nombre.value,
            precio:precio.value,
            categoria:categoria.value,
            descripcion:descripcion.value,
            imagen: reader.result,
            dueño:user.uid
        }).then(cargarProductos);
    };

    if(file) reader.readAsDataURL(file);
}

function cargarProductos(){
    const user = firebase.auth().currentUser;
    const lista = document.getElementById("lista");
    lista.innerHTML="";

    db.collection("productos").where("dueño","==",user.uid)
    .get().then(snap=>{
        snap.forEach(doc=>{
            let p = doc.data();

            lista.innerHTML += `
            <div class="product">
                <div>
                    <img src="${p.imagen}">
                    <b>${p.nombre}</b><br>
                    ${p.descripcion}<br>
                    Bs ${p.precio}
                </div>
                <div>
                    <button onclick="editarProducto('${doc.id}')">✏️</button>
                    <button onclick="eliminarProducto('${doc.id}')">❌</button>
                </div>
            </div>`;
        });
    });
}

function eliminarProducto(id){
    db.collection("productos").doc(id).delete().then(cargarProductos);
}

function editarProducto(id){
    const n = prompt("Nombre:");
    const p = prompt("Precio Bs:");
    const d = prompt("Descripción:");

    db.collection("productos").doc(id).update({
        nombre:n,precio:p,descripcion:d
    }).then(cargarProductos);
}

/* MAPA */
function initMap(){
    if(map) return;

    map = L.map('map').setView([10.48,-66.90],13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    map.on('click',function(e){
        if(marker) map.removeLayer(marker);
        marker = L.marker(e.latlng).addTo(map);

        guardarUbicacion(e.latlng);
    });
}

function guardarUbicacion(latlng){
    const user = firebase.auth().currentUser;

    db.collection("usuarios").doc(user.uid).set({
        ubicacion: latlng
    },{merge:true});

    document.getElementById("estadoUbicacion").innerText = "📍 Ubicación guardada";
}

function cargarUbicacion(){
    const user = firebase.auth().currentUser;

    db.collection("usuarios").doc(user.uid).get()
    .then(doc=>{
        if(doc.exists && doc.data().ubicacion){
            document.getElementById("estadoUbicacion").innerText = "📍 Ubicación configurada";
        }else{
            document.getElementById("estadoUbicacion").innerText = "❌ Sin ubicación";
        }
    });
}

/* PERFIL */
function guardarPerfil(){
    const user = firebase.auth().currentUser;

    db.collection("usuarios").doc(user.uid).set({
        negocio:negocio.value,
        telefono:telefono.value,
        tipo:"comercio"
    },{merge:true});
}

/* AUTH */
function logout(){
    firebase.auth().signOut().then(()=>window.location.href="login.html");
}

function eliminarCuenta(){
    if(confirm("¿Eliminar cuenta?")){
        const user = firebase.auth().currentUser;
        db.collection("usuarios").doc(user.uid).delete();
        user.delete().then(()=>window.location.href="login.html");
    }
}
</script>

</body>
</html>
