<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartMarket | Comercio</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:'Outfit',sans-serif;display:flex;background:#f1f5f9;}

.sidebar{width:250px;background:#0f172a;color:white;height:100vh;padding:20px;}
.menu button{width:100%;padding:12px;background:none;color:white;border:none;text-align:left;cursor:pointer;border-radius:10px;}
.menu button:hover{background:#1e293b;}

.main{flex:1;padding:30px;}
.section{display:none;}
.active{display:block;}

.card{background:white;padding:20px;border-radius:15px;margin-bottom:20px;box-shadow:0 10px 25px rgba(0,0,0,0.1);}

.product{display:flex;justify-content:space-between;padding:15px;background:#f8fafc;border-radius:10px;margin-bottom:10px;}
.product:hover{background:#eef2ff;}

input{width:100%;padding:10px;margin-top:10px;border-radius:10px;border:1px solid #ccc;}
button.primary{margin-top:10px;padding:10px;background:#1a73e8;color:white;border:none;border-radius:10px;cursor:pointer;}

img{width:60px;height:60px;border-radius:10px;object-fit:cover;}
#map{height:400px;border-radius:15px;}
</style>
</head>

<body>

<div class="sidebar">
<h2>SmartMarket</h2>

<div class="menu">
<button onclick="mostrar('dashboard')">📊 Dashboard</button>
<button onclick="mostrar('productos')">📦 Productos</button>
<button onclick="mostrar('mapaSec')">📍 Ubicación</button>
<button onclick="mostrar('perfil')">⚙️ Perfil</button>
</div>

<button onclick="logout()">🔒 Cerrar sesión</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">

<div class="card">
<h3>📊 Panel</h3>
<p id="estadoUbicacion">Cargando...</p>
</div>

<div class="card">
<h3>📈 Estadísticas</h3>
<div style="display:flex;gap:20px;flex-wrap:wrap;">
<div class="card" style="flex:1;text-align:center;">
<h2 id="totalProductos">0</h2>
<p>Productos</p>
</div>

<div class="card" style="flex:1;text-align:center;">
<h2 id="totalClicks">0</h2>
<p>Interacciones</p>
</div>

<div class="card" style="flex:1;text-align:center;">
<h2 id="topProducto">-</h2>
<p>Producto TOP</p>
</div>
</div>
</div>

</div>

<!-- PRODUCTOS -->
<div id="productos" class="section">

<div class="card">
<h3>Agregar producto</h3>

<input id="nombre" placeholder="Nombre">
<input id="precio" placeholder="Precio">
<input id="categoria" placeholder="Categoría">
<input id="descripcion" placeholder="Descripción">
<input type="file" id="imagen">

<button class="primary" onclick="agregarProducto()">Agregar</button>
</div>

<div class="card">
<h3>Lista</h3>
<div id="lista"></div>
</div>

</div>

<!-- MAPA -->
<div id="mapaSec" class="section">
<div class="card">
<h3>Ubicación</h3>
<div id="map"></div>
</div>
</div>

<!-- PERFIL -->
<div id="perfil" class="section">
<div class="card">
<input id="negocio" placeholder="Nombre negocio">
<input id="telefono" placeholder="Teléfono">
<button class="primary" onclick="guardarPerfil()">Guardar</button>
</div>
</div>

</div>

<!-- FIREBASE v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const firebaseConfig = {
apiKey:"AIzaSy...",
authDomain:"smartmarket-zone-e7559.firebaseapp.com",
projectId:"smartmarket-zone-e7559"
};

if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let map;

/* AUTH */
firebase.auth().onAuthStateChanged(user=>{
if(!user) location.href="login.html";
else{
cargarProductos();
cargarUbicacion();
cargarEstadisticas();
}
});

/* NAV */
function mostrar(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
if(id==="mapaSec") setTimeout(initMap,500);
}

/* PRODUCTOS */
function agregarProducto(){
const user = firebase.auth().currentUser;

if(!nombre.value || !precio.value) return alert("Completa datos");

const reader = new FileReader();
const file = imagen.files[0];

reader.onload = ()=>{
db.collection("productos").add({
nombre:nombre.value,
precio:parseFloat(precio.value),
categoria:categoria.value || "General",
descripcion:descripcion.value,
imagen:reader.result || "",
dueño:user.uid,
clicks:0,
fecha:new Date()
}).then(()=>{
limpiar();
cargarProductos();
});
};

if(file) reader.readAsDataURL(file);
else reader.onload();
}

function limpiar(){
nombre.value="";
precio.value="";
categoria.value="";
descripcion.value="";
imagen.value="";
}

function cargarProductos(){
const user = firebase.auth().currentUser;
const lista = document.getElementById("lista");
lista.innerHTML="";

db.collection("productos").where("dueño","==",user.uid)
.get().then(snap=>{

document.getElementById("totalProductos").innerText = snap.size;

snap.forEach(doc=>{
let p = doc.data();

lista.innerHTML += `
<div class="product">
<div style="display:flex;gap:10px;">
<img src="${p.imagen || 'https://via.placeholder.com/60'}">
<div>
<b>${p.nombre}</b><br>
${p.categoria}<br>
Bs ${p.precio}<br>
👁 ${p.clicks || 0}
</div>
</div>
<div>
<button onclick="registrarClick('${doc.id}')">👁</button>
<button onclick="eliminarProducto('${doc.id}')">❌</button>
</div>
</div>`;
});

});
}

function eliminarProducto(id){
db.collection("productos").doc(id).delete().then(cargarProductos);
}

/* ANALÍTICA */
function registrarClick(id){
db.collection("productos").doc(id).update({
clicks: firebase.firestore.FieldValue.increment(1)
});
cargarEstadisticas();
}

function cargarEstadisticas(){
const user = firebase.auth().currentUser;

db.collection("productos")
.where("dueño","==",user.uid)
.orderBy("clicks","desc")
.limit(1)
.get().then(snap=>{
if(!snap.empty){
topProducto.innerText = snap.docs[0].data().nombre;
}
});

db.collection("productos")
.where("dueño","==",user.uid)
.get().then(snap=>{
let total = 0;
snap.forEach(doc=> total += doc.data().clicks || 0);
totalClicks.innerText = total;
});
}

/* MAPA */
function initMap(){
if(map) return;

map = L.map('map').setView([10.48,-66.90],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

map.on('click',e=>{
const user = firebase.auth().currentUser;
db.collection("usuarios").doc(user.uid).set({
ubicacion:e.latlng
},{merge:true});
estadoUbicacion.innerText="📍 Guardada";
});
}

/* PERFIL */
function guardarPerfil(){
const user = firebase.auth().currentUser;
db.collection("usuarios").doc(user.uid).set({
negocio:negocio.value,
telefono:telefono.value
},{merge:true});
}

/* AUTH */
function logout(){
firebase.auth().signOut().then(()=>location.href="login.html");
}
</script>

</body>
</html>
