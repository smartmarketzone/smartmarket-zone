<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Comercio - SmartMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root { --blue:#1e88e5; --cyan:#4fc3f7; --dark:#0f2027; --yellow:#ffeb3b; --red:#f44336; --green:#4caf50; }

body {
    margin:0;
    font-family:'Montserrat',sans-serif;
    background:var(--dark);
    color:white;
    padding-bottom:80px;
}

/* HEADER */
.header {
    padding:20px;
    text-align:center;
    background:linear-gradient(45deg,#1e88e5,#4fc3f7);
}

.header h1 { margin:0; font-size:20px; }

/* FORM */
.card {
    margin:15px;
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,0.05);
}

input {
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    background:var(--blue);
    color:white;
}

/* PRODUCTOS */
.lista {
    padding:15px;
}

.prod {
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
    margin-bottom:12px;
    border-left:6px solid var(--green);
}

.prod h3 { margin:0; }

.precio {
    color:var(--yellow);
    font-weight:900;
}

.stock {
    margin-top:5px;
    font-size:12px;
    font-weight:bold;
}

/* COLORES DINÁMICOS */
.stock-alto { color:var(--green); }
.stock-medio { color:var(--yellow); }
.stock-bajo { color:var(--red); }

/* BOTONES */
.actions {
    display:flex;
    gap:10px;
    margin-top:10px;
}

.actions button {
    flex:1;
    font-size:12px;
}

.btn-delete { background:var(--red); }
</style>
</head>

<body>

<div class="header">
    <h1 id="nombreLocal">Cargando...</h1>
</div>

<div class="card">
    <h3>➕ Nuevo Producto</h3>

    <input type="hidden" id="prodID">
    <input type="text" id="nombre" placeholder="Nombre del producto">
    <input type="number" id="precio" placeholder="Precio">
    <input type="number" id="stock" placeholder="Stock">

    <button onclick="guardarProducto()">Guardar Producto</button>
</div>

<div class="lista" id="lista"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
    authDomain: "smartmarket-zone-e7559.firebaseapp.com",
    projectId: "smartmarket-zone-e7559"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
let uid = "";

// 🔐 CONTROL DE SESIÓN
firebase.auth().onAuthStateChanged(async user => {
    if (!user) {
        window.location.href = "auth.html";
        return;
    }

    uid = user.uid;

    // VALIDAR QUE SEA COMERCIO
    const doc = await db.collection("usuarios").doc(uid).get();

    if (!doc.exists || doc.data().tipo !== "comercio") {
        window.location.href = "cliente.html";
        return;
    }

    // Cargar nombre del comercio
    const local = await db.collection("comercios").doc(uid).get();
    if (local.exists) {
        document.getElementById("nombreLocal").innerText = local.data().nombre;
    }

    cargarProductos();
});

// 📦 GUARDAR PRODUCTO
async function guardarProducto() {
    const id = document.getElementById("prodID").value;
    const nombre = document.getElementById("nombre").value;
    const precio = parseFloat(document.getElementById("precio").value);
    const stock = parseInt(document.getElementById("stock").value);

    if (!nombre || isNaN(precio)) {
        alert("Completa los datos");
        return;
    }

    const data = {
        nombre,
        precio,
        stock,
        comercioID: uid,
        fecha: new Date()
    };

    if (id) {
        await db.collection("productos").doc(id).update(data);
    } else {
        await db.collection("productos").add(data);
    }

    limpiar();
}

// 📊 CARGAR PRODUCTOS
function cargarProductos() {
    db.collection("productos")
    .where("comercioID","==",uid)
    .onSnapshot(snap => {

        const cont = document.getElementById("lista");
        cont.innerHTML = "";

        snap.forEach(doc => {
            const p = doc.data();

            let claseStock = "stock-alto";
            let textoStock = "Stock: " + p.stock;

            if (p.stock <= 5) {
                claseStock = "stock-bajo";
                textoStock = "⚠️ BAJO (" + p.stock + ")";
            } else if (p.stock <= 10) {
                claseStock = "stock-medio";
                textoStock = "⚠️ Medio (" + p.stock + ")";
            }

            cont.innerHTML += `
                <div class="prod">
                    <h3>${p.nombre}</h3>
                    <div class="precio">Bs. ${p.precio}</div>
                    <div class="stock ${claseStock}">${textoStock}</div>

                    <div class="actions">
                        <button onclick="editar('${doc.id}','${p.nombre}',${p.precio},${p.stock})">Editar</button>
                        <button class="btn-delete" onclick="eliminar('${doc.id}')">Eliminar</button>
                    </div>
                </div>
            `;
        });
    });
}

// ✏️ EDITAR
function editar(id,n,p,s){
    document.getElementById("prodID").value=id;
    document.getElementById("nombre").value=n;
    document.getElementById("precio").value=p;
    document.getElementById("stock").value=s;
}

// 🗑️ ELIMINAR
function eliminar(id){
    if(confirm("¿Eliminar producto?")){
        db.collection("productos").doc(id).delete();
    }
}

// 🧹 LIMPIAR
function limpiar(){
    document.getElementById("prodID").value="";
    document.getElementById("nombre").value="";
    document.getElementById("precio").value="";
    document.getElementById("stock").value="";
}
</script>

</body>
</html>
