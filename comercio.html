<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartMarket | Comercio</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Outfit',sans-serif;
    display:flex;
    background:#f1f5f9;
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:#0f172a;
    color:white;
    height:100vh;
    padding:25px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.logo{
    font-size:22px;
    font-weight:900;
    margin-bottom:20px;
}

.menu button{
    width:100%;
    padding:12px;
    background:none;
    color:#cbd5e1;
    border:none;
    text-align:left;
    cursor:pointer;
    border-radius:10px;
}

.menu button:hover{
    background:#1e293b;
    color:white;
}

.sidebar-bottom button{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.logout{background:#1e293b;color:white;}
.delete{background:#ef4444;color:white;}

/* MAIN */
.main{
    flex:1;
    padding:30px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.header h1{
    font-size:24px;
}

/* SECTIONS */
.section{display:none;}
.active{display:block;}

/* CARDS */
.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* STATS */
.stats{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.stat{
    flex:1;
    min-width:150px;
    text-align:center;
    padding:20px;
    border-radius:15px;
    background:linear-gradient(135deg,#1a73e8,#00d2ff);
    color:white;
}

/* PRODUCTOS */
.product{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    background:#f8fafc;
    border-radius:10px;
    margin-bottom:10px;
}

.product img{
    width:60px;
    height:60px;
    border-radius:10px;
    object-fit:cover;
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #e2e8f0;
}

/* BUTTONS */
button.primary{
    margin-top:10px;
    padding:12px;
    background:#1a73e8;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button.edit{
    background:#0ea5e9;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
}

button.deleteBtn{
    background:#ef4444;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
}

/* MAPA */
#map{
    height:400px;
    border-radius:15px;
}

/* DIRECCIÓN */
.direccion{
    margin-top:10px;
    font-size:14px;
    color:#64748b;
}
</style>
</head>

<body>

<div class="sidebar">
<div>
<div class="logo">SmartMarket</div>

<div class="menu">
<button onclick="mostrar('dashboard')">📊 Dashboard</button>
<button onclick="mostrar('productos')">📦 Productos</button>
<button onclick="mostrar('mapaSec')">📍 Ubicación</button>
<button onclick="mostrar('perfil')">⚙️ Perfil</button>
</div>
</div>

<div class="sidebar-bottom">
<button class="logout" onclick="logout()">Cerrar sesión</button>
<button class="delete" onclick="eliminarCuenta()">Eliminar cuenta</button>
</div>
</div>

<div class="main">

<div class="header">
<h1 id="nombreNegocio">Mi Comercio</h1>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">

<div class="card">
<p id="estadoUbicacion">Cargando ubicación...</p>
<div class="direccion" id="direccionTexto"></div>
</div>

<div class="stats">
<div class="stat">
<h2 id="totalProductos">0</h2>
<p>Productos</p>
</div>

<div class="stat">
<h2 id="totalClicks">0</h2>
<p>Interacciones</p>
</div>

<div class="stat">
<h2 id="topProducto">-</h2>
<p>Producto TOP</p>
</div>
</div>

</div>

<!-- PRODUCTOS -->
<div id="productos" class="section">

<div class="card">
<h3>Agregar / Editar producto</h3>

<input id="nombre" placeholder="Nombre">
<input id="precio" placeholder="Precio">
<input id="categoria" placeholder="Categoría">
<input id="descripcion" placeholder="Descripción">

<button class="primary" onclick="agregarProducto()">Guardar producto</button>
</div>

<div class="card">
<h3>Inventario</h3>
<div id="lista"></div>
</div>

</div>

<!-- MAPA -->
<div id="mapaSec" class="section">
<div class="card">
<div id="map"></div>
</div>
</div>

<!-- PERFIL -->
<div id="perfil" class="section">
<div class="card">
<input id="negocio" placeholder="Nombre negocio">
<input id="telefono" placeholder="Teléfono">
<button class="primary" onclick="guardarPerfil()">Guardar</button>
</div>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const firebaseConfig = {
apiKey:"AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
authDomain:"smartmarket-zone-e7559.firebaseapp.com",
projectId:"smartmarket-zone-e7559"
};

if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let map;
let editId = null;
let authReady = false;

/* 🔥 AUTH CORREGIDO SIN BUCLES */
firebase.auth().onAuthStateChanged(async (user)=>{

    if(!user){
        setTimeout(()=>{
            if(!firebase.auth().currentUser){
                window.location.href="login.html";
            }
        },500);
        return;
    }

    if(authReady) return;
    authReady = true;

    try{
        const doc = await db.collection("usuarios").doc(user.uid).get();

        if(!doc.exists){
            window.location.href="app.html";
            return;
        }

        const data = doc.data();

        if(data.tipo !== "comercio"){
            window.location.href="app.html";
            return;
        }

        if(!data.ubicacion){
            window.location.href="ubicacion.html";
            return;
        }

        nombreNegocio.innerText = data.negocio || "Mi Comercio";
        direccionTexto.innerText = data.direccion || "";
        estadoUbicacion.innerText = "📍 Ubicación activa";

        cargarProductos();
        cargarEstadisticas();

    }catch(e){
        console.error(e);
        window.location.href="app.html";
    }

});

/* NAV */
function mostrar(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
if(id==="mapaSec") setTimeout(initMap,500);
}

/* PRODUCTOS */
function agregarProducto(){
const user = firebase.auth().currentUser;

if(!nombre.value || !precio.value){
alert("Completa los datos");
return;
}

const data = {
nombre:nombre.value,
precio:parseFloat(precio.value),
categoria:categoria.value || "General",
descripcion:descripcion.value,
dueño:user.uid,
clicks:0,
fecha:new Date()
};

if(editId){
db.collection("productos").doc(editId).update(data).then(()=>{
editId=null;
limpiar();
cargarProductos();
});
}else{
db.collection("productos").add(data).then(()=>{
limpiar();
cargarProductos();
});
}
}

function editarProducto(id,p){
editId=id;
nombre.value=p.nombre;
precio.value=p.precio;
categoria.value=p.categoria;
descripcion.value=p.descripcion;
}

function limpiar(){
nombre.value="";
precio.value="";
categoria.value="";
descripcion.value="";
}

function cargarProductos(){
const user = firebase.auth().currentUser;
lista.innerHTML="";

db.collection("productos").where("dueño","==",user.uid)
.get().then(snap=>{

totalProductos.innerText = snap.size;

snap.forEach(doc=>{
let p = doc.data();

lista.innerHTML += `
<div class="product">
<div style="display:flex;gap:10px;">
<img src="https://via.placeholder.com/60">
<div>
<b>${p.nombre}</b><br>
Bs ${p.precio}
</div>
</div>
<div>
<button class="edit" onclick='editarProducto("${doc.id}", ${JSON.stringify(p)})'>✏️</button>
<button class="deleteBtn" onclick="eliminarProducto('${doc.id}')">❌</button>
</div>
</div>`;
});

});
}

function eliminarProducto(id){
db.collection("productos").doc(id).delete().then(cargarProductos);
}

/* STATS */
function cargarEstadisticas(){
const user = firebase.auth().currentUser;

db.collection("productos")
.where("dueño","==",user.uid)
.get().then(snap=>{
let total=0;
snap.forEach(d=> total+=d.data().clicks||0);
totalClicks.innerText=total;
});
}

/* MAPA */
function initMap(){
if(map) return;

map = L.map('map').setView([10.48,-66.90],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

/* PERFIL */
function guardarPerfil(){
const user = firebase.auth().currentUser;
db.collection("usuarios").doc(user.uid).set({
negocio:negocio.value,
telefono:telefono.value
},{merge:true});
}

/* CUENTA */
function logout(){
firebase.auth().signOut().then(()=>location.href="login.html");
}

function eliminarCuenta(){
if(confirm("¿Eliminar cuenta definitivamente?")){
const user = firebase.auth().currentUser;

db.collection("usuarios").doc(user.uid).delete();
user.delete().then(()=>location.href="index.html");
}
}
</script>

</body>
</html>
