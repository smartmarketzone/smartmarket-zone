<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Comercio - SmartMarket</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #1e88e5; --cyan: #4fc3f7; --dark: #050a0e; --yellow: #ffeb3b; --red: #ff5252; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; text-align: center; }
        
        /* Pantalla de diagnóstico */
        #status-box { padding: 40px 20px; display: block; }
        .loader { width: 40px; height: 40px; border: 4px solid #162a33; border-top: 4px solid var(--cyan); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Contenido de la App */
        #app-real { display: none; padding: 20px; padding-bottom: 90px; }
        .card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; text-align: left; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: white; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        
        .p-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--cyan); }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: #0b171c; display: flex; align-items: center; justify-content: space-around; border-top: 2px solid var(--cyan); }
        .nav a { color: white; text-decoration: none; font-size: 10px; font-weight: 900; }
    </style>
</head>
<body>

    <div id="status-box">
        <div class="loader" id="loading-icon"></div>
        <h2 id="status-msg">VERIFICANDO TU TIENDA...</h2>
        <p id="debug-info" style="font-size: 11px; color: var(--cyan);"></p>
        <div id="error-actions" style="display:none; margin-top: 20px;">
            <button class="btn" style="background: var(--yellow); color: black;" onclick="location.href='registro_comercio.html'">REGISTRAR MI LOCAL EN EL MAPA</button>
            <button class="btn" style="background: var(--red); color: white;" onclick="firebase.auth().signOut()">CERRAR SESIÓN</button>
        </div>
    </div>

    <div id="app-real">
        <h1 id="titular" style="color: var(--cyan); font-size: 20px;">PANEL DE CONTROL</h1>
        <p id="subtitular" style="opacity: 0.6; font-size: 12px;"></p>

        <div class="card">
            <label style="font-size: 10px; font-weight: 900; color: var(--yellow);">NUEVO PRODUCTO</label>
            <input type="text" id="pNombre" placeholder="Nombre (Ej: Harina Pan)">
            <input type="number" id="pPrecio" placeholder="Precio en Bs.">
            <button class="btn" style="background: var(--blue); color: white;" onclick="subirProducto()">PUBLICAR AHORA</button>
        </div>

        <div id="listaProductos"></div>

        <div class="nav">
            <a href="index.html">📍 MAPA</a>
            <a href="comercio.html" style="color: var(--cyan);">📊 PANEL</a>
            <a href="#" onclick="firebase.auth().signOut()">🚪 SALIR</a>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    firebase.auth().onAuthStateChanged(async (user) => {
        const msg = document.getElementById('status-msg');
        const debug = document.getElementById('debug-info');
        const actions = document.getElementById('error-actions');
        const icon = document.getElementById('loading-icon');

        if (user) {
            debug.innerText = "ID de Usuario: " + user.uid;
            
            try {
                // 1. Verificar Rol en colección USUARIOS
                const userDoc = await db.collection("usuarios").doc(user.uid).get();
                
                if (userDoc.exists && userDoc.data().tipo === "comercio") {
                    
                    // 2. Verificar si tiene local en colección COMERCIOS
                    const storeDoc = await db.collection("comercios").doc(user.uid).get();
                    
                    if (storeDoc.exists) {
                        // TODO OK: Es comercio y tiene local
                        document.getElementById('status-box').style.display = 'none';
                        document.getElementById('app-real').style.display = 'block';
                        document.getElementById('titular').innerText = storeDoc.data().nombre.toUpperCase();
                        document.getElementById('subtitular').innerText = user.email;
                        cargarProductos(user.uid);
                    } else {
                        // ERROR: Es comercio pero no ha registrado el local en el mapa
                        icon.style.display = 'none';
                        msg.innerText = "¡PERFIL DETECTADO, PERO NO TIENES LOCAL!";
                        debug.innerText = "Tu cuenta es de comercio, pero debes registrar tu ubicación en el mapa para vender.";
                        actions.style.display = 'block';
                    }

                } else {
                    // ERROR: No es tipo comercio
                    icon.style.display = 'none';
                    msg.innerText = "ACCESO DENEGADO";
                    debug.innerText = "Tu cuenta está registrada como CLIENTE. No puedes entrar al panel de ventas.";
                    setTimeout(() => { window.location.href = "index.html"; }, 4000);
                }
            } catch (e) {
                msg.innerText = "ERROR DE CONEXIÓN";
                debug.innerText = e.message;
            }
        } else {
            window.location.href = "auth.html";
        }
    });

    async function subirProducto() {
        const n = document.getElementById('pNombre').value;
        const p = parseFloat(document.getElementById('pPrecio').value);
        const uid = firebase.auth().currentUser.uid;
        if(!n || !p) return alert("Llena los campos");

        await db.collection("productos").add({
            nombre: n, precio: p, comercioID: uid, fecha: new Date()
        });
        alert("¡Producto en línea!");
        document.getElementById('pNombre').value = "";
        document.getElementById('pPrecio').value = "";
    }

    function cargarProductos(uid) {
        db.collection("productos").where("comercioID", "==", uid).onSnapshot(snap => {
            const list = document.getElementById('listaProductos');
            list.innerHTML = "";
            snap.forEach(doc => {
                const item = doc.data();
                list.innerHTML += `<div class="p-item">
                    <span><b>${item.nombre}</b> - Bs. ${item.precio}</span>
                    <button onclick="db.collection('productos').doc('${doc.id}').delete()" style="color:var(--red); background:none; border:none; font-weight:900;">ELIMINAR</button>
                </div>`;
            });
        });
    }
</script>
</body>
</html>
