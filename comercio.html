<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Comercio - SmartMarket VZLA</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #1e88e5; --cyan: #4fc3f7; --dark: #050a0e; --yellow: #ffeb3b; --red: #ff5252; --card: rgba(255,255,255,0.05); }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; padding-bottom: 90px; }
        
        .header { background: #0b171c; padding: 25px; text-align: center; border-bottom: 2px solid var(--cyan); }
        .header h1 { margin: 0; font-size: 20px; color: var(--cyan); text-transform: uppercase; letter-spacing: 1px; }

        .tabs { display: flex; padding: 10px; gap: 10px; background: rgba(0,0,0,0.3); }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 11px; font-weight: 900; cursor: pointer; border-radius: 10px; background: var(--card); opacity: 0.5; }
        .tab.active { background: var(--blue); opacity: 1; color: white; }

        .content { padding: 20px; display: none; }
        .content.active { display: block; animation: fadeIn 0.4s; }

        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 900; color: var(--cyan); margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: white; outline: none; box-sizing: border-box; font-family: 'Montserrat'; }
        
        .btn-main { width: 100%; background: var(--blue); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
        
        /* Lista de Productos */
        .p-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid var(--cyan); display: flex; justify-content: space-between; align-items: center; }
        .p-info h3 { margin: 0; font-size: 14px; text-transform: uppercase; }
        .p-info b { color: var(--yellow); font-size: 16px; }
        .btn-del { background: var(--red); border: none; color: white; padding: 8px; border-radius: 8px; font-size: 10px; font-weight: 900; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #0b171c; border-top: 2px solid var(--cyan); display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-item { text-align: center; color: rgba(255,255,255,0.4); text-decoration: none; font-size: 10px; font-weight: 900; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--cyan); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <h1 id="nombreLocal">MI COMERCIO</h1>
    <p id="correoLocal" style="font-size: 10px; opacity: 0.5; margin: 5px 0 0;">...</p>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('inventario', this)">📦 INVENTARIO</div>
    <div class="tab" onclick="switchTab('ajustes', this)">⚙️ MI LOCAL</div>
</div>

<div id="inventario" class="content active">
    <div class="card">
        <label>Producto / Marca</label>
        <input type="text" id="pNombre" placeholder="Ej: Harina Pan 1kg">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <div style="flex:1;"><label>Precio Bs.</label><input type="number" id="pPrecio" placeholder="0.00"></div>
            <div style="flex:1;"><label>Stock</label><input type="number" id="pStock" placeholder="Cant."></div>
        </div>
        <button class="btn-main" onclick="guardarProducto()">Publicar Producto</button>
    </div>
    <div id="listaProductos"></div>
</div>

<div id="ajustes" class="content">
    <div class="card">
        <label>Ubicación GPS</label>
        <input type="text" id="locGPS" readonly style="opacity: 0.6;">
        <label style="margin-top:15px;">Seguridad</label>
        <button class="btn-main" style="background: var(--cyan); color: #000;" onclick="cambiarClave()">Enviar Link Cambio de Clave</button>
        <button class="btn-main" style="background: var(--red); margin-top:10px;" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>
</div>

<nav class="bottom-nav">
    <a href="index.html" class="nav-item"><span>📍</span>MAPA</a>
    <a href="comercio.html" class="nav-item active"><span>📊</span>PANEL</a>
</nav>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let userUID = null;

    firebase.auth().onAuthStateChanged(async (user) => {
        if (user) {
            userUID = user.uid;
            const docU = await db.collection("usuarios").doc(user.uid).get();
            if(!docU.exists || docU.data().tipo !== "comercio") {
                window.location.href = "index.html"; 
                return;
            }
            document.getElementById('correoLocal').innerText = user.email;
            cargarDatosLocal();
            cargarLista();
        } else { window.location.href = "auth.html"; }
    });

    async function cargarDatosLocal() {
        const docL = await db.collection("comercios").doc(userUID).get();
        if(docL.exists) {
            document.getElementById('nombreLocal').innerText = docL.data().nombre;
            document.getElementById('locGPS').value = `${docL.data().lat}, ${docL.data().lng}`;
        }
    }

    async function guardarProducto() {
        const nombre = document.getElementById('pNombre').value.trim();
        const precio = parseFloat(document.getElementById('pPrecio').value);
        const stock = parseInt(document.getElementById('pStock').value);

        if(!nombre || isNaN(precio)) return alert("⚠️ Datos incompletos");

        await db.collection("productos").add({
            nombre, precio, stock, comercioID: userUID, fecha: new Date()
        });
        
        document.getElementById('pNombre').value = "";
        document.getElementById('pPrecio').value = "";
        document.getElementById('pStock').value = "";
    }

    function cargarLista() {
        db.collection("productos").where("comercioID", "==", userUID).onSnapshot(snap => {
            const cont = document.getElementById('listaProductos');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                cont.innerHTML += `
                    <div class="p-item">
                        <div class="p-info">
                            <h3>${p.nombre}</h3>
                            <b>Bs. ${p.precio.toFixed(2)}</b>
                        </div>
                        <button class="btn-del" onclick="eliminarP('${doc.id}')">ELIMINAR</button>
                    </div>`;
            });
        });
    }

    function switchTab(id, el) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function eliminarP(id) { if(confirm("¿Eliminar producto?")) db.collection("productos").doc(id).delete(); }
    function cerrarSesion() { firebase.auth().signOut().then(() => window.location.href="auth.html"); }
    function cambiarClave() { firebase.auth().sendPasswordResetEmail(firebase.auth().currentUser.email).then(() => alert("✅ Correo enviado")); }
</script>
</body>
</html>
