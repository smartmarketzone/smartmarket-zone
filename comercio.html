<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartMarket | Comercio</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Outfit',sans-serif;
display:flex;
background:#f1f5f9;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
height:100vh;
padding:25px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.logo{
font-size:22px;
font-weight:900;
margin-bottom:20px;
}

.menu button{
width:100%;
padding:12px;
background:none;
color:#cbd5e1;
border:none;
text-align:left;
cursor:pointer;
border-radius:10px;
}

.menu button:hover{
background:#1e293b;
color:white;
}

.sidebar-bottom button{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.logout{background:#1e293b;color:white;}
.delete{background:#ef4444;color:white;}

.main{
flex:1;
padding:30px;
}

.header{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.section{display:none;}
.active{display:block;}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.stats{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.stat{
flex:1;
min-width:150px;
text-align:center;
padding:20px;
border-radius:15px;
background:linear-gradient(135deg,#1a73e8,#00d2ff);
color:white;
}

.product{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#f8fafc;
border-radius:10px;
margin-bottom:10px;
transition:0.2s;
}
.product:hover{transform:scale(1.02);}

.product img{
width:60px;
height:60px;
border-radius:10px;
object-fit:cover;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #e2e8f0;
}

button.primary{
margin-top:10px;
padding:12px;
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.form-step{display:none;}
.form-step.active{display:block;}

#map{
height:400px;
border-radius:15px;
}
</style>
</head>

<body>

<div class="sidebar">
<div>
<div class="logo">SmartMarket</div>

<div class="menu">
<button onclick="mostrar('dashboard')">📊 Dashboard</button>
<button onclick="mostrar('productos')">📦 Productos</button>
<button onclick="mostrar('mapaSec')">📍 Ubicación</button>
<button onclick="mostrar('perfil')">⚙️ Perfil</button>
</div>
</div>

<div class="sidebar-bottom">
<button class="logout" onclick="logout()">Cerrar sesión</button>
<button class="delete" onclick="eliminarCuenta()">Eliminar cuenta</button>
</div>
</div>

<div class="main">

<div class="header">
<h1 id="nombreNegocio">Mi Comercio</h1>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<div class="card">
<p id="estadoUbicacion">Cargando ubicación...</p>
<div id="direccionTexto"></div>
</div>

<div class="stats">
<div class="stat"><h2 id="totalProductos">0</h2><p>Productos</p></div>
<div class="stat"><h2 id="totalClicks">0</h2><p>Interacciones</p></div>
<div class="stat"><h2 id="topProducto">-</h2><p>Producto TOP</p></div>
</div>
</div>

<!-- PRODUCTOS -->
<div id="productos" class="section">

<div class="card">
<h3>Nuevo producto</h3>

<div class="form-step active" id="step1">
<input id="nombre" placeholder="Nombre del producto">
<button class="primary" onclick="nextStep(2)">Continuar</button>
</div>

<div class="form-step" id="step2">
<input id="precio" placeholder="Precio">
<input id="categoria" placeholder="Categoría">
<button onclick="prevStep(1)">Atrás</button>
<button class="primary" onclick="nextStep(3)">Continuar</button>
</div>

<div class="form-step" id="step3">
<input type="file" id="fileImg">
<input id="imagen" placeholder="o URL de imagen">
<img id="preview" style="width:100%;margin-top:10px;border-radius:10px;display:none;">
<button onclick="prevStep(2)">Atrás</button>
<button class="primary" onclick="agregarProducto()">Guardar producto</button>
</div>

</div>

<div class="card">
<h3>Inventario</h3>
<div id="lista"></div>
</div>

</div>

<!-- MAPA -->
<div id="mapaSec" class="section">
<div class="card">
<div id="map"></div>

<input id="direccion" placeholder="Dirección detectada">
<button class="primary" onclick="detectarUbicacion()">Usar mi ubicación</button>
<button class="primary" onclick="guardarUbicacion()">Guardar ubicación</button>

</div>
</div>

<!-- PERFIL -->
<div id="perfil" class="section">
<div class="card">
<input id="negocio" placeholder="Nombre negocio">
<input id="telefono" placeholder="Teléfono">
<button class="primary" onclick="guardarPerfil()">Guardar</button>
</div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyA6tYo...",
authDomain:"smartmarket-zone-e7559.firebaseapp.com",
projectId:"smartmarket-zone-e7559"
};

if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let map,marker,editId=null,authReady=false;

/* AUTH */
firebase.auth().onAuthStateChanged(async user=>{
if(!user){location.href="login.html";return;}
if(authReady) return; authReady=true;

const doc=await db.collection("usuarios").doc(user.uid).get();
const data=doc.data();

if(!data.ubicacion || !data.ubicacion.lat){
mostrar("mapaSec"); setTimeout(initMap,300); return;
}

nombreNegocio.innerText=data.negocio||"Mi Comercio";
direccionTexto.innerText=data.direccion||"";

cargarProductos();
});

/* NAV */
function mostrar(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
if(id==="mapaSec") setTimeout(initMap,500);
}

/* MAPA */
function initMap(){
if(map) return;
map=L.map('map').setView([10.48,-66.90],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

map.on('click',e=>{
colocarMarcador(e.latlng);
obtenerDireccion(e.latlng.lat,e.latlng.lng);
});
}

function colocarMarcador(latlng){
if(marker) map.removeLayer(marker);
marker=L.marker(latlng).addTo(map);
}

function detectarUbicacion(){
navigator.geolocation.getCurrentPosition(pos=>{
const latlng={lat:pos.coords.latitude,lng:pos.coords.longitude};
map.setView(latlng,15);
colocarMarcador(latlng);
obtenerDireccion(latlng.lat,latlng.lng);
});
}

async function obtenerDireccion(lat,lng){
try{
const res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
const data=await res.json();
direccion.value=data.display_name||"";
}catch{direccion.value="";}
}

function guardarUbicacion(){
const user=firebase.auth().currentUser;
if(!marker) return alert("Selecciona ubicación");

const latlng=marker.getLatLng();

db.collection("usuarios").doc(user.uid).set({
ubicacion:{lat:latlng.lat,lng:latlng.lng},
direccion:direccion.value||""
},{merge:true}).then(()=>location.reload());
}

/* WIZARD */
function nextStep(n){
document.querySelectorAll('.form-step').forEach(s=>s.classList.remove('active'));
document.getElementById('step'+n).classList.add('active');
}
function prevStep(n){nextStep(n);}

/* PREVIEW */
fileImg.addEventListener("change",function(){
const file=this.files[0];
if(file){
const reader=new FileReader();
reader.onload=e=>{
preview.src=e.target.result;
preview.style.display="block";
imagen.value="";
};
reader.readAsDataURL(file);
}
});

/* PRODUCTOS */
function agregarProducto(){
const user=firebase.auth().currentUser;

let imgFinal=imagen.value;
if(!imgFinal && preview.src) imgFinal=preview.src;

const data={
nombre:nombre.value,
precio:parseFloat(precio.value),
categoria:categoria.value||"General",
imagen:imgFinal||"https://via.placeholder.com/60",
dueño:user.uid,
clicks:0,
fecha:new Date()
};

db.collection("productos").add(data).then(()=>{
alert("Producto guardado ✔");
limpiar();
nextStep(1);
cargarProductos();
});
}

function limpiar(){
nombre.value="";precio.value="";categoria.value="";
imagen.value="";preview.style.display="none";
}

function cargarProductos(){
const user=firebase.auth().currentUser;
lista.innerHTML="Cargando...";

db.collection("productos").where("dueño","==",user.uid)
.get().then(snap=>{
lista.innerHTML="";
totalProductos.innerText=snap.size;

if(snap.empty){
lista.innerHTML="<p style='opacity:0.6'>Aún no tienes productos</p>";
return;
}

snap.forEach(doc=>{
let p=doc.data();
lista.innerHTML+=`
<div class="product">
<div style="display:flex;gap:10px;">
<img src="${p.imagen}">
<div><b>${p.nombre}</b><br>$${p.precio}</div>
</div>
</div>`;
});
});
}

/* PERFIL */
function guardarPerfil(){
const user=firebase.auth().currentUser;
db.collection("usuarios").doc(user.uid).set({
negocio:negocio.value,
telefono:telefono.value
},{merge:true});
}

/* CUENTA */
function logout(){
firebase.auth().signOut().then(()=>location.href="login.html");
}
</script>

</body>
</html>
