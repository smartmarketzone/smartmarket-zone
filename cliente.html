<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
:root{
    --primary:#2563eb;
    --bg:#f8fafc;
    --card:#ffffff;
    --border:#e5e7eb;
}

body{
    font-family:'Outfit',sans-serif;
    background:var(--bg);
}

/* MAP */
#map{
    position:fixed;
    inset:0;
    display:none;
    z-index:10;
}

/* PANEL */
.panel{
    position:fixed;
    top:80px;
    left:20px;
    width:380px;
    height:calc(100% - 100px);
    background:white;
    border-radius:16px;
    padding:15px;
    overflow:auto;
}

/* SEARCH */
.search{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid var(--border);
    margin-bottom:10px;
}

/* FILTERS */
.filters{
    display:flex;
    gap:6px;
    margin-bottom:10px;
    overflow:auto;
}

.btn{
    padding:8px 10px;
    border:none;
    border-radius:10px;
    background:#eee;
    cursor:pointer;
}

/* CARD */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.card{
    border:1px solid #ddd;
    border-radius:12px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:100px;
    object-fit:cover;
}

.card-body{
    padding:8px;
}

.precio{
    color:var(--primary);
    font-weight:bold;
}

/* BACK */
.backMap{
    position:fixed;
    bottom:20px;
    left:20px;
    background:white;
    padding:10px;
    border-radius:10px;
    display:none;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">

<input class="search" id="searchGlobal" placeholder="Buscar productos o comercios...">

<div class="filters">
    <button class="btn" onclick="filtro('recomendado')">🔥</button>
    <button class="btn" onclick="filtro('cerca')">📍</button>
    <button class="btn" onclick="filtro('barato')">💰</button>
    <button class="btn" onclick="cargarFavoritos()">❤️</button>
</div>

<div class="filters">
    <button class="btn" onclick="categoria('comida')">🍔</button>
    <button class="btn" onclick="categoria('farmacia')">💊</button>
    <button class="btn" onclick="categoria('super')">🛒</button>
</div>

<div id="contenido"></div>

<button onclick="mostrarMapa()">Ver mapa</button>

</div>

<div class="backMap" onclick="cerrarMapa()">← Volver</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
    apiKey:"TU_API_KEY",
    authDomain:"TU_DOMAIN",
    projectId:"TU_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markersLayer = L.markerClusterGroup();
map.addLayer(markersLayer);

let userLat=0,userLng=0;
let comercios=[];
let cacheProductos={};

/* UBICACION */
navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;
    userLng=pos.coords.longitude;
    map.setView([userLat,userLng],13);
});

/* DATA */
async function cargarDatos(){
    let snap = await db.collection("usuarios").get();

    snap.forEach(doc=>{
        let c=doc.data();
        if(!c.ubicacion) return;
        c.id=doc.id;
        comercios.push(c);
    });

    renderComercios(comercios);
}
cargarDatos();

/* DISTANCIA */
function calcularDistancia(lat1,lon1,lat2,lon2){
    let R=6371;
    let dLat=(lat2-lat1)*Math.PI/180;
    let dLon=(lon2-lon1)*Math.PI/180;
    let a=Math.sin(dLat/2)**2 +
        Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
        Math.sin(dLon/2)**2;
    return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* BUSQUEDA */
searchGlobal.oninput = async ()=>{
    let t = searchGlobal.value.toLowerCase();

    let resultados=[];

    for(let c of comercios){
        let snap = await db.collection("usuarios").doc(c.id).collection("publicaciones").get();

        snap.forEach(d=>{
            let p=d.data();
            if(p.nombre.toLowerCase().includes(t) || c.negocio.toLowerCase().includes(t)){
                p.comercio=c;
                resultados.push(p);
            }
        });
    }

    renderProductosGlobal(resultados);
};

/* FILTROS */
async function filtro(tipo){
    let productos=[];

    for(let c of comercios){
        let snap = await db.collection("usuarios").doc(c.id).collection("publicaciones").get();

        snap.forEach(d=>{
            let p=d.data();
            p.comercio=c;

            p.dist = calcularDistancia(userLat,userLng,c.ubicacion.lat,c.ubicacion.lng);

            productos.push(p);
        });
    }

    if(tipo==="cerca") productos.sort((a,b)=>a.dist-b.dist);
    if(tipo==="barato") productos.sort((a,b)=>a.precio-b.precio);
    if(tipo==="recomendado") productos.sort((a,b)=>(a.dist*0.7+a.precio*0.3)-(b.dist*0.7+b.precio*0.3));

    renderProductosGlobal(productos.slice(0,20));
}

/* CATEGORIA */
async function categoria(cat){
    let productos=[];

    for(let c of comercios){
        let snap = await db.collection("usuarios").doc(c.id)
            .collection("publicaciones")
            .where("categoria","==",cat)
            .get();

        snap.forEach(d=>{
            let p=d.data();
            p.comercio=c;
            productos.push(p);
        });
    }

    renderProductosGlobal(productos);
}

/* FAVORITOS */
async function cargarFavoritos(){
    let user = firebase.auth().currentUser;

    let snap = await db.collection("usuarios")
        .doc(user.uid)
        .collection("favoritos")
        .get();

    let lista=[];
    snap.forEach(d=>lista.push(d.data()));

    renderProductosGlobal(lista);
}

/* RENDER GLOBAL */
function renderProductosGlobal(lista){
    contenido.innerHTML = `
    <div class="grid">
    ${lista.map(p=>`
        <div class="card">
            <img src="${p.imagen}">
            <div class="card-body">
                <b>${p.nombre}</b><br>
                <small>${p.comercio?.negocio || ""}</small>
                <div class="precio">$${p.precio}</div>
            </div>
        </div>
    `).join("")}
    </div>`;
}

/* MAPA */
function mostrarMapa(){
    document.getElementById("map").style.display="block";
    document.querySelector(".backMap").style.display="block";

    setTimeout(()=>{
        map.invalidateSize();
        markersLayer.clearLayers();

        comercios.forEach(c=>{
            let m=L.marker([c.ubicacion.lat,c.ubicacion.lng]).addTo(markersLayer);

            m.on("click",()=>{
                abrirComercio(c);
            });
        });

    },200);
}

function cerrarMapa(){
    document.getElementById("map").style.display="none";
    document.querySelector(".backMap").style.display="none";
}

/* INICIAL */
function renderComercios(lista){
    contenido.innerHTML = lista.map(c=>`
        <div onclick='abrirComercio(${JSON.stringify(c)})'>
            ${c.negocio}
        </div>
    `).join("");
}
</script>

</body>
</html>
