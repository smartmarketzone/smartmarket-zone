<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>
:root{
    --primary:#2563eb;
    --bg:#f8fafc;
    --card:#ffffff;
    --border:#e5e7eb;
    --text:#0f172a;
}

/* BASE */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Outfit',sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* MAPA */
#map{
    position:fixed;
    inset:0;
    z-index:10;
    display:none;
}

/* TOPBAR */
.topbar{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    padding:14px 20px;
    z-index:20;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid var(--border);
}

/* PANEL */
.panel{
    position:fixed;
    top:80px;
    left:20px;
    width:380px;
    height:calc(100% - 100px);
    background:var(--card);
    border-radius:16px;
    padding:15px;
    z-index:15;
    overflow:auto;
    border:1px solid var(--border);
}

/* SEARCH */
.search{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid var(--border);
    margin-bottom:10px;
}

/* COMERCIO */
.comercio{
    padding:14px;
    border:1px solid var(--border);
    border-radius:12px;
    margin-bottom:10px;
    cursor:pointer;
    transition:.2s;
}

.comercio:hover{
    border-color:var(--primary);
    transform:translateY(-2px);
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

/* CARD */
.card{
    border:1px solid var(--border);
    border-radius:16px;
    overflow:hidden;
    transition:.2s;
}

.card:hover{
    transform:translateY(-3px);
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}

.card-body{
    padding:10px;
}

.precio{
    color:var(--primary);
    font-weight:700;
}

/* BOTONES */
.btn{
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.primary{background:var(--primary);color:white;}
.sec{background:var(--border);}

/* BACK MAP */
.backMap{
    position:fixed;
    bottom:20px;
    left:20px;
    z-index:30;
    display:none;
    padding:12px 16px;
    border-radius:999px;
    background:var(--card);
    border:1px solid var(--border);
    font-weight:600;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<div id="map"></div>

<div class="topbar">
    <h1>SmartMarket</h1>
    <div>
        <button class="btn primary" onclick="mostrarMapa()">🗺️ Mapa</button>
        <button class="btn sec" onclick="logout()">Salir</button>
    </div>
</div>

<div class="panel">
    <input class="search" id="searchGlobal" placeholder="Buscar comercio...">
    <div id="contenido"></div>
</div>

<div id="backMap" class="backMap" onclick="cerrarMapa()">← Volver</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
    apiKey:"TU_API_KEY",
    authDomain:"TU_DOMAIN",
    projectId:"TU_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* MAPA */
let map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markersLayer = L.markerClusterGroup();
map.addLayer(markersLayer);

let userLat=0,userLng=0;

/* UBICACION */
navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;
    userLng=pos.coords.longitude;
    map.setView([userLat,userLng],13);
});

/* DATA */
let comercios=[];
let cacheProductos={};

/* CARGA OPTIMIZADA */
async function cargarDatos(){
    let snap = await db.collection("usuarios").get();

    snap.forEach(doc=>{
        let c=doc.data();
        if(!c.ubicacion) return;

        let dist = calcularDistancia(userLat,userLng,c.ubicacion.lat,c.ubicacion.lng);

        if(dist < 10){
            c.id=doc.id;
            comercios.push(c);
        }
    });

    renderComercios(comercios);
}
cargarDatos();

/* DISTANCIA */
function calcularDistancia(lat1,lon1,lat2,lon2){
    let R=6371;
    let dLat=(lat2-lat1)*Math.PI/180;
    let dLon=(lon2-lon1)*Math.PI/180;
    let a=Math.sin(dLat/2)**2 +
        Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
        Math.sin(dLon/2)**2;
    return (2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}

/* LISTA */
function renderComercios(lista){
    contenido.innerHTML = lista.map(c=>{
        let dist = calcularDistancia(userLat,userLng,c.ubicacion.lat,c.ubicacion.lng);

        return `
        <div class="comercio" onclick='abrirComercio(${JSON.stringify(c)})'>
            <b>${c.negocio}</b><br>
            <small>${dist} km</small>
        </div>`;
    }).join("");
}

/* MAPA */
function mostrarMapa(){
    document.getElementById("map").style.display="block";
    document.getElementById("backMap").style.display="block";

    setTimeout(()=>{
        map.invalidateSize();
        cargarMapa();
    },200);
}

function cerrarMapa(){
    document.getElementById("map").style.display="none";
    document.getElementById("backMap").style.display="none";
}

function cargarMapa(){
    markersLayer.clearLayers();

    L.marker([userLat,userLng]).addTo(markersLayer);

    comercios.forEach(c=>{
        let marker = L.marker([c.ubicacion.lat,c.ubicacion.lng])
            .bindPopup(`<b>${c.negocio}</b>`);

        marker.on("click",()=>{
            cerrarMapa();
            abrirComercio(c);
        });

        markersLayer.addLayer(marker);
    });
}

/* PRODUCTOS OPTIMIZADOS */
async function abrirComercio(c){

    if(cacheProductos[c.id]){
        return renderProductos(c,cacheProductos[c.id]);
    }

    let snap = await db
        .collection("usuarios")
        .doc(c.id)
        .collection("publicaciones")
        .get();

    let productos=[];
    snap.forEach(d=>productos.push(d.data()));

    cacheProductos[c.id]=productos;

    renderProductos(c,productos);
}

/* RENDER */
function renderProductos(c,lista){
    contenido.innerHTML = `
        <h3>${c.negocio}</h3>
        <button class="btn sec" onclick="volver()">← Volver</button>
        <div class="grid">
        ${lista.map(p=>`
            <div class="card">
                <img src="${p.imagen}">
                <div class="card-body">
                    <b>${p.nombre}</b>
                    <div class="precio">$${p.precio}</div>
                    <button class="btn sec" onclick="favorito('${p.nombre}')">♡</button>
                </div>
            </div>
        `).join("")}
        </div>
    `;
}

/* FAVORITOS */
function favorito(nombre){
    let user=firebase.auth().currentUser;

    db.collection("usuarios")
      .doc(user.uid)
      .collection("favoritos")
      .doc(nombre)
      .set({nombre});
}

/* BUSCADOR */
searchGlobal.oninput=()=>{
    let t=searchGlobal.value.toLowerCase();
    renderComercios(comercios.filter(c=>(c.negocio||"").toLowerCase().includes(t)));
};

function volver(){ renderComercios(comercios); }

/* LOGOUT */
function logout(){
    firebase.auth().signOut().then(()=>location.href="login.html");
}
</script>

</body>
</html>
