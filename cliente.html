<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
:root{
    --primary:#2563eb;
    --bg:#f8fafc;
    --card:#ffffff;
    --border:#e5e7eb;
    --text:#0f172a;
    --muted:#64748b;
}

/* DARK MODE */
@media (prefers-color-scheme: dark){
    :root{
        --bg:#0f172a;
        --card:#1e293b;
        --border:#334155;
        --text:#f1f5f9;
        --muted:#94a3b8;
    }
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Outfit',sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* TOPBAR */
.topbar{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(10px);
    padding:14px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid var(--border);
    z-index:20;
}

.topbar h1{
    font-weight:900;
}

/* PANEL */
.panel{
    position:fixed;
    top:80px;
    left:20px;
    width:380px;
    height:calc(100% - 100px);
    background:var(--card);
    border-radius:16px;
    padding:15px;
    overflow:auto;
    border:1px solid var(--border);
}

/* SEARCH */
.search{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid var(--border);
    margin-bottom:10px;
    outline:none;
}

/* COMERCIO */
.comercio{
    padding:14px;
    border:1px solid var(--border);
    border-radius:12px;
    margin-bottom:10px;
    cursor:pointer;
}

.comercio:hover{
    border-color:var(--primary);
    transform:translateY(-2px);
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

/* CARD */
.card{
    border:1px solid var(--border);
    border-radius:16px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}

.card-body{
    padding:10px;
}

.precio{
    color:var(--primary);
    font-weight:700;
}

/* BOTONES */
.btn{
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.primary{
    background:var(--primary);
    color:white;
}

.sec{
    background:var(--border);
}

/* MAP */
#map{
    position:fixed;
    inset:0;
    display:none;
    z-index:10;
}

.backMap{
    position:fixed;
    top:90px;
    left:20px;
    background:white;
    padding:10px;
    border-radius:10px;
    display:none;
    z-index:30;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="topbar">
    <h1>SmartMarket</h1>
    <div>
        <button class="btn primary" onclick="mostrarMapa()">Mapa</button>
        <button class="btn sec" onclick="logout()">Salir</button>
    </div>
</div>

<div class="panel">
    <input class="search" id="searchGlobal" placeholder="Buscar comercio...">
    <div id="contenido"></div>
</div>

<div class="backMap" onclick="cerrarMapa()">Volver</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
    apiKey:"TU_API_KEY",
    authDomain:"TU_DOMAIN",
    projectId:"TU_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* MAPA */
let map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userLat=0, userLng=0;
let markersLayer = L.layerGroup().addTo(map);

/* UBICACION */
navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;
    userLng=pos.coords.longitude;
    map.setView([userLat,userLng],13);
});

/* DATA */
let comercios=[];
let favoritos=[];

async function cargarDatos(){
    let snap = await db.collection("usuarios").get();
    snap.forEach(doc=>{
        let c=doc.data();
        if(c.ubicacion){
            c.id=doc.id;
            comercios.push(c);
        }
    });
    renderComercios(comercios);
}

cargarDatos();

/* DISTANCIA */
function calcularDistancia(lat1,lon1,lat2,lon2){
    let R=6371;
    let dLat=(lat2-lat1)*Math.PI/180;
    let dLon=(lon2-lon1)*Math.PI/180;

    let a=Math.sin(dLat/2)**2 +
        Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
        Math.sin(dLon/2)**2;

    return (2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}

/* LISTA */
function renderComercios(lista){
    contenido.innerHTML = lista.map(c=>{
        let dist = c.ubicacion ? calcularDistancia(userLat,userLng,c.ubicacion.lat,c.ubicacion.lng) : "?";

        return `
        <div class="comercio" onclick='abrirComercio(${JSON.stringify(c)})'>
            <b>${c.negocio}</b><br>
            <small>${dist} km</small>
        </div>
        `;
    }).join("");
}

/* PRODUCTOS */
async function abrirComercio(c){
    let snap = await db.collection("publicaciones").get();
    let productos=[];

    snap.forEach(d=>{
        let p=d.data();
        if(p.negocio===c.negocio) productos.push(p);
    });

    contenido.innerHTML = `
        <h2>${c.negocio}</h2>
        <button class="btn sec" onclick="volver()">Volver</button>
        <div class="grid">
        ${productos.map(p=>{
            let fav = favoritos.includes(p.nombre);
            return `
            <div class="card">
                <img src="${p.imagen}">
                <div class="card-body">
                    <b>${p.nombre}</b>
                    <div class="precio">$${p.precio}</div>
                    <button class="btn ${fav?'primary':'sec'}" onclick="toggleFav('${p.nombre}')">
                        ${fav?'❤️ Guardado':'♡ Guardar'}
                    </button>
                </div>
            </div>`;
        }).join("")}
        </div>
    `;
}

/* FAVORITOS */
function toggleFav(nombre){
    if(favoritos.includes(nombre)){
        favoritos = favoritos.filter(f=>f!==nombre);
    }else{
        favoritos.push(nombre);
    }
    alert("Favoritos actualizados");
}

/* MAPA */
function mostrarMapa(){
    map.style.display="block";
    document.querySelector(".backMap").style.display="block";

    setTimeout(()=>{
        map.invalidateSize();
        cargarMapa();
    },200);
}

function cerrarMapa(){
    map.style.display="none";
    document.querySelector(".backMap").style.display="none";
}

function cargarMapa(){
    markersLayer.clearLayers();

    L.marker([userLat,userLng]).addTo(markersLayer);

    comercios.forEach(c=>{
        if(!c.ubicacion) return;

        let m = L.marker([c.ubicacion.lat,c.ubicacion.lng]).addTo(markersLayer);

        m.on("click",()=>{
            cerrarMapa();
            abrirComercio(c);
        });
    });
}

/* BUSCADOR */
searchGlobal.oninput=()=>{
    let t=searchGlobal.value.toLowerCase();
    renderComercios(comercios.filter(c=>(c.negocio||"").toLowerCase().includes(t)));
};

function volver(){ renderComercios(comercios); }

/* LOGOUT */
function logout(){
    firebase.auth().signOut().then(()=>location.href="login.html");
}
</script>

</body>
</html>
