<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartMarket - Buscar</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Montserrat', sans-serif;
    background:#0f2027;
    color:white;
}

/* HEADER */
.header {
    padding:25px;
    text-align:center;
    background:linear-gradient(45deg,#1e88e5,#4fc3f7);
}

.header h1 {
    margin:0;
    font-size:18px;
}

/* BUSCADOR */
.search-box {
    width:90%;
    margin:20px auto;
}

.search-box input {
    width:100%;
    padding:15px;
    border-radius:12px;
    border:none;
    font-weight:700;
}

/* RESULTADOS */
.result-group {
    margin:20px;
}

.product-title {
    font-size:14px;
    font-weight:900;
    color:#ffeb3b;
    margin-bottom:10px;
}

/* CARD */
.card {
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
    border-left:4px solid #4fc3f7;
}

.best {
    border-left:4px solid #4caf50;
    background:rgba(76,175,80,0.1);
}

/* STOCK */
.stock {
    font-size:10px;
    font-weight:900;
    padding:4px 8px;
    border-radius:6px;
}

.stock-ok { background:#4caf50; }
.stock-low { background:#ff9800; }
.stock-out { background:#f44336; }

/* NAV */
.bottom-nav {
    position:fixed;
    bottom:0;
    width:100%;
    height:70px;
    background:#0b171c;
    display:flex;
    justify-content:space-around;
    align-items:center;
}

.nav-item {
    color:white;
    text-decoration:none;
    font-size:10px;
}
</style>
</head>

<body>

<div class="header">
    <h1 id="saludo">BIENVENIDO</h1>
</div>

<div class="search-box">
    <input type="text" id="buscador" placeholder="🔍 Buscar productos..." oninput="buscarInteligente()">
</div>

<div id="resultados"></div>

<nav class="bottom-nav">
    <a href="mapa.html" class="nav-item">📍 MAPA</a>
    <a href="cliente.html" class="nav-item">🔍 BUSCAR</a>
</nav>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
    authDomain: "smartmarket-zone-e7559.firebaseapp.com",
    projectId: "smartmarket-zone-e7559"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* SESION */
firebase.auth().onAuthStateChanged(user => {
    if(user){
        document.getElementById("saludo").innerText = "Hola, " + user.email;
    } else {
        window.location.href = "auth.html";
    }
});

/* BUSCADOR INTELIGENTE */
async function buscarInteligente() {
    const txt = document.getElementById("buscador").value.toLowerCase();
    const cont = document.getElementById("resultados");

    if(txt.length < 2){
        cont.innerHTML = "";
        return;
    }

    const snap = await db.collection("productos").get();

    let agrupados = {};

    snap.forEach(doc => {
        const p = doc.data();

        if(p.nombre.toLowerCase().includes(txt)){

            if(!agrupados[p.nombre]){
                agrupados[p.nombre] = [];
            }

            agrupados[p.nombre].push({
                ...p,
                id: doc.id
            });
        }
    });

    cont.innerHTML = "";

    for(const nombre in agrupados){

        let lista = agrupados[nombre];

        // ordenar por precio
        lista.sort((a,b) => a.precio - b.precio);

        let html = `<div class="result-group">
        <div class="product-title">${nombre}</div>`;

        for(let i=0;i<lista.length;i++){

            const item = lista[i];

            // obtener comercio
            const docC = await db.collection("comercios").doc(item.comercioID).get();
            const comercio = docC.data();

            let stockClass = "stock-ok";
            let stockText = "EN STOCK";

            if(item.stock == 0){
                stockClass = "stock-out";
                stockText = "SIN STOCK";
            }
            else if(item.stock <= 5){
                stockClass = "stock-low";
                stockText = "POCO STOCK";
            }

            html += `
            <div class="card ${i===0 ? "best" : ""}">
                <b>${comercio.nombre}</b><br>
                💰 Bs. ${item.precio}<br>
                <span class="stock ${stockClass}">${stockText}</span>
            </div>`;
        }

        html += "</div>";

        cont.innerHTML += html;
    }
}
</script>

</body>
</html>
