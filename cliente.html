<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
:root{
    --primary:#2563eb;
    --bg:#f8fafc;
    --card:#ffffff;
    --border:#e5e7eb;
}

/* BASE */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);}

/* MAP */
#map{position:fixed;inset:0;z-index:10;display:none;}

/* TOPBAR */
.topbar{
    position:fixed;top:0;width:100%;
    background:white;padding:12px;
    display:flex;justify-content:space-between;
    align-items:center;
    z-index:20;border-bottom:1px solid var(--border);
}

/* PANEL */
.panel{
    position:fixed;top:70px;left:20px;
    width:380px;height:calc(100% - 90px);
    background:white;border-radius:16px;
    padding:12px;overflow:auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* SEARCH */
.search{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-bottom:8px;
}

/* FILTERS */
.filters{
    display:flex;
    gap:6px;
    margin-bottom:8px;
    overflow:auto;
}

.btn{
    padding:8px 10px;
    border:none;
    border-radius:10px;
    background:#eee;
    cursor:pointer;
    transition:.2s;
}

.btn:hover{
    background:#ddd;
}

/* COMERCIO */
.comercio{
    padding:10px;
    border:1px solid #ddd;
    border-radius:10px;
    margin-bottom:8px;
    cursor:pointer;
    transition:.2s;
}

.comercio:hover{
    border-color:var(--primary);
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

/* CARD */
.card{
    border:1px solid #ddd;
    border-radius:12px;
    overflow:hidden;
    transition:.2s;
}

.card:hover{
    transform:translateY(-2px);
}

.card img{
    width:100%;
    height:110px;
    object-fit:cover;
}

.card-body{
    padding:8px;
}

.precio{
    color:var(--primary);
    font-weight:bold;
}

/* BACK MAP BOTON PRO */
.backMap{
    position:fixed;
    bottom:20px;
    left:20px;
    width:50px;
    height:50px;
    display:none;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    background:white;
    font-size:20px;
    cursor:pointer;
    z-index:30;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div id="map"></div>

<div class="topbar">
    <h2>SmartMarket</h2>
    <button class="btn" onclick="mostrarMapa()">🗺️</button>
</div>

<div class="panel">

<input class="search" id="searchGlobal" placeholder="Buscar productos o comercios...">

<div class="filters">
    <button class="btn" onclick="filtro('recomendado')">🔥</button>
    <button class="btn" onclick="filtro('cerca')">📍</button>
    <button class="btn" onclick="filtro('barato')">💰</button>
    <button class="btn" onclick="cargarFavoritos()">❤️</button>
</div>

<div class="filters">
    <button class="btn" onclick="categoria('comida')">🍔</button>
    <button class="btn" onclick="categoria('farmacia')">💊</button>
    <button class="btn" onclick="categoria('super')">🛒</button>
</div>

<div id="contenido"></div>

</div>

<div id="backMap" class="backMap" onclick="cerrarMapa()">←</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig={apiKey:"",authDomain:"",projectId:""};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

/* MAPA */
let map=L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markersLayer=L.markerClusterGroup();
map.addLayer(markersLayer);

let userLat=0,userLng=0;
let comercios=[];
let cacheProductos={};

/* UBICACION */
navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;
    userLng=pos.coords.longitude;
    map.setView([userLat,userLng],13);
});

/* DATA */
db.collection("usuarios").get().then(snap=>{
    snap.forEach(doc=>{
        let c=doc.data();
        if(!c.ubicacion) return;
        c.id=doc.id;
        comercios.push(c);
    });
    renderComercios(comercios);
});

/* DISTANCIA */
function calcularDistancia(lat1,lon1,lat2,lon2){
    let R=6371;
    let dLat=(lat2-lat1)*Math.PI/180;
    let dLon=(lon2-lon1)*Math.PI/180;
    let a=Math.sin(dLat/2)**2+
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;
    return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* LISTA */
function renderComercios(lista){
    contenido.innerHTML=lista.map(c=>`
    <div class="comercio" onclick='abrirComercio(${JSON.stringify(c)})'>
        <b>${c.negocio}</b>
    </div>`).join("");
}

/* COMERCIO */
async function abrirComercio(c){
    if(cacheProductos[c.id]){
        return renderProductos(c,cacheProductos[c.id]);
    }

    let snap=await db.collection("usuarios").doc(c.id).collection("publicaciones").get();

    let productos=[];
    snap.forEach(d=>productos.push(d.data()));

    cacheProductos[c.id]=productos;

    renderProductos(c,productos);
}

/* PRODUCTOS */
function renderProductos(c,lista){
    contenido.innerHTML=`
    <h3>${c.negocio}</h3>
    <button class="btn" onclick="volver()">← Volver</button>
    <div class="grid">
    ${lista.map(p=>`
    <div class="card">
        <img src="${p.imagen}">
        <div class="card-body">
            <b>${p.nombre}</b>
            <div class="precio">$${p.precio}</div>
        </div>
    </div>`).join("")}
    </div>`;
}

/* BUSQUEDA */
searchGlobal.oninput=async ()=>{
    let t=searchGlobal.value.toLowerCase();

    if(t.length<2){
        renderComercios(comercios);
        return;
    }

    let resultados=[];

    for(let c of comercios){
        let snap=await db.collection("usuarios").doc(c.id).collection("publicaciones").get();

        snap.forEach(d=>{
            let p=d.data();
            if(p.nombre.toLowerCase().includes(t) || c.negocio.toLowerCase().includes(t)){
                p.comercio=c;
                resultados.push(p);
            }
        });
    }

    renderBusqueda(resultados);
};

/* RESULTADOS */
function renderBusqueda(lista){
    contenido.innerHTML=`
    <div class="grid">
    ${lista.map(p=>`
    <div class="card">
        <img src="${p.imagen}">
        <div class="card-body">
            <b>${p.nombre}</b>
            <small>${p.comercio.negocio}</small>
            <div class="precio">$${p.precio}</div>
        </div>
    </div>`).join("")}
    </div>`;
}

/* FILTROS */
async function filtro(tipo){
    let productos=[];

    for(let c of comercios){
        let snap=await db.collection("usuarios").doc(c.id).collection("publicaciones").get();

        snap.forEach(d=>{
            let p=d.data();
            p.comercio=c;
            p.dist=calcularDistancia(userLat,userLng,c.ubicacion.lat,c.ubicacion.lng);
            productos.push(p);
        });
    }

    if(tipo==="cerca") productos.sort((a,b)=>a.dist-b.dist);
    if(tipo==="barato") productos.sort((a,b)=>a.precio-b.precio);
    if(tipo==="recomendado") productos.sort((a,b)=>(a.dist*0.7+a.precio*0.3)-(b.dist*0.7+b.precio*0.3));

    renderBusqueda(productos.slice(0,20));
}

/* CATEGORIA */
async function categoria(cat){
    let productos=[];

    for(let c of comercios){
        let snap=await db.collection("usuarios").doc(c.id)
        .collection("publicaciones").where("categoria","==",cat).get();

        snap.forEach(d=>{
            let p=d.data();
            p.comercio=c;
            productos.push(p);
        });
    }

    renderBusqueda(productos);
}

/* MAPA */
function mostrarMapa(){
    document.getElementById("map").style.display="block";
    document.getElementById("backMap").style.display="flex";

    setTimeout(()=>{
        map.invalidateSize();
        markersLayer.clearLayers();

        comercios.forEach(c=>{
            let m=L.marker([c.ubicacion.lat,c.ubicacion.lng]).addTo(markersLayer);

            m.on("click",()=>{
                cerrarMapa();
                abrirComercio(c);
            });
        });

    },200);
}

function cerrarMapa(){
    document.getElementById("map").style.display="none";
    document.getElementById("backMap").style.display="none";
}

function volver(){
    renderComercios(comercios);
}
</script>

</body>
</html>
