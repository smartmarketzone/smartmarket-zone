<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cliente - SmartMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root { --blue:#1e88e5; --cyan:#4fc3f7; --dark:#0f2027; --yellow:#ffeb3b; --green:#4caf50; }

body {
    margin:0;
    font-family:'Montserrat';
    background:var(--dark);
    color:white;
}

/* HEADER */
.header {
    padding:30px;
    background:linear-gradient(45deg,#1e88e5,#4fc3f7);
}

.header h1 { margin:0; }

/* BUSCADOR */
.search {
    padding:20px;
}

.search input {
    width:100%;
    padding:15px;
    border-radius:15px;
    border:none;
    font-weight:700;
}

/* RESULTADOS */
.resultados {
    padding:15px;
}

.card {
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
    margin-bottom:10px;
}

.precio {
    color:var(--yellow);
    font-weight:900;
}

.barato {
    border-left:5px solid var(--green);
}

button {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:var(--blue);
    color:white;
}
</style>
</head>

<body>

<div class="header">
    <h1 id="nombre">Cargando...</h1>
</div>

<div class="search">
    <input type="text" id="buscador" placeholder="Buscar arroz, leche, harina..." oninput="buscar()">
</div>

<div class="resultados" id="res"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
 authDomain: "smartmarket-zone-e7559.firebaseapp.com",
 projectId: "smartmarket-zone-e7559"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

// 🔐 SESIÓN
firebase.auth().onAuthStateChanged(async user => {
    if(!user){
        window.location.href="auth.html";
        return;
    }

    const doc = await db.collection("usuarios").doc(user.uid).get();

    if(doc.exists){
        document.getElementById("nombre").innerText = "HOLA, " + (doc.data().nombre || "CLIENTE");
    }
});

// 🔍 BÚSQUEDA INTELIGENTE
async function buscar(){
    const txt = document.getElementById("buscador").value.toLowerCase();
    const cont = document.getElementById("res");

    if(txt.length < 2){
        cont.innerHTML = "";
        return;
    }

    const productos = await db.collection("productos").get();

    let resultados = [];

    for(const doc of productos.docs){
        const p = doc.data();

        if(p.nombre.toLowerCase().includes(txt)){

            const tienda = await db.collection("comercios").doc(p.comercioID).get();

            resultados.push({
                id: doc.id,
                nombre: p.nombre,
                precio: p.precio,
                stock: p.stock,
                tienda: tienda.data().nombre,
                comercioID: p.comercioID
            });
        }
    }

    // 🔥 ORDENAR POR PRECIO (MÁS BARATO PRIMERO)
    resultados.sort((a,b) => a.precio - b.precio);

    cont.innerHTML = "";

    resultados.forEach((r, index) => {

        let clase = "";
        let etiqueta = "";

        // 🥇 MÁS BARATO
        if(index === 0){
            clase = "barato";
            etiqueta = "🔥 MEJOR PRECIO";
        }

        cont.innerHTML += `
            <div class="card ${clase}">
                <b>${r.nombre}</b>
                <div class="precio">Bs. ${r.precio}</div>
                <p style="font-size:12px;">${r.tienda}</p>
                <p style="font-size:11px; color:#4caf50;">${etiqueta}</p>

                <button onclick="verTienda('${r.comercioID}')">
                    Ver catálogo
                </button>
            </div>
        `;
    });
}

// 🏪 IR A TIENDA
function verTienda(id){
    window.location.href = "tienda.html?id=" + id;
}
</script>

</body>
</html>
