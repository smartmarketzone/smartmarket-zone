<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cliente | SmartMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Outfit',sans-serif;
    color:white;
    overflow:hidden;
}

/* Fondo */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(rgba(15,32,39,0.9), rgba(32,58,67,0.9));
    z-index:-2;
}

/* Mapa */
#map{
    position:absolute;
    width:100%;
    height:100%;
}

/* Panel */
.panel{
    position:absolute;
    top:20px;
    left:20px;
    width:370px;
    max-height:90vh;
    overflow:auto;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border-radius:20px;
    padding:20px;
    z-index:3;
}

/* Inputs */
input,select{
    width:100%;
    padding:8px;
    margin-top:10px;
    border-radius:10px;
    border:none;
}

/* Botón */
.btn{
    background:#00d2ff;
    border:none;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    cursor:pointer;
    width:100%;
}

/* Producto */
.product{
    background:rgba(255,255,255,0.1);
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel" id="panel">
    <h2>SmartMarket</h2>

    <input type="text" id="searchGlobal" placeholder="Buscar producto...">

    <div id="listaComercios"></div>

    <button class="btn" onclick="logout()">Cerrar sesión</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_DOMAIN",
    projectId: "TU_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* MAPA */
let map = L.map('map').setView([0,0], 13);

/* CAPA MAPA */
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);

/* UBICACION */
navigator.geolocation.getCurrentPosition(pos=>{
    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    map.setView([lat,lng],13);

    L.marker([lat,lng]).addTo(map).bindPopup("Tu ubicación");
});

/* CARGAR COMERCIOS */
let comerciosGlobal = [];

db.collection("comercios").get().then(snapshot=>{
    snapshot.forEach(doc=>{
        let c = doc.data();
        c.id = doc.id;
        comerciosGlobal.push(c);

        let marker = L.marker([c.ubicacion.lat, c.ubicacion.lng]).addTo(map);

        marker.on("click",()=>{
            abrirComercio(c);
        });
    });

    renderListaComercios(comerciosGlobal);
});

/* LISTA LATERAL */
function renderListaComercios(lista){
    let cont = document.getElementById("listaComercios");
    cont.innerHTML="";

    lista.forEach(c=>{
        cont.innerHTML += `
            <div class="product" onclick='abrirComercio(${JSON.stringify(c)})'>
                <b>${c.nombre}</b><br>
                ⭐ ${c.reputacion || 0}
            </div>
        `;
    });
}

/* PERFIL COMERCIO */
function abrirComercio(comercio){
    document.getElementById("panel").innerHTML = `
        <h2>${comercio.nombre}</h2>
        ⭐ ${comercio.reputacion || 0}

        <button class="btn" onclick="irMapa(${comercio.ubicacion.lat},${comercio.ubicacion.lng})">
            Ver ubicación
        </button>

        <input id="search" placeholder="Buscar producto">
        <select id="categoria">
            <option value="">Todas</option>
        </select>

        <div id="productos"></div>

        <button class="btn" onclick="volver()">Volver</button>
    `;

    db.collection("productos")
    .where("comercioId","==",comercio.id)
    .get()
    .then(snap=>{
        let productos = [];
        let categorias = new Set();

        snap.forEach(d=>{
            let p = d.data();
            productos.push(p);
            categorias.add(p.categoria);
        });

        /* llenar categorías */
        let select = document.getElementById("categoria");
        categorias.forEach(cat=>{
            select.innerHTML += `<option>${cat}</option>`;
        });

        mostrarProductos(productos);

        /* filtros */
        document.getElementById("search").oninput = ()=>{
            filtrar(productos);
        };

        document.getElementById("categoria").onchange = ()=>{
            filtrar(productos);
        };
    });
}

/* FILTROS */
function filtrar(lista){
    let texto = document.getElementById("search").value.toLowerCase();
    let cat = document.getElementById("categoria").value;

    let filtrados = lista.filter(p=>{
        return (
            p.nombre.toLowerCase().includes(texto) &&
            (cat=="" || p.categoria==cat) &&
            p.stock > 0
        );
    });

    mostrarProductos(filtrados);
}

/* MOSTRAR PRODUCTOS */
function mostrarProductos(lista){
    let cont = document.getElementById("productos");
    cont.innerHTML="";

    if(lista.length === 0){
        cont.innerHTML = "Sin productos";
        return;
    }

    lista.forEach(p=>{
        cont.innerHTML += `
            <div class="product">
                <b>${p.nombre}</b><br>
                💲 ${p.precio}<br>
                📦 ${p.stock}

                <button onclick="favorito('${p.nombre}')">❤️</button>
                <button onclick="comparar('${p.nombre}')">Comparar</button>
            </div>
        `;
    });
}

/* FAVORITOS */
function favorito(nombre){
    let user = firebase.auth().currentUser;

    db.collection("usuarios")
    .doc(user.uid)
    .collection("favoritos")
    .add({nombre});
}

/* COMPARADOR */
function comparar(nombre){
    db.collection("productos")
    .where("nombre","==",nombre)
    .get()
    .then(snap=>{
        let lista=[];

        snap.forEach(d=>lista.push(d.data()));

        lista.sort((a,b)=>a.precio-b.precio);

        let texto = "Comparador:\n";
        lista.forEach(p=>{
            texto += `${p.nombre} - $${p.precio}\n`;
        });

        alert(texto);
    });
}

/* GOOGLE MAPS */
function irMapa(lat,lng){
    window.open(`https://www.google.com/maps?q=${lat},${lng}`);
}

/* VOLVER */
function volver(){
    location.reload();
}

/* LOGOUT */
function logout(){
    firebase.auth().signOut().then(()=>{
        window.location.href="login.html";
    });
}
</script>

</body>
</html>
