<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMarket - Mi Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif;
            background: linear-gradient(rgba(15, 32, 39, 0.9), rgba(30, 136, 229, 0.8)), 
                        url('https://images.unsplash.com/photo-1534452286302-5f563184548a?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-attachment: fixed; color: white;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }

        .header-cliente {
            width: 100%; padding: 30px 20px; text-align: center;
            background: rgba(0,0,0,0.2); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header-cliente h1 { font-weight: 900; font-size: 22px; margin: 0; color: #4fc3f7; }
        .header-cliente p { font-size: 12px; opacity: 0.8; margin-top: 5px; }

        /* BUSCADOR RÁPIDO */
        .search-bar {
            width: 90%; max-width: 400px; margin: -25px auto 20px;
            background: white; border-radius: 30px; display: flex;
            padding: 5px 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .search-bar input {
            border: none; width: 100%; padding: 10px; outline: none;
            font-family: 'Montserrat'; font-weight: 700; color: #333;
        }

        /* SECCIONES */
        .section-title { width: 90%; font-weight: 900; font-size: 14px; margin: 20px 0 10px; color: #ffeb3b; }

        .scroll-x {
            width: 100%; display: flex; overflow-x: auto; gap: 15px;
            padding: 10px 5%; box-sizing: border-box;
        }

        /* TARJETA DE COMERCIO FAVORITO */
        .fav-card {
            min-width: 140px; background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); border-radius: 20px; padding: 15px;
            text-align: center; border: 1px solid rgba(255,255,255,0.2);
        }
        .fav-card img { width: 50px; height: 50px; border-radius: 50%; margin-bottom: 10px; background: #4fc3f7; }
        .fav-card h4 { margin: 0; font-size: 12px; text-transform: uppercase; }

        /* LISTA DE PRODUCTOS RECIENTES */
        .product-list { width: 90%; max-width: 500px; padding-bottom: 100px; }
        .product-item {
            background: rgba(0,0,0,0.4); border-radius: 15px; padding: 15px;
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid #ffeb3b;
        }
        .product-info h3 { margin: 0; font-size: 15px; }
        .product-info span { font-size: 11px; opacity: 0.6; }
        .product-price { font-weight: 900; color: #ffeb3b; text-align: right; }

        /* BARRA INFERIOR (Misma que Index) */
        .nav-bottom {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: rgba(15, 32, 39, 0.98); display: flex;
            justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-btn { text-decoration: none; color: white; opacity: 0.5; font-size: 10px; font-weight: 900; text-align: center; }
        .nav-btn.active { opacity: 1; color: #4fc3f7; }
        .nav-btn i { font-size: 20px; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

<div class="header-cliente">
    <h1 id="nombreUsuario">HOLA, CARGANDO...</h1>
    <p>¿Qué vamos a comprar hoy en San Joaquín?</p>
</div>

<div class="search-bar">
    <input type="text" id="mainSearch" placeholder="Busca pan, leche, harina..." onfocus="irAlMapa()">
</div>

<div class="section-title">⭐ MIS COMERCIOS FAVORITOS</div>
<div class="scroll-x" id="listaFavoritos">
    <div class="fav-card"><h4>Bodega Central</h4></div>
    <div class="fav-card"><h4>Farmacia Vida</h4></div>
    <div class="fav-card"><h4>Panadería 1ro</h4></div>
</div>

<div class="section-title">🕒 ÚLTIMOS PRODUCTOS VISTOS</div>
<div class="product-list" id="recientes">
    <div class="product-item">
        <div class="product-info">
            <h3>Harina Pan 1kg</h3>
            <span>Vendido por: El Éxito</span>
        </div>
        <div class="product-price">Bs. 45,50</div>
    </div>
</div>

<nav class="nav-bottom">
    <a href="index.html" class="nav-btn"><i>📍</i>MAPA</a>
    <a href="perfil_cliente.html" class="nav-btn active"><i>👤</i>PERFIL</a>
    <a href="registro_comercio.html" class="nav-btn"><i>🏪</i>COMERCIO</a>
</nav>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            // Buscamos el nombre en la colección de usuarios (si la creaste)
            // Por ahora usamos el email o un nombre por defecto
            document.getElementById('nombreUsuario').innerText = "HOLA, " + (user.displayName || "CLIENTE");
        } else {
            window.location.href = "auth.html";
        }
    });

    function irAlMapa() {
        window.location.href = "index.html";
    }
</script>

</body>
</html>
