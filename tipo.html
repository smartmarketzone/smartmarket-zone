<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMarket - Selección de Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(rgba(15, 32, 39, 0.8), rgba(30, 136, 229, 0.7)), 
                        url('https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        .card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; padding: 35px 20px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 85%; max-width: 360px; text-align: center; color: white;
        }

        .logo { font-weight: 900; font-size: 28px; margin-bottom: 5px; }
        .logo span { color: #4fc3f7; }
        .slogan { font-size: 11px; opacity: 0.9; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }

        .role-container { display: flex; flex-direction: column; gap: 18px; }

        .role-card {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; padding: 20px; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center;
        }

        .role-card:active { transform: scale(0.96); background: rgba(30, 136, 229, 0.5); }

        .role-tag {
            background: #ffeb3b; color: #000; font-size: 10px;
            font-weight: 900; padding: 4px 14px; border-radius: 5px; margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .role-icon { font-size: 40px; margin-bottom: 8px; }
        h3 { margin: 0; font-size: 19px; font-weight: 700; }
        .role-card p { font-size: 12px; opacity: 0.8; margin-top: 8px; line-height: 1.4; }

        #loader { display: none; margin-top: 15px; font-size: 13px; color: #ffeb3b; font-weight: bold; }

        .logout-box { margin-top: 30px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .logout-btn { font-size: 12px; color: #4fc3f7; cursor: pointer; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">SMART<span>MARKET</span></div>
    <p class="slogan">Selecciona tu perfil de usuario</p>

    <div class="role-container">
        <div class="role-card" onclick="seleccionarRol('comercio')">
            <span class="role-tag">COMERCIO</span> 
            <span class="role-icon">🏪</span>
            <h3>Soy un Comercio</h3>
            <p>Registra tu local en el mapa y publica tus productos.</p>
        </div>

        <div class="role-card" onclick="seleccionarRol('cliente')">
            <span class="role-tag">PERSONA</span>
            <span class="role-icon">🛍️</span>
            <h3>Soy un Cliente</h3>
            <p>Encuentra tiendas y ofertas cerca de tu ubicación.</p>
        </div>
    </div>

    <div id="loader">Cargando perfil...</div>

    <div class="logout-box">
        <span class="logout-btn" onclick="logout()">Cerrar sesión</span>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    const db = firebase.firestore();

    let usuarioActual = null;

    // OBSERVADOR DE SESIÓN: Crucial para que no te regrese al login
    auth.onAuthStateChanged((user) => {
        if (user) {
            usuarioActual = user;
            console.log("Sesión activa:", user.email);
        } else {
            // Solo redirigir si el usuario realmente cerró sesión
            if (!window.isRedirecting) {
                window.location.href = "auth.html";
            }
        }
    });

    function seleccionarRol(tipo) {
        if (!usuarioActual) {
            alert("Estamos verificando tu cuenta, intenta de nuevo en 2 segundos...");
            return;
        }

        // Bloqueamos la UI para evitar múltiples clics
        document.getElementById('loader').style.display = "block";
        window.isRedirecting = true;

        // Guardamos la elección (Pase lo que pase con la DB, redirigimos)
        db.collection("usuarios").doc(usuarioActual.uid).set({
            email: usuarioActual.email,
            tipo: tipo,
            ultimaActualizacion: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true })
        .then(() => {
            irAPagina(tipo);
        })
        .catch(error => {
            console.error("Error al guardar en Firestore:", error);
            // Si las reglas de Firebase fallan, igual dejamos pasar al usuario
            irAPagina(tipo);
        });
    }

    function irAPagina(tipo) {
        if (tipo === 'comercio') {
            window.location.href = "registro_comercio.html";
        } else {
            window.location.href = "cliente.html";
        }
    }

    function logout() {
        auth.signOut().then(() => {
            window.location.href = "auth.html";
        });
    }
</script>

</body>
</html>
