<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMarket - Elige tu Rol</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        .role-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }
        
        .role-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative; /* Para posicionar la etiqueta */
        }
        
        .role-card:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.2);
        }

        /* --- ETIQUETAS NEGRAS CON FONDO RESALTADO --- */
        .role-tag {
            background-color: #ffca28; /* Color amarillo llamativo */
            color: #000000;            /* Letras NEGRAS como pediste */
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 12px;
            border-radius: 50px;       /* Forma de píldora */
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .role-icon {
            font-size: 45px;
            margin-bottom: 10px;
            display: block;
        }
        
        .role-card h3 {
            margin: 0;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
        }
        
        .role-card p {
            margin: 5px 0 0;
            font-size: 13px;
            color: #ddd;
            line-height: 1.4;
        }
    </style>
</head>
<body class="auth-body">

<div class="card">
    <h1 class="logo">Smart<span>Market</span></h1>
    <p class="slogan">Selecciona tu perfil de usuario</p>

    <div class="role-container">
        
        <div class="role-card" onclick="seleccionarRol('comercio')">
            <span class="role-tag">COMERCIO</span> 
            <span class="role-icon">🏪</span>
            <h3>Soy un Comercio</h3>
            <p>Vende tus productos y destaca en el mapa.</p>
        </div>

        <div class="role-card" onclick="seleccionarRol('cliente')">
            <span class="role-tag">PERSONA</span>
            <span class="role-icon">🛍️</span>
            <h3>Soy un Cliente</h3>
            <p>Encuentra las mejores ofertas cerca de ti.</p>
        </div>
    </div>

    <p style="margin-top:25px; font-size:12px; color:#aaa; cursor:pointer;" onclick="firebase.auth().signOut().then(() => window.location.href='auth.html')">
        <u>Cerrar sesión e ir al inicio</u>
    </p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    function seleccionarRol(tipo) {
        const user = firebase.auth().currentUser;
        if (!user) {
            window.location.href = "auth.html";
            return;
        }

        firebase.firestore().collection("usuarios").doc(user.uid).set({
            email: user.email,
            tipo: tipo,
            ultimoAcceso: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true })
        .then(() => {
            window.location.href = (tipo === 'comercio') ? "registro_comercio.html" : "cliente.html";
        })
        .catch(e => alert("Error: " + e.message));
    }
</script>

</body>
</html>
