<style>
/* NUEVO: Animaciones base */
.fade-in {
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.8s ease;
}
.fade-in.visible {
    opacity: 1;
    transform: translateY(0);
}

/* Mejoras visuales */
header {
    background: radial-gradient(circle at top right, #e8f0fe, #ffffff 70%);
}

/* Indicador más moderno */
.indicador {
    background: linear-gradient(135deg, var(--blue), var(--accent));
    color: white;
    border: none;
}

/* Tarjetas visuales mejoradas */
.visual div {
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    transition: 0.4s;
}
.visual div:hover {
    transform: scale(1.05);
}

/* Sección negocio más premium */
.seccion-negocio {
    background: linear-gradient(135deg, #020617, #0f172a);
}

/* Cards con hover */
.biz-card {
    padding: 30px;
    border-radius: 25px;
    transition: 0.3s;
}
.biz-card:hover {
    transform: translateY(-10px);
    background: rgba(255,255,255,0.03);
}

/* BOTÓN PRO */
.btn-ready {
    position: relative;
    overflow: hidden;
}

.btn-ready::after {
    content: '';
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0,210,255,0.3), transparent 70%);
    top: -50%;
    left: -50%;
    animation: glow 4s infinite linear;
}

@keyframes glow {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>

<script>
/* Animación al hacer scroll */
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add("visible");
        }
    });
});

document.querySelectorAll(".paso, .biz-card").forEach(el => {
    el.classList.add("fade-in");
    observer.observe(el);
});
</script>
