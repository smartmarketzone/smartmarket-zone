<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartMarket | Venezuela</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">

<style>
:root {
    --blue:#1a73e8;
    --accent:#00d2ff;
    --dark:#0f172a;
    --gray:#64748b;
}

body {
    margin:0;
    font-family:'Outfit', sans-serif;
    background:#f8fafc;
    color:var(--dark);
}

.hero {
    padding:80px 20px 60px;
    text-align:center;
    background: radial-gradient(circle at top right, #e8f0fe, transparent);
}

.logo {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    margin-bottom:10px;
}

.logo-icon {
    width:45px;
    height:45px;
    border-radius:12px;
    background: linear-gradient(135deg,#1a73e8,#00d2ff);
    display:flex;
    align-items:center;
    justify-content:center;
}

.pin {
    width:14px;
    height:14px;
    background:white;
    border-radius:50%;
}

.logo-text {
    font-weight:900;
    font-size:32px;
    background: linear-gradient(90deg,#1a73e8,#00d2ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p {
    max-width:650px;
    margin:20px auto;
    color:var(--gray);
    font-size:18px;
}

.container {
    max-width:1100px;
    margin:auto;
    padding:40px 20px 120px;
}

.section {
    margin-bottom:60px;
}

.cards {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card {
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.steps {
    display:grid;
    gap:25px;
}

.step {
    display:flex;
    gap:20px;
    align-items:center;
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.step-num {
    width:45px;
    height:45px;
    background:var(--blue);
    color:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

.cta {
    position:fixed;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:center;
}

.btn {
    background:var(--dark);
    color:white;
    padding:18px 50px;
    border:none;
    border-radius:40px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.btn:hover {
    background:var(--blue);
}
</style>
</head>

<body>

<div class="hero">
    <div class="logo">
        <div class="logo-icon"><div class="pin"></div></div>
        <span class="logo-text">SmartMarket</span>
    </div>

    <p>
        Encuentra lo que buscas, donde realmente está.
        SmartMarket conecta productos en tiempo real con tu decisión de compra.
    </p>
</div>

<div class="container">
    <div class="section">
        <h2>¿Por qué SmartMarket?</h2>
        <div class="cards">
            <div class="card"><b>Encuentra rápido</b></div>
            <div class="card"><b>Compara precios</b></div>
            <div class="card"><b>Llega directo</b></div>
        </div>
    </div>
</div>

<div class="cta">
    <button class="btn" onclick="irAuth()">Comenzar ahora 🚀</button>
</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
  authDomain: "smartmarket-zone-e7559.firebaseapp.com",
  projectId: "smartmarket-zone-e7559"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

/* 🔥 CONTROL LOGIN REAL */
firebase.auth().onAuthStateChanged(function(user){
    if(user){
        window.location.href="app.html";
    }
});

/* 🔥 BOTÓN */
function irAuth(){
    window.location.href="login.html";
}
</script>

</body>
</html>
