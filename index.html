<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMarket Venezuela</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --blue: #1e88e5; --cyan: #4fc3f7; --dark: #0f2027; --yellow: #ffeb3b; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; overflow: hidden; }
        
        /* BUSCADOR FLOTANTE */
        .search-container {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 90%; max-width: 450px;
        }
        .search-box {
            width: 100%; padding: 15px 25px; border-radius: 30px; border: none;
            background: white; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            font-size: 14px; outline: none; font-weight: 800; color: #333;
        }

        #map { height: calc(100vh - 75px); width: 100%; z-index: 1; }

        /* POPUP PERSONALIZADO */
        .leaflet-popup-content-wrapper { background: #162a33 !important; color: white !important; border-radius: 15px; padding: 5px; }
        .btn-fav { background: none; border: 1px solid var(--yellow); color: var(--yellow); padding: 5px 10px; border-radius: 8px; font-size: 10px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: 900; }
        .btn-route { background: var(--blue); border: none; color: white; padding: 8px; border-radius: 8px; width: 100%; margin-top: 5px; font-weight: 900; font-size: 10px; cursor: pointer; }

        /* NAV INFERIOR */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 75px; background: #0b171c; border-top: 2px solid var(--cyan);
            display: flex; justify-content: space-around; align-items: center; z-index: 2000;
        }
        .nav-item {
            text-align: center; color: rgba(255,255,255,0.4);
            text-decoration: none; font-size: 9px; font-weight: 900;
            display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1;
        }
        .nav-item.active { color: var(--cyan); }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="buscador" class="search-box" placeholder="🔍 Busca marcas o tiendas en toda Vzla..." oninput="filtrarMapa()">
</div>

<div id="map"></div>

<nav class="bottom-nav">
    <a href="index.html" class="nav-item active"><span class="nav-icon">📍</span>MAPA</a>
    <a href="cliente.html" class="nav-item"><span class="nav-icon">👤</span>PERFIL</a>
    <a href="registro_comercio.html" id="btn-registrar" class="nav-item"><span class="nav-icon">🏪</span>REGISTRAR</a>
    <a href="comercio.html" id="btn-panel" class="nav-item"><span class="nav-icon">📊</span>PANEL</a>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let userUID = null;

    // 1. INICIALIZAR MAPA CENTRADO EN VENEZUELA POR DEFECTO
    const map = L.map('map', { zoomControl: false }).setView([10.4806, -66.8983], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 2. DETECTAR UBICACIÓN REAL DEL USUARIO
    map.locate({setView: true, maxZoom: 15});
    map.on('locationfound', (e) => {
        L.circle(e.latlng, {radius: 100, color: '#4fc3f7'}).addTo(map).bindPopup("Estás aquí");
    });

    // 3. VERIFICAR ROL Y SESIÓN
    firebase.auth().onAuthStateChanged(async (user) => {
        if (user) {
            userUID = user.uid;
            const docUser = await db.collection("usuarios").doc(user.uid).get();
            if (docUser.exists && docUser.data().tipo === "persona") {
                document.getElementById('btn-registrar').style.display = 'none';
                document.getElementById('btn-panel').style.display = 'none';
            }
            
            // Si venimos de una búsqueda en cliente.html, centrar en esa tienda
            const tLat = sessionStorage.getItem('targetLat');
            const tLng = sessionStorage.getItem('targetLng');
            if(tLat) {
                map.setView([tLat, tLng], 18);
                sessionStorage.removeItem('targetLat');
                sessionStorage.removeItem('targetLng');
            }
        }
    });

    let marcadores = [];

    async function cargarMapa(termino = "") {
        marcadores.forEach(m => map.removeLayer(m));
        marcadores = [];

        const localesSnap = await db.collection("comercios").get();
        
        localesSnap.forEach(async (docL) => {
            const dataL = docL.data();
            const idComercio = docL.id;
            const prodsSnap = await db.collection("productos").where("comercioID", "==", idComercio).get();
            
            let htmlP = "";
            let match = false;

            prodsSnap.forEach(docP => {
                const p = docP.data();
                if(termino === "" || p.nombre.toLowerCase().includes(termino.toLowerCase())) {
                    match = true;
                    htmlP += `<div style="display:flex; justify-content:space-between; font-size:11px; border-bottom:1px solid #333; padding:3px 0;">
                                <span>${p.nombre}</span>
                                <b style="color:#ffeb3b">Bs. ${p.precio}</b>
                              </div>`;
                }
            });

            if (match || termino === "" || dataL.nombre.toLowerCase().includes(termino.toLowerCase())) {
                const marker = L.marker([dataL.lat, dataL.lng]).addTo(map);
                marker.bindPopup(`
                    <div style="min-width:180px">
                        <b style="color:#4fc3f7; font-size:14px;">${dataL.nombre.toUpperCase()}</b>
                        <div style="margin:10px 0; max-height:100px; overflow-y:auto;">${htmlP || 'Sin productos'}</div>
                        <button class="btn-route" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${dataL.lat},${dataL.lng}')">🚗 CÓMO LLEGAR</button>
                        <button class="btn-fav" onclick="guardarFavorito('${idComercio}')">⭐ AGREGAR A FAVORITOS</button>
                    </div>
                `);
                marcadores.push(marker);
            }
        });
    }

    async function guardarFavorito(id) {
        if(!userUID) return alert("Inicia sesión para guardar favoritos");
        try {
            await db.collection("usuarios").doc(userUID).collection("favoritos").doc(id).set({
                idComercio: id,
                fecha: new Date()
            });
            alert("💖 Tienda guardada en tus favoritos");
        } catch (e) { alert("Error al guardar"); }
    }

    function filtrarMapa() { cargarMapa(document.getElementById('buscador').value); }
    window.onload = () => cargarMapa();
</script>
</body>
</html>
