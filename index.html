<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMarket Venezuela</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --blue: #1e88e5; --cyan: #4fc3f7; --dark: #0f2027; --yellow: #ffeb3b; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; overflow: hidden; }

        #map { height: calc(100vh - 75px); width: 100%; }

        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 75px; 
            background: #0b171c; border-top: 2px solid var(--cyan); 
            display: flex; justify-content: space-around; align-items: center; 
        }
        .nav-item { 
            text-align: center; color: rgba(255,255,255,0.4); 
            text-decoration: none; font-size: 9px; font-weight: 900; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .nav-item.active { color: var(--cyan); }
    </style>
</head>

<body>

<div id="map"></div>

<nav class="bottom-nav">
    <a href="index.html" class="nav-item active"><span>📍</span>MAPA</a>
    <a href="cliente.html" class="nav-item"><span>👤</span>PERFIL</a>
    <a href="registro_comercio.html" id="btn-registrar" class="nav-item"><span>🏪</span>REGISTRAR</a>
    <a href="comercio.html" id="btn-panel" class="nav-item"><span>📊</span>PANEL</a>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
    authDomain: "smartmarket-zone-e7559.firebaseapp.com",
    projectId: "smartmarket-zone-e7559"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* 🔥 CAMBIO SOLO AQUÍ */
firebase.auth().onAuthStateChanged(async (user) => {
    if (user) {
        const docUser = await db.collection("usuarios").doc(user.uid).get();

        if (docUser.exists && docUser.data().tipo === "persona") {
            document.getElementById('btn-registrar').style.display = 'none';
            document.getElementById('btn-panel').style.display = 'none';
        }

    } else {
        // 👉 SI NO HAY SESIÓN → IR A INICIO (NO LOGIN)
        window.location.href = "inicio.html";
    }
});

/* MAPA */
const map = L.map('map').setView([10.4806, -66.8983], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

map.locate({setView: true, maxZoom: 15});

</script>

</body>
</html>
