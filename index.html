<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMarket Venezuela</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --blue: #1e88e5; --cyan: #4fc3f7; --dark: #0f2027; --yellow: #ffeb3b; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; overflow: hidden; }

        /* --- ESTILOS DEL SPLASH SCREEN --- */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #162a33 0%, #050a0e 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.8s ease-out;
        }
        .logo-container {
            width: 120px; height: 120px; background: var(--cyan);
            border-radius: 30px; display: flex; align-items: center; justify-content: center;
            font-size: 50px; box-shadow: 0 0 30px rgba(79, 195, 247, 0.5);
            animation: pulse 2s infinite;
        }
        .splash-text { margin-top: 20px; font-weight: 900; letter-spacing: 3px; font-size: 18px; color: white; }
        .loading-bar { width: 150px; height: 3px; background: rgba(255,255,255,0.1); margin-top: 15px; border-radius: 5px; overflow: hidden; }
        .progress { width: 0%; height: 100%; background: var(--yellow); animation: load 2.2s forwards; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); } }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }

        /* --- RESTO DE LA APP --- */
        .search-container { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 450px; }
        .search-box { width: 100%; padding: 15px 25px; border-radius: 30px; border: none; background: white; box-shadow: 0 15px 35px rgba(0,0,0,0.4); font-size: 14px; outline: none; font-weight: 800; color: #333; }
        #map { height: calc(100vh - 75px); width: 100%; z-index: 1; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #0b171c; border-top: 2px solid var(--cyan); display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-item { text-align: center; color: rgba(255,255,255,0.4); text-decoration: none; font-size: 9px; font-weight: 900; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
        .nav-item.active { color: var(--cyan); }
    </style>
</head>
<body>

<div id="splash">
    <div class="logo-container">🛒</div>
    <div class="splash-text">SMARTMARKET</div>
    <div style="font-size: 10px; color: var(--cyan); margin-top: 5px;">VENEZUELA</div>
    <div class="loading-bar"><div class="progress"></div></div>
</div>

<div class="search-container">
    <input type="text" id="buscador" class="search-box" placeholder="🔍 Busca marcas o tiendas en Venezuela..." oninput="filtrarMapa()">
</div>

<div id="map"></div>

<nav class="bottom-nav">
    <a href="index.html" class="nav-item active"><span>📍</span>MAPA</a>
    <a href="cliente.html" class="nav-item"><span>👤</span>PERFIL</a>
    <a href="registro_comercio.html" id="btn-registrar" class="nav-item"><span>🏪</span>REGISTRAR</a>
    <a href="comercio.html" id="btn-panel" class="nav-item"><span>📊</span>PANEL</a>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- LÓGICA DEL SPLASH SCREEN ---
    window.addEventListener('load', () => {
        setTimeout(() => {
            const splash = document.getElementById('splash');
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 800);
        }, 2500); // Duración de 2.5 segundos
    });

    const map = L.map('map', { zoomControl: false }).setView([10.4806, -66.8983], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    map.locate({setView: true, maxZoom: 15});

    firebase.auth().onAuthStateChanged(async (user) => {
        if (user) {
            const docUser = await db.collection("usuarios").doc(user.uid).get();
            if (docUser.exists && docUser.data().tipo === "persona") {
                document.getElementById('btn-registrar').style.display = 'none';
                document.getElementById('btn-panel').style.display = 'none';
            }
        } else {
            // Si no hay sesión, mandarlo al login después del splash
            setTimeout(() => window.location.href = "auth.html", 3000);
        }
    });

    // ... (Mantén aquí tus funciones cargarMapa, filtrarMapa y guardarFavorito de la versión anterior) ...
    // Nota: Asegúrate de copiar las funciones cargarMapa() y filtrarMapa() del código previo para que los marcadores aparezcan.

</script>
</body>
</html>
