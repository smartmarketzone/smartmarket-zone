<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMarket - San Joaquín</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #0f2027; color: white; overflow: hidden; }
        
        /* BUSCADOR */
        .search-container {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 90%; max-width: 400px;
        }
        .search-box {
            width: 100%; padding: 12px 20px; border-radius: 25px; border: none;
            background: rgba(255, 255, 255, 0.95); box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            font-size: 14px; outline: none; font-weight: 800; text-align: center; color: #333;
        }

        /* MAPA */
        #map { height: calc(100vh - 70px); width: 100%; z-index: 1; }

        /* NAVEGACIÓN INFERIOR (CONECTADA A TUS ARCHIVOS) */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 70px; background: #0f2027; border-top: 2px solid #4fc3f7;
            display: flex; justify-content: space-around; align-items: center; z-index: 2000;
        }
        .nav-item {
            text-align: center; color: rgba(255,255,255,0.4);
            text-decoration: none; font-size: 9px; font-weight: 900;
            display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1;
        }
        .nav-item.active { color: #4fc3f7; }
        .nav-icon { font-size: 20px; }

        /* ESTILO DE LAS VENTANAS DEL MAPA */
        .leaflet-popup-content-wrapper { 
            background: #162a33 !important; 
            color: white !important; 
            border-radius: 12px; 
            border: 1px solid #4fc3f7;
        }
        .leaflet-popup-tip { background: #4fc3f7 !important; }
        .p-price { color: #ffeb3b; font-weight: 900; }
        .p-row { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 5px 0; font-size: 12px; }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="buscador" class="search-box" placeholder="🔍 ¿Qué buscas en San Joaquín?" oninput="filtrarMapa()">
</div>

<div id="map"></div>

<nav class="bottom-nav">
    <a href="index.html" class="nav-item active">
        <span class="nav-icon">📍</span> MAPA
    </a>
    <a href="cliente.html" class="nav-item">
        <span class="nav-icon">👤</span> SOY PERSONA
    </a>
    <a href="registro_comercio.html" class="nav-item">
        <span class="nav-icon">🏪</span> REGISTRAR
    </a>
    <a href="comercio.html" class="nav-item">
        <span class="nav-icon">📊</span> MI PANEL
    </a>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    // Tu Configuración de Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Centrar mapa en San Joaquín
    const map = L.map('map', { zoomControl: false }).setView([10.2644, -67.7915], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let marcadores = [];

    // Cargar los locales en el mapa
    async function cargarMapa(termino = "") {
        // Limpiar mapa antes de recargar
        marcadores.forEach(m => map.removeLayer(m));
        marcadores = [];

        const localesSnap = await db.collection("comercios").get();
        
        localesSnap.forEach(async (docL) => {
            const dataL = docL.data();
            const comID = docL.id;

            // Obtener productos de este comercio
            const prodsSnap = await db.collection("productos").where("comercioID", "==", comID).get();
            
            let listaHtml = "";
            let coincideBusqueda = false;

            prodsSnap.forEach(docP => {
                const p = docP.data();
                if(termino === "" || p.nombre.toLowerCase().includes(termino.toLowerCase())) {
                    coincideBusqueda = true;
                    listaHtml += `
                        <div class="p-row">
                            <span>${p.nombre}</span>
                            <span class="p-price">Bs. ${new Intl.NumberFormat('de-DE', {minimumFractionDigits: 2}).format(p.precio)}</span>
                        </div>`;
                }
            });

            // Si el producto está en este local o no hay búsqueda, poner marcador
            if (coincideBusqueda || termino === "") {
                const marker = L.marker([dataL.lat, dataL.lng]).addTo(map);
                marker.bindPopup(`
                    <b style="color:#4fc3f7; text-transform:uppercase;">${dataL.nombre}</b>
                    <div style="margin-top:10px; min-width:180px;">
                        ${listaHtml || '<p style="font-size:10px; opacity:0.5;">Sin productos registrados</p>'}
                    </div>
                `);
                marcadores.push(marker);
            }
        });
    }

    function filtrarMapa() {
        const input = document.getElementById('buscador').value;
        cargarMapa(input);
    }

    // Carga inicial al abrir la página
    window.onload = () => cargarMapa();
</script>
</body>
</html>
