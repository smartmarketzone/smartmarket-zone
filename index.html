<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMarket VZLA - Mapa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #1e88e5; --cyan: #4fc3f7; --dark: #0f2027; --yellow: #ffeb3b; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--dark); overflow: hidden; }
        
        /* SPLASH SCREEN INTEGRADO */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050a0e; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: 0.5s; }
        .loader { width: 40px; height: 40px; border: 4px solid var(--cyan); border-top: 4px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* BUSCADOR */
        .search-bar { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 450px; }
        .search-input { width: 100%; padding: 15px 25px; border-radius: 30px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-weight: 800; outline: none; }

        #map { height: 100vh; width: 100%; z-index: 1; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #0b171c; border-top: 2px solid var(--cyan); display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-item { text-align: center; color: rgba(255,255,255,0.4); text-decoration: none; font-size: 10px; font-weight: 900; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item.active { color: var(--cyan); }

        /* POPUPS */
        .leaflet-popup-content-wrapper { background: #162a33 !important; color: white !important; border-radius: 15px; }
        .btn-pop { width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; border: none; font-weight: 900; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

<div id="splash"><div class="loader"></div><p style="margin-top:15px; font-weight:900; letter-spacing:2px;">SMARTMARKET VZLA</p></div>

<div class="search-bar">
    <input type="text" id="buscador" class="search-input" placeholder="🔍 ¿Qué buscas en Venezuela?" oninput="filtrarMapa()">
</div>

<div id="map"></div>

<nav class="bottom-nav">
    <a href="index.html" class="nav-item active"><span>📍</span>MAPA</a>
    <a href="cliente.html" class="nav-item"><span>👤</span>PERFIL</a>
    <a href="registro_comercio.html" id="btn-registrar" class="nav-item"><span>🏪</span>REGISTRAR</a>
    <a href="comercio.html" id="btn-panel" class="nav-item"><span>📊</span>PANEL</a>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let map, marcadores = [], userUID = null;

    // Inicializar Mapa
    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([10.48, -66.90], 6); // Centro VZLA
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // GPS del usuario
        map.locate({setView: true, maxZoom: 15});
        map.on('locationfound', (e) => L.circle(e.latlng, {radius: 50, color: '#4fc3f7'}).addTo(map));
        
        // Quitar Splash
        setTimeout(() => document.getElementById('splash').style.display = 'none', 1500);
    }

    // Seguridad y Roles
    firebase.auth().onAuthStateChanged(async (user) => {
        if (user) {
            userUID = user.uid;
            const doc = await db.collection("usuarios").doc(user.uid).get();
            if (doc.exists && doc.data().tipo === "persona") {
                document.getElementById('btn-registrar').style.display = 'none';
                document.getElementById('btn-panel').style.display = 'none';
            }
            // Si viene de una búsqueda específica
            const tLat = sessionStorage.getItem('targetLat');
            if(tLat) {
                map.setView([tLat, sessionStorage.getItem('targetLng')], 18);
                sessionStorage.clear();
            }
        }
        cargarLocales();
    });

    async function cargarLocales(filtro = "") {
        marcadores.forEach(m => map.removeLayer(m));
        marcadores = [];

        const snapComercios = await db.collection("comercios").get();
        
        snapComercios.forEach(async (docL) => {
            const dataL = docL.data();
            const snapProds = await db.collection("productos").where("comercioID", "==", docL.id).get();
            
            let productosHtml = "";
            let tieneProducto = false;

            snapProds.forEach(docP => {
                const p = docP.data();
                if(filtro === "" || p.nombre.toLowerCase().includes(filtro.toLowerCase())) {
                    tieneProducto = true;
                    productosHtml += `<div style="display:flex; justify-content:space-between; font-size:11px; margin-top:4px; border-bottom:1px solid #333;">
                                        <span>${p.nombre}</span> <b style="color:var(--yellow)">Bs.${p.precio}</b>
                                      </div>`;
                }
            });

            if(tieneProducto || filtro === "" || dataL.nombre.toLowerCase().includes(filtro.toLowerCase())) {
                const m = L.marker([dataL.lat, dataL.lng]).addTo(map);
                m.bindPopup(`
                    <b style="color:var(--cyan); font-size:14px;">${dataL.nombre.toUpperCase()}</b>
                    <div style="max-height:80px; overflow-y:auto; margin:10px 0;">${productosHtml || 'Sin productos'}</div>
                    <button class="btn-pop" style="background:var(--blue); color:white;" onclick="window.open('https://www.google.com/maps?q=${dataL.lat},${dataL.lng}')">🚗 CÓMO LLEGAR</button>
                    <button class="btn-pop" style="background:var(--yellow);" onclick="addFav('${docL.id}')">⭐ GUARDAR</button>
                `);
                marcadores.push(m);
            }
        });
    }

    async function addFav(id) {
        if(!userUID) return alert("Inicia sesión primero");
        await db.collection("usuarios").doc(userUID).collection("favoritos").doc(id).set({idComercio: id, fecha: new Date()});
        alert("💖 Guardado en tus favoritos");
    }

    function filtrarMapa() { cargarLocales(document.getElementById('buscador').value); }

    window.onload = initMap;
</script>
</body>
</html>
