<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMarket | San Joaquín</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2fe; --bg: #0a0f12; --card: #161c20; --text: #e0e0e0; }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Poppins', sans-serif; color: var(--text); overflow: hidden; }

        /* MAPA ESTILO SILVER/DARK */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .leaflet-tile { filter: brightness(0.6) invert(100%) contrast(90%) hue-rotate(200deg) saturate(0.3); }

        /* BUSCADOR SUPERIOR */
        .header-ui { position: fixed; top: 20px; width: 100%; z-index: 1000; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .search-bar { width: 90%; max-width: 400px; background: rgba(22, 28, 32, 0.9); backdrop-filter: blur(10px); border-radius: 15px; padding: 12px 20px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .search-bar input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 14px; }

        /* FILTROS RÁPIDOS PARA PERSONAS */
        .quick-filters { display: flex; gap: 8px; width: 90%; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .filter-chip { background: var(--card); padding: 8px 15px; border-radius: 20px; font-size: 11px; white-space: nowrap; border: 1px solid rgba(255,255,255,0.05); font-weight: 600; cursor: pointer; }
        .filter-chip.active { background: var(--accent); color: #000; }

        /* PANEL INFERIOR (MODAL) */
        #store-modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 75vh; background: var(--card); border-radius: 30px 30px 0 0; z-index: 2000; transition: 0.4s cubic-bezier(0.1, 0.5, 0.1, 1); padding: 25px; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        #store-modal.active { bottom: 0; }
        .drag-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 20px; }

        /* NAVEGACIÓN */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(10, 15, 18, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; z-index: 1500; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-btn { color: rgba(255,255,255,0.4); text-decoration: none; text-align: center; font-size: 10px; flex: 1; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn i { display: block; font-size: 20px; margin-bottom: 2px; }

        .inventory-list { margin-top: 15px; max-height: 250px; overflow-y: auto; }
        .prod-item { display: flex; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .price { color: var(--accent); font-weight: 800; }
    </style>
</head>
<body>

<div class="header-ui">
    <div class="search-bar">
        <input type="text" id="main-search" placeholder="Buscar productos o tiendas..." oninput="filtrarTodo()">
    </div>
    <div class="quick-filters" id="client-filters">
        <div class="filter-chip" onclick="filtrarCat('comida')">🍔 Comida</div>
        <div class="filter-chip" onclick="filtrarCat('salud')">💊 Farmacias</div>
        <div class="filter-chip" onclick="showFavs()">⭐ Mis Favoritos</div>
        <div class="filter-chip" onclick="filtrarCat('ferreteria')">🛠️ Ferretería</div>
    </div>
</div>

<div id="map"></div>

<div id="store-modal">
    <div class="drag-handle" onclick="closeModal()"></div>
    <h2 id="m-name" style="margin:0; font-weight:800; color:var(--accent);">TIENDA</h2>
    <p id="m-status" style="font-size:12px; opacity:0.6; margin-bottom:20px;">Abierto ahora • San Joaquín</p>
    
    <h4 style="font-size:13px; text-transform:uppercase; letter-spacing:1px;">Catálogo disponible</h4>
    <div class="inventory-list" id="m-inventory"></div>
    
    <button onclick="goGPS()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:15px; font-weight:800; margin-top:15px; cursor:pointer;">¿CÓMO LLEGAR? 🚗</button>
</div>

<nav class="nav-bar">
    <a href="index.html" class="nav-btn active"><span>📍</span>MAPA</a>
    <a href="cliente.html" class="nav-btn"><span>👤</span>MI PERFIL</a>
    <a href="registro_comercio.html" id="btn-reg" class="nav-btn" style="display:none;"><span>🏪</span>REGISTRAR</a>
    <a href="comercio.html" id="btn-adm" class="nav-btn" style="display:none;"><span>📊</span>PANEL</a>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let map, markers = [], currentLat, currentLng;

    // --- LÓGICA DE GABRIEL ADMIN Y PERSONAS ---
    firebase.auth().onAuthStateChanged(async (user) => {
        if (user) {
            const adminEmail = "gabriel01cvenus@gmail.com";
            const doc = await db.collection("usuarios").doc(user.uid).get();
            const userData = doc.exists ? doc.data() : {};
            
            // Si eres GABRIEL o eres COMERCIO, ves los botones de registro
            if (user.email === adminEmail || userData.tipo === "comercio") {
                document.getElementById('btn-reg').style.display = 'block';
                document.getElementById('btn-adm').style.display = 'block';
                console.log("Acceso de gestión activado.");
            } else {
                // Si eres PERSONA, ocultamos registro y mostramos tus datos en Perfil (cliente.html)
                console.log("Modo Cliente: Solo funciones de búsqueda.");
            }
        }
    });

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([10.267, -67.788], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        setTimeout(() => map.invalidateSize(), 500);
        loadStores();
    }

    async function loadStores(filter = "") {
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        const snap = await db.collection("comercios").get();
        snap.forEach(doc => {
            const d = doc.data();
            if(filter === "" || d.nombre.toLowerCase().includes(filter.toLowerCase())) {
                const m = L.marker([d.lat, d.lng]).addTo(map);
                m.on('click', () => openModal(doc.id, d));
                markers.push(m);
            }
        });
    }

    async function openModal(id, data) {
        document.getElementById('m-name').innerText = data.nombre.toUpperCase();
        currentLat = data.lat; currentLng = d.lng;
        
        const inv = document.getElementById('m-inventory');
        inv.innerHTML = "Cargando productos...";
        
        const prods = await db.collection("productos").where("comercioID", "==", id).get();
        inv.innerHTML = prods.empty ? "No hay productos aún." : "";
        prods.forEach(p => {
            const pd = p.data();
            inv.innerHTML += `
                <div class="prod-item">
                    <span>${pd.nombre}</span>
                    <span class="price">Bs. ${pd.precio}</span>
                </div>`;
        });
        document.getElementById('store-modal').classList.add('active');
    }

    function closeModal() { document.getElementById('store-modal').classList.remove('active'); }
    function filtrarTodo() { loadStores(document.getElementById('main-search').value); }
    function goGPS() { window.open(`https://www.google.com/maps?q=${currentLat},${currentLng}`); }

    window.onload = initMap;
</script>
</body>
</html>
