<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMarket VZLA - Mapa</title>
    <link rel="icon" href="https://fav.farm/🛒">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #1e88e5; --cyan: #00d2ff; --dark: #050a0e; --yellow: #ffeb3b; }
        html, body { height: 100vh; width: 100vw; margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; color: white; }
        
        /* CONTENEDOR DEL MAPA (A prueba de fallos) */
        #map-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #050a0e; }
        #map { width: 100%; height: 100%; }

        /* MAGIA CYBERPUNK: Filtro para oscurecer el mapa de OpenStreetMap */
        .leaflet-tile { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        /* BUSCADOR EFECTO CRISTAL */
        .search-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 450px; }
        .search-box { 
            width: 100%; padding: 15px 25px; border-radius: 30px; 
            background: rgba(5, 10, 14, 0.7); backdrop-filter: blur(15px);
            border: 1px solid var(--cyan); color: white;
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.2); font-weight: 800; outline: none; box-sizing: border-box;
        }
        .search-box::placeholder { color: rgba(255,255,255,0.6); }

        /* MODAL EFECTO CRISTAL */
        #store-modal { 
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 65vh; 
            background: rgba(11, 23, 28, 0.85); backdrop-filter: blur(20px);
            border-top: 2px solid var(--cyan); border-radius: 30px 30px 0 0; 
            z-index: 3000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1); 
            padding: 30px 25px; box-sizing: border-box; box-shadow: 0 -10px 40px rgba(0,0,0,0.8); overflow-y: auto; 
        }
        #store-modal.active { bottom: 0; }
        
        .modal-drag { width: 50px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 10px; margin: -10px auto 20px; }
        
        /* NAVEGACIÓN INFERIOR NEÓN */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 80px; 
            background: rgba(5, 10, 14, 0.9); backdrop-filter: blur(15px);
            border-top: 1px solid rgba(0, 210, 255, 0.3); box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            display: flex; justify-content: space-around; align-items: center; z-index: 2000; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { text-align: center; color: rgba(255,255,255,0.4); text-decoration: none; font-size: 10px; font-weight: 900; flex: 1; display: flex; flex-direction: column; transition: 0.3s; }
        .nav-item.active { color: var(--cyan); text-shadow: 0 0 10px rgba(0, 210, 255, 0.5); }
        .nav-item span { font-size: 20px; margin-bottom: 5px; filter: grayscale(100%); transition: 0.3s; }
        .nav-item.active span { filter: grayscale(0%); }
        
        /* ELEMENTOS DEL INVENTARIO */
        .inventory-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px; }
        .inventory-item:last-child { border-bottom: none; }
        
        .btn-neon { width: 100%; padding: 15px; margin-top: 20px; border-radius: 15px; border: none; background: linear-gradient(90deg, var(--blue), var(--cyan)); color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3); }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="buscador" class="search-box" placeholder="🔍 Buscar Tiendas o Productos..." oninput="filtrarMapa()">
</div>

<div id="map-container">
    <div id="map"></div>
</div>

<div id="store-modal">
    <div class="modal-drag" onclick="cerrarDetalle()"></div>
    <span style="font-size:10px; background:var(--yellow); color:black; padding:4px 10px; border-radius:20px; font-weight:900;">TIENDA VERIFICADA</span>
    <h2 id="store-name" style="color:var(--cyan); margin: 10px 0; text-transform: uppercase; font-size: 24px; letter-spacing: -1px;">NOMBRE DE TIENDA</h2>
    
    <div style="margin-top:25px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05);">
        <h3 style="margin-top:0; font-size: 12px; color: rgba(255,255,255,0.5);">INVENTARIO ACTUAL</h3>
        <div id="modal-products"></div>
    </div>
    
    <button id="btn-gps" class="btn-neon">🚗 TRAZAR RUTA GPS</button>
</div>

<nav class="bottom-nav">
    <a href="index.html" class="nav-item active"><span>📍</span>MAPA</a>
    <a href="cliente.html" class="nav-item"><span>👤</span>PERFIL</a>
    <a href="registro_comercio.html" id="nav-reg" class="nav-item" style="display:none;"><span>🏪</span>UBICACIÓN</a>
    <a href="comercio.html" id="nav-pan" class="nav-item" style="display:none;"><span>📊</span>PANEL</a>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let map, marcadores = [];

    // --- LÓGICA DE ROLES Y ACCESO MAESTRO (ADMIN) ---
    firebase.auth().onAuthStateChanged(async (user) => {
        if (user) {
            // 👇👇👇 ¡AQUÍ ESTÁ EL SECRETO! 👇👇👇
            // BORRA "TU_CORREO_AQUI@gmail.com" Y PON TU CORREO REAL ENTRE LAS COMILLAS
            const correosAdmin = ["gabriel01cvenus@gmail.com"]; 
            // 👆👆👆👆👆👆👆👆👆👆👆👆👆👆👆👆👆👆👆👆

            const doc = await db.collection("usuarios").doc(user.uid).get();
            let tieneAcceso = false;

            // Verificamos si es comercio en la DB o si su correo está en la lista Admin
            if (doc.exists && (doc.data().tipo === "comercio" || doc.data().tipo === "admin")) {
                tieneAcceso = true;
            } else if (correosAdmin.includes(user.email)) {
                tieneAcceso = true; // Acceso forzado por correo
            }

            if (tieneAcceso) {
                document.getElementById('nav-reg').style.display = 'flex';
                document.getElementById('nav-pan').style.display = 'flex';
                console.log("🔥 Permisos de Comercio/Admin concedidos para:", user.email);
            } else {
                console.log("👤 Modo Cliente activado para:", user.email);
            }
        }
    });

    // --- INICIALIZACIÓN DEL MAPA A PRUEBA DE FALLOS ---
    function iniciarMapa() {
        try {
            console.log("Iniciando motor de mapas...");
            map = L.map('map', { zoomControl: false }).setView([10.29, -67.79], 14);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            // Forzamos el recálculo del tamaño para evitar la pantalla negra
            setTimeout(() => { map.invalidateSize(); }, 800);
            
            cargarComercios();
        } catch (error) {
            console.error("Error al cargar el mapa:", error);
            alert("Hubo un problema cargando los gráficos del mapa. Intenta recargar la página.");
        }
    }

    async function cargarComercios(filtro = "") {
        marcadores.forEach(m => map.removeLayer(m));
        marcadores = [];
        const snap = await db.collection("comercios").get();
        
        snap.forEach(doc => {
            const data = doc.data();
            if(filtro === "" || data.nombre.toLowerCase().includes(filtro.toLowerCase())) {
                const m = L.marker([data.lat, data.lng]).addTo(map);
                m.on('click', () => {
                    document.getElementById('store-name').innerText = data.nombre;
                    document.getElementById('btn-gps').onclick = () => window.open(`https://www.google.com/maps?q=${data.lat},${data.lng}`);
                    cargarProds(doc.id);
                    document.getElementById('store-modal').classList.add('active');
                });
                marcadores.push(m);
            }
        });
    }

    async function cargarProds(id) {
        const cont = document.getElementById('modal-products');
        cont.innerHTML = "<p style='color:var(--cyan); font-weight:bold;'>Cargando datos de la red...</p>";
        const snap = await db.collection("productos").where("comercioID", "==", id).get();
        cont.innerHTML = "";
        
        if(snap.empty) cont.innerHTML = "<p style='opacity:0.5'>Inventario no disponible.</p>";
        
        snap.forEach(p => {
            cont.innerHTML += `<div class="inventory-item">
                <span style="font-weight:700;">${p.data().nombre}</span> 
                <b style="color:var(--yellow); font-size:16px;">Bs. ${p.data().precio.toFixed(2)}</b>
            </div>`;
        });
    }

    function cerrarDetalle() { document.getElementById('store-modal').classList.remove('active'); }
    function filtrarMapa() { cargarComercios(document.getElementById('buscador').value); }

    // El truco definitivo para que el mapa no se quede negro:
    // Esperamos a que la ventana esté 100% dibujada antes de lanzar Leaflet
    window.addEventListener('load', iniciarMapa);
</script>
</body>
</html>
