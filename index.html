<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMarket | San Joaquín</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00ffcc; --pink: #ff007f; --royal: #6200ea; --dark: #020508; }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--dark); font-family: 'Outfit', sans-serif; color: white; overflow: hidden; }

        /* EL MAPA LLAMATIVO (COLORES SATURADOS) */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        /* Filtro de color para máxima atracción visual */
        .leaflet-tile { 
            filter: invert(100%) hue-rotate(170deg) brightness(1.2) contrast(1.1) saturate(1.8); 
        }

        /* BUSCADOR ESTILO FLOTANTE */
        .ui-top { position: fixed; top: 20px; width: 100%; z-index: 1000; padding: 0 15px; box-sizing: border-box; }
        .search-glass { 
            background: rgba(2, 5, 8, 0.8); backdrop-filter: blur(12px);
            border-radius: 20px; padding: 15px 20px; border: 2px solid var(--neon);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); display: flex; align-items: center;
        }
        .search-glass input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 16px; font-weight: 700; }

        /* CHIPS DE CATEGORÍAS DE COLORES */
        .category-scroll { display: flex; gap: 10px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .chip { 
            padding: 10px 18px; border-radius: 15px; font-size: 12px; font-weight: 900; 
            white-space: nowrap; text-transform: uppercase; border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .c-food { background: #ff4757; color: white; }
        .c-health { background: #2ed573; color: white; }
        .c-fav { background: #ffa502; color: white; }

        /* MODAL DE TIENDA COLORIDO */
        #store-modal { 
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 70vh; 
            background: #0a0e14; border-radius: 35px 35px 0 0; z-index: 3000; 
            transition: 0.5s cubic-bezier(0.1, 0.8, 0.2, 1); padding: 30px;
            box-shadow: 0 -15px 50px rgba(0, 255, 204, 0.2); 
        }
        #store-modal.active { bottom: 0; }

        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; height: 75px; 
            background: #020508; display: flex; justify-content: space-around; 
            align-items: center; z-index: 2000; border-top: 2px solid var(--neon);
        }
        .nav-btn { color: rgba(255,255,255,0.3); text-decoration: none; font-size: 10px; font-weight: 900; text-align: center; }
        .nav-btn.active { color: var(--neon); transform: scale(1.1); }
        .nav-btn i { display: block; font-size: 24px; margin-bottom: 5px; }

        .prod-card { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; 
            margin-bottom: 10px; border-left: 4px solid var(--neon); display: flex; justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="ui-top">
    <div class="search-glass">
        <input type="text" id="find" placeholder="🚀 ¿Qué buscas hoy en San Joaquín?" oninput="buscar()">
    </div>
    <div class="category-scroll">
        <button class="chip c-food" onclick="filter('comida')">🍔 COMIDA</button>
        <button class="chip c-health" onclick="filter('salud')">💊 FARMACIA</button>
        <button class="chip c-fav" onclick="favs()">⭐ FAVORITOS</button>
    </div>
</div>

<div id="map"></div>

<div id="store-modal">
    <div onclick="closeM()" style="width:50px; height:6px; background:rgba(255,255,255,0.2); margin: -10px auto 25px; border-radius:10px;"></div>
    <h2 id="m-name" style="margin:0; font-size:28px; color:var(--neon); font-weight:900;">TIENDA</h2>
    <p style="color:#ff007f; font-weight:800; font-size:12px;">📍 UBICACIÓN VERIFICADA</p>
    <div id="m-list" style="margin-top:20px; max-height: 250px; overflow-y:auto;"></div>
    <button onclick="gps()" style="width:100%; padding:18px; background:var(--neon); color:black; border:none; border-radius:18px; font-weight:900; font-size:16px; margin-top:20px;">LLEVAME AQUÍ 🚗</button>
</div>

<nav class="nav-bar">
    <a href="index.html" class="nav-btn active"><span>📍</span>MAPA</a>
    <a href="cliente.html" class="nav-btn"><span>👤</span>PERFIL</a>
    <a href="registro_comercio.html" id="nav-reg" class="nav-btn" style="display:none;"><span>🏪</span>REGISTRAR</a>
    <a href="comercio.html" id="nav-pan" class="nav-btn" style="display:none;"><span>📊</span>PANEL</a>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let map, markers = [], cLat, cLng;

    // --- ACCESO GABRIEL (REFORZADO) ---
    firebase.auth().onAuthStateChanged(async (user) => {
        if (user) {
            const admin = "gabriel01cvenus@gmail.com";
            const doc = await db.collection("usuarios").doc(user.uid).get();
            if (user.email === admin || (doc.exists && doc.data().tipo === "comercio")) {
                document.getElementById('nav-reg').style.display = 'block';
                document.getElementById('nav-pan').style.display = 'block';
            }
        }
    });

    function init() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([10.267, -67.788], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        setTimeout(() => map.invalidateSize(), 600);
        load();
    }

    async function load(f = "") {
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        const snap = await db.collection("comercios").get();
        snap.forEach(doc => {
            const d = doc.data();
            if(f === "" || d.nombre.toLowerCase().includes(f.toLowerCase())) {
                const m = L.marker([d.lat, d.lng]).addTo(map);
                m.on('click', () => openM(doc.id, d));
                markers.push(m);
            }
        });
    }

    async function openM(id, d) {
        document.getElementById('m-name').innerText = d.nombre.toUpperCase();
        cLat = d.lat; cLng = d.lng;
        const list = document.getElementById('m-list');
        list.innerHTML = "Cargando...";
        const prods = await db.collection("productos").where("comercioID", "==", id).get();
        list.innerHTML = prods.empty ? "Sin stock." : "";
        prods.forEach(p => {
            list.innerHTML += `<div class="prod-card"><span>${p.data().nombre}</span><b style="color:var(--neon)">Bs. ${p.data().precio}</b></div>`;
        });
        document.getElementById('store-modal').classList.add('active');
    }

    function closeM() { document.getElementById('store-modal').classList.remove('active'); }
    function buscar() { load(document.getElementById('find').value); }
    function gps() { window.open(`https://www.google.com/maps/dir/?api=1&destination=${cLat},${cLng}`); }

    window.onload = init;
</script>
</body>
</html>
