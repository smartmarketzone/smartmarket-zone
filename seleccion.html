<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selecciona tu perfil | SmartMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body {
    font-family:'Outfit', sans-serif;
    text-align:center;
    overflow-x:hidden;
    color:white;
}

/* 🔥 FONDO PRO IGUAL QUE LOGIN */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
        linear-gradient(rgba(15,32,39,0.85), rgba(32,58,67,0.9)),
        url('https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=1600&q=80');
    background-size:cover;
    background-position:center;
    z-index:-2;
}

/* RED */
#networkCanvas {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

/* PERSONA FLOTANTE */
.network-person {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 90px;
    height: 90px;
    background-image: url('https://cdn-icons-png.flaticon.com/512/1946/1946429.png');
    background-size: cover;
    z-index: 2;
    opacity: 0.9;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* LOGO */
.logo {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-top:40px;
}

.logo-box {
    background: linear-gradient(135deg,#1a73e8,#00d2ff);
    color:white;
    padding:10px;
    border-radius:10px;
    font-weight:900;
}

/* TEXTOS */
h1 {
    margin-top:20px;
}

p {
    color:#cbd5e1;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
    padding:40px;
    max-width:900px;
    margin:auto;
}

/* CARD PRO */
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius:20px;
    padding:20px;
    cursor:pointer;
    box-shadow:0 20px 50px rgba(0,0,0,0.6);
    transition: all 0.4s ease;
    overflow: hidden;
    position: relative;
    border:1px solid rgba(255,255,255,0.1);
}

.card:hover {
    transform:translateY(-12px) scale(1.04);
    box-shadow:0 25px 60px rgba(0,0,0,0.8);
}

/* EFECTO BRILLO */
.card::before {
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background: linear-gradient(120deg,transparent,rgba(255,255,255,0.2),transparent);
    transition:0.6s;
}

.card:hover::before {
    left:100%;
}

/* IMÁGENES */
.img {
    height:150px;
    border-radius:15px;
    margin-bottom:15px;
    background-size: cover;
    background-position: center;
}

.img-persona {
    background-image: url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?auto=format&fit=crop&w=500&q=80');
}

.img-comercio {
    background-image: url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&w=500&q=80');
}

#mainContent {
    position: relative;
    z-index: 3;
    display:none;
}

/* LOADING */
.loader{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f2027;
    z-index:5;
    font-size:18px;
}
</style>
</head>

<body>

<div class="loader" id="loader">Cargando...</div>

<canvas id="networkCanvas"></canvas>
<div class="network-person"></div>

<div id="mainContent">

<div class="logo">
    <div class="logo-box">SM</div>
    <h2>SmartMarket</h2>
</div>

<h1>¿Cómo quieres usar SmartMarket?</h1>
<p>Selecciona la opción que mejor se adapte a ti</p>

<div class="grid">

    <div class="card" onclick="seleccionar('persona')">
        <div class="img img-persona"></div>
        <h3>Soy Persona</h3>
        <p>Encuentra productos, compara precios y compra mejor.</p>
    </div>

    <div class="card" onclick="seleccionar('comercio')">
        <div class="img img-comercio"></div>
        <h3>Soy Comercio</h3>
        <p>Publica tu inventario y atrae clientes cercanos.</p>
    </div>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
  authDomain: "smartmarket-zone-e7559.firebaseapp.com",
  projectId: "smartmarket-zone-e7559"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const db = firebase.firestore();

/* 🔥 CONTROL TOTAL */
firebase.auth().onAuthStateChanged(function(user){

    if(!user){
        window.location.href="login.html";
        return;
    }

    db.collection("usuarios").doc(user.uid).get()
    .then(doc=>{

        document.getElementById("loader").style.display="none";

        if(doc.exists && doc.data().tipo){

            if(doc.data().tipo === "persona"){
                window.location.href="cliente.html";
            }else{
                window.location.href="comercio.html";
            }

        }else{
            document.getElementById("mainContent").style.display="block";
        }

    })
    .catch(()=>{
        document.getElementById("loader").style.display="none";
        document.getElementById("mainContent").style.display="block";
    });

});

/* 🔥 GUARDAR TIPO PRO */
function seleccionar(tipo){

    const user = firebase.auth().currentUser;

    if(!user){
        alert("Sesión expirada");
        window.location.href="login.html";
        return;
    }

    db.collection("usuarios").doc(user.uid).set({
        tipo: tipo,
        email: user.email,
        fecha: new Date()
    }, { merge:true })
    .then(()=>{

        if(tipo==="persona"){
            window.location.href="cliente.html";
        }else{
            window.location.href="comercio.html";
        }

    })
    .catch(()=>{
        alert("Error guardando datos");
    });
}

/* RED ANIMADA */
const canvas = document.getElementById("networkCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points = [];

for(let i=0;i<60;i++){
    points.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        vx:(Math.random()-0.5)*0.5,
        vy:(Math.random()-0.5)*0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let i=0;i<points.length;i++){
        let p = points[i];
        p.x += p.vx;
        p.y += p.vy;

        if(p.x<0||p.x>canvas.width) p.vx*=-1;
        if(p.y<0||p.y>canvas.height) p.vy*=-1;

        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fillStyle="#00d2ff";
        ctx.fill();

        for(let j=i;j<points.length;j++){
            let p2 = points[j];
            let dist = Math.hypot(p.x-p2.x,p.y-p2.y);

            if(dist<120){
                ctx.beginPath();
                ctx.moveTo(p.x,p.y);
                ctx.lineTo(p2.x,p2.y);
                ctx.strokeStyle="rgba(0,210,255,0.1)";
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
