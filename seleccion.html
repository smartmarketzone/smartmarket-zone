<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selecciona tu perfil | SmartMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Outfit', sans-serif;
    text-align:center;
    overflow-x:hidden;

    background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
                url('https://images.unsplash.com/photo-1581090700227-68abdf0d169b?auto=format&fit=crop&w=1350&q=80');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

#networkCanvas {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
}

.network-person {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 90px;
    height: 90px;
    background-image: url('https://cdn-icons-png.flaticon.com/512/1946/1946429.png');
    background-size: cover;
    z-index: 2;
    opacity: 0.9;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

.logo {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-top:40px;
    animation: fadeIn 1s ease;
}

.logo-box {
    background: linear-gradient(135deg,#1a73e8,#00d2ff);
    color:white;
    padding:10px;
    border-radius:10px;
    font-weight:900;
}

h1 {
    margin-top:20px;
    animation: fadeIn 1.2s ease;
}

p {
    color:#64748b;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
    padding:40px;
    max-width:900px;
    margin:auto;
}

.card {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    border-radius:20px;
    padding:20px;
    cursor:pointer;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    transition: all 0.4s ease;
    overflow: hidden;
    position: relative;
}

.card::before {
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background: linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
    transition:0.6s;
}

.card:hover::before {
    left:100%;
}

.card:hover {
    transform:translateY(-12px) scale(1.03);
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.img {
    height:150px;
    border-radius:15px;
    margin-bottom:15px;
    background-size: cover;
    background-position: center;
}

.img-persona {
    background-image: url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?auto=format&fit=crop&w=500&q=80');
}

.img-comercio {
    background-image: url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&w=500&q=80');
}

#mainContent {
    position: relative;
    z-index: 3;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<canvas id="networkCanvas"></canvas>
<div class="network-person"></div>

<div id="mainContent" style="display:none;">

<div class="logo">
    <div class="logo-box">SM</div>
    <h2>SmartMarket</h2>
</div>

<h1>¿Cómo quieres usar SmartMarket?</h1>
<p>Selecciona la opción que mejor se adapte a ti</p>

<div class="grid">

    <div class="card" onclick="seleccionar('persona')">
        <div class="img img-persona"></div>
        <h3>Soy Persona</h3>
        <p>Encuentra productos, compara precios y compra mejor.</p>
    </div>

    <div class="card" onclick="seleccionar('comercio')">
        <div class="img img-comercio"></div>
        <h3>Soy Comercio</h3>
        <p>Publica tu inventario y atrae clientes cercanos.</p>
    </div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
  authDomain: "smartmarket-zone-e7559.firebaseapp.com",
  projectId: "smartmarket-zone-e7559"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const db = firebase.firestore();

document.addEventListener("DOMContentLoaded", function() {
    const mainContent = document.getElementById("mainContent");

    firebase.auth().onAuthStateChanged(function(user) {
        if (user) {
            db.collection("usuarios").doc(user.uid).get()
            .then((doc) => {
                if (doc.exists && doc.data().tipo) {
                    window.location.href = "app.html";
                } else {
                    mainContent.style.display = "block";
                }
            })
            .catch(() => mainContent.style.display = "block");
        } else {
            mainContent.style.display = "block";
        }
    });
});

/* 🔥 FUNCIÓN CORREGIDA (ÚNICO CAMBIO) */
function seleccionar(tipo){

    firebase.auth().onAuthStateChanged(function(user) {

        if(user){
            db.collection("usuarios").doc(user.uid).set({
                tipo: tipo
            }, { merge: true })
            .then(() => {

                localStorage.setItem("tipoUsuario", tipo);

                window.location.href = "app.html";

            });

        } else {
            alert("Usuario no autenticado");
        }

    });

}

/* RED ANIMADA */
const canvas = document.getElementById("networkCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points = [];

for(let i=0;i<60;i++){
    points.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        vx:(Math.random()-0.5)*0.5,
        vy:(Math.random()-0.5)*0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let i=0;i<points.length;i++){
        let p = points[i];
        p.x += p.vx;
        p.y += p.vy;

        if(p.x<0||p.x>canvas.width) p.vx*=-1;
        if(p.y<0||p.y>canvas.height) p.vy*=-1;

        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fillStyle="#1a73e8";
        ctx.fill();

        for(let j=i;j<points.length;j++){
            let p2 = points[j];
            let dist = Math.hypot(p.x-p2.x,p.y-p2.y);

            if(dist<120){
                ctx.beginPath();
                ctx.moveTo(p.x,p.y);
                ctx.lineTo(p2.x,p2.y);
                ctx.strokeStyle="rgba(26,115,232,0.2)";
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
