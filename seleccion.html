<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selecciona tu perfil | SmartMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Outfit', sans-serif;
    background:#f8fafc;
    text-align:center;

    /* 🔥 FONDO MEJORADO (más moderno y tecnológico) */
    background-image: linear-gradient(rgba(248, 250, 252, 0.85), rgba(248, 250, 252, 0.85)), 
                      url('https://c.pxhere.com/images/63/63/c7c823330ec7d376ef4a7e896dd3-1451419.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* LOGO */
.logo {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-top:40px;
}

.logo-box {
    background: linear-gradient(135deg,#1a73e8,#00d2ff);
    color:white;
    padding:10px;
    border-radius:10px;
    font-weight:900;
}

/* TEXTO */
h1 {
    margin-top:20px;
}

p {
    color:#64748b;
}

/* OPCIONES */
.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
    padding:40px;
    max-width:900px;
    margin:auto;
}

.card {
    background:white;
    border-radius:20px;
    padding:20px;
    cursor:pointer;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    transition:0.3s;
    overflow: hidden;
}

.card:hover {
    transform:translateY(-10px);
}

/* IMAGEN */
.img {
    height:150px;
    border-radius:15px;
    margin-bottom:15px;
    background:#e2e8f0;
    background-size: cover;
    background-position: center;
}

/* 🔥 IMÁGENES CORREGIDAS (más coherentes con app) */
/* Persona usando app móvil */
.img-persona {
    background-image: url('https://img.freepik.com/vector-gratis/persona-usando-aplicacion-movil-compras-online_23-2148828409.jpg');
}

/* Comercio digital / tienda online */
.img-comercio {
    background-image: url('https://img.freepik.com/vector-gratis/concepto-tienda-online_23-2148626838.jpg');
}

/* BOTÓN */
button {
    margin-top:30px;
    padding:15px 40px;
    border:none;
    background:#0f172a;
    color:white;
    border-radius:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="logo">
    <div class="logo-box">SM</div>
    <h2>SmartMarket</h2>
</div>

<h1>¿Cómo quieres usar SmartMarket?</h1>
<p>Selecciona la opción que mejor se adapte a ti</p>

<div class="grid">

    <div class="card" onclick="seleccionar('persona')">
        <div class="img img-persona"></div>
        <h3>Soy Persona</h3>
        <p>Encuentra productos, compara precios y compra mejor.</p>
    </div>

    <div class="card" onclick="seleccionar('comercio')">
        <div class="img img-comercio"></div>
        <h3>Soy Comercio</h3>
        <p>Publica tu inventario y atrae clientes cercanos.</p>
    </div>

</div>

<script>

/* 🔥 NUEVO: SI YA ELIGIÓ, NO VUELVE AQUÍ */
document.addEventListener("DOMContentLoaded", function() {
    const tipo = localStorage.getItem("tipoUsuario");

    if (tipo) {
        window.location.href = "app.html";
    }
});

/* TU FUNCIÓN ORIGINAL + GUARDADO */
function seleccionar(tipo){
    localStorage.setItem("tipoUsuario", tipo);
    window.location.href = "app.html";
}

</script>

</body>
</html>
