<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selecciona tu perfil | SmartMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Outfit', sans-serif;
    text-align:center;

    /* 🔥 Nuevo fondo alusivo a compras/marketplace */
    background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)),
                url('https://images.unsplash.com/photo-1581090700227-68abdf0d169b?auto=format&fit=crop&w=1350&q=80');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* LOGO */
.logo {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-top:40px;
}

.logo-box {
    background: linear-gradient(135deg,#1a73e8,#00d2ff);
    color:white;
    padding:10px;
    border-radius:10px;
    font-weight:900;
}

/* TEXTO */
h1 {
    margin-top:20px;
}

p {
    color:#64748b;
}

/* OPCIONES */
.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
    padding:40px;
    max-width:900px;
    margin:auto;
}

.card {
    background:white;
    border-radius:20px;
    padding:20px;
    cursor:pointer;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    transition:0.3s;
    overflow: hidden;
}

.card:hover {
    transform:translateY(-10px);
}

/* IMAGEN */
.img {
    height:150px;
    border-radius:15px;
    margin-bottom:15px;
    background:#e2e8f0;
    background-size: cover;
    background-position: center;
}

/* NUEVAS IMÁGENES MÁS ALUSIVAS */
/* Persona usando app móvil */
.img-persona {
    background-image: url('https://images.unsplash.com/photo-1580894894518-3b473a6f6ee5?auto=format&fit=crop&w=500&q=80');
    background-size: cover;
    background-position: center;
}

/* Comercio digital / tienda online */
.img-comercio {
    background-image: url('https://images.unsplash.com/photo-1581091012184-94c2ee7e2450?auto=format&fit=crop&w=500&q=80');
    background-size: cover;
    background-position: center;
}

/* BOTÓN */
button {
    margin-top:30px;
    padding:15px 40px;
    border:none;
    background:#0f172a;
    color:white;
    border-radius:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔹 CONTENIDO PRINCIPAL, oculto al inicio -->
<div id="mainContent" style="display:none;">

<div class="logo">
    <div class="logo-box">SM</div>
    <h2>SmartMarket</h2>
</div>

<h1>¿Cómo quieres usar SmartMarket?</h1>
<p>Selecciona la opción que mejor se adapte a ti</p>

<div class="grid">

    <div class="card" onclick="seleccionar('persona')">
        <div class="img img-persona"></div>
        <h3>Soy Persona</h3>
        <p>Encuentra productos, compara precios y compra mejor.</p>
    </div>

    <div class="card" onclick="seleccionar('comercio')">
        <div class="img img-comercio"></div>
        <h3>Soy Comercio</h3>
        <p>Publica tu inventario y atrae clientes cercanos.</p>
    </div>

</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// 🔹 Inicializamos Firebase
const firebaseConfig = {
  apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
  authDomain: "smartmarket-zone-e7559.firebaseapp.com",
  projectId: "smartmarket-zone-e7559"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const db = firebase.firestore();

// 🔹 Mostrar contenido solo si el usuario no tiene tipo definido
document.addEventListener("DOMContentLoaded", function() {
    const mainContent = document.getElementById("mainContent");

    firebase.auth().onAuthStateChanged(function(user) {
        if (user) {
            db.collection("usuarios").doc(user.uid).get()
            .then((doc) => {
                if (doc.exists && doc.data().tipo) {
                    // Usuario ya eligió tipo → ir directo a app
                    window.location.href = "app.html";
                } else {
                    // Usuario sin tipo → mostrar selección
                    mainContent.style.display = "block";
                }
            })
            .catch((error) => {
                console.error("Error verificando tipo:", error);
                mainContent.style.display = "block"; // mostrar por seguridad
            });
        } else {
            // No hay usuario logueado → mostrar selección
            mainContent.style.display = "block";
        }
    });
});

// 🔹 Función original de selección
function seleccionar(tipo){
    localStorage.setItem("tipoUsuario", tipo);
    window.location.href = "app.html";
}
</script>

</body>
</html>
