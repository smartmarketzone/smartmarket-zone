<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartMarket - Acceso</title>

<link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">

<div class="card">
    <h1 class="logo">Smart<span>Market</span></h1>

    <p style="font-size:12px; opacity:0.8;">
        Encuentra productos, precios y comercios en toda Venezuela 🇻🇪
    </p>

    <input type="email" id="regEmail" placeholder="Correo">
    <input type="password" id="regPass" placeholder="Contraseña">

    <button class="btn-primary" onclick="login()">INICIAR SESIÓN</button>

    <p style="margin-top:15px; font-size:12px;">
        ¿No tienes cuenta? 
        <a href="register.html" style="color:#4fc3f7;">Crear cuenta</a>
    </p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
 authDomain: "smartmarket-zone-e7559.firebaseapp.com",
 projectId: "smartmarket-zone-e7559"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

function login(){
    const email = document.getElementById("regEmail").value;
    const pass = document.getElementById("regPass").value;

    firebase.auth().signInWithEmailAndPassword(email, pass)
    .then(()=> window.location.href="tipo.html")
    .catch(e => alert(e.message));
}
</script>

</body>
</html>
