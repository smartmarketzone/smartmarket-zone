<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Outfit',sans-serif;
    overflow:hidden;
    position:relative;
}

/* 🌍 FONDO */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
        linear-gradient(rgba(15,32,39,0.85), rgba(32,58,67,0.85)),
        url('https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=1600&q=80');
    background-size:cover;
    background-position:center;
    z-index:-2;
}

/* ✨ RED */
canvas{
    position:absolute;
    width:100%;
    height:100%;
    z-index:-1;
}

/* 🧊 CARD */
.card{
    width:90%;
    max-width:360px;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    text-align:center;
}

/* LOGO */
.logo{
    font-size:30px;
    font-weight:900;
    color:white;
}
.logo span{
    color:#00d2ff;
}

/* TEXTOS */
.bienvenida{
    color:#00d2ff;
    font-size:14px;
    margin-bottom:10px;
}
.sub-text{
    color:#cbd5e1;
    font-size:12px;
    margin-bottom:20px;
}

/* INPUT */
.input-group{
    position:relative;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.15);
    color:white;
}

input::placeholder{
    color:#cbd5e1;
}

/* 👁 */
.toggle-pass{
    position:absolute;
    right:10px;
    top:12px;
    cursor:pointer;
    color:#cbd5e1;
}

/* BOTÓN */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#1a73e8,#00d2ff);
    color:white;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}
.btn:hover{
    transform:scale(1.05);
}

/* LINK */
a{
    color:#00d2ff;
    text-decoration:none;
}
</style>
</head>

<body>

<canvas id="network"></canvas>

<div class="card">
    <h1 class="logo">Smart<span>Market</span></h1>

    <p id="bienvenida" class="bienvenida">Detectando ubicación...</p>
    <p class="sub-text">Encuentra lo que necesitas al mejor precio cerca de ti</p>

    <input type="email" id="email" placeholder="Correo">

    <div class="input-group">
        <input type="password" id="password" placeholder="Contraseña">
        <span class="toggle-pass" onclick="togglePass()">👁</span>
    </div>

    <button class="btn" onclick="login()">INICIAR SESIÓN</button>

    <p style="margin-top:15px;font-size:12px;">
        ¿No tienes cuenta?
        <a href="register.html">Regístrate</a>
    </p>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
    authDomain: "smartmarket-zone-e7559.firebaseapp.com",
    projectId: "smartmarket-zone-e7559"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const db = firebase.firestore();

/* 👁 VER CONTRASEÑA */
function togglePass(){
    const p = document.getElementById("password");
    p.type = p.type === "password" ? "text" : "password";
}

/* 🔐 LOGIN INTELIGENTE */
function login(){

    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value.trim();

    if(!email || !pass){
        alert("Por favor completa todos los campos");
        return;
    }

    firebase.auth().signInWithEmailAndPassword(email, pass)
    .then((cred)=>{

        const user = cred.user;

        db.collection("usuarios").doc(user.uid).get()
        .then(doc=>{

            if(doc.exists && doc.data().tipo){

                if(doc.data().tipo === "persona"){
                    window.location.href = "cliente.html";
                }else{
                    window.location.href = "comercio.html";
                }

            }else{
                window.location.href = "seleccion.html";
            }

        });

    })
    .catch(e=>{
        console.error(e);
        alert("Error: " + e.message);
    });
}

/* 🔁 AUTO LOGIN CONTROLADO */
firebase.auth().onAuthStateChanged(function(user) {
    if (user) {

        db.collection("usuarios").doc(user.uid).get()
        .then(doc=>{

            if(doc.exists && doc.data().tipo){

                if(doc.data().tipo === "persona"){
                    window.location.href = "cliente.html";
                }else{
                    window.location.href = "comercio.html";
                }

            }

        });

    }
});

/* 🌍 UBICACIÓN */
const txt = document.getElementById("bienvenida");

if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(async pos=>{
        const lat=pos.coords.latitude;
        const lon=pos.coords.longitude;

        try{
            const res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
            const data=await res.json();

            txt.innerText="Bienvenido a "+(data.address.city || data.address.state || "tu zona");
        }catch{
            txt.innerText="Bienvenido";
        }
    });
}

/* ✨ RED ANIMADA */
const canvas=document.getElementById("network");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let points=[];
for(let i=0;i<50;i++){
    points.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        vx:(Math.random()-0.5)*0.5,
        vy:(Math.random()-0.5)*0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    points.forEach(p=>{
        p.x+=p.vx;
        p.y+=p.vy;

        if(p.x<0||p.x>canvas.width) p.vx*=-1;
        if(p.y<0||p.y>canvas.height) p.vy*=-1;

        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fillStyle="#00d2ff";
        ctx.fill();

        points.forEach(p2=>{
            let d=Math.hypot(p.x-p2.x,p.y-p2.y);
            if(d<120){
                ctx.beginPath();
                ctx.moveTo(p.x,p.y);
                ctx.lineTo(p2.x,p2.y);
                ctx.strokeStyle="rgba(0,210,255,0.1)";
                ctx.stroke();
            }
        });
    });

    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
