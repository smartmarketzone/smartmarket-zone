<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Inteligente</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Montserrat', sans-serif;
}

/* MAPA */
#map {
    height:100vh;
    width:100%;
}

/* BOTÓN VOLVER */
.btn-back {
    position:absolute;
    top:15px;
    left:15px;
    z-index:1000;
    background:white;
    padding:10px 15px;
    border-radius:10px;
    font-weight:900;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* BOTÓN GPS */
.btn-gps {
    position:absolute;
    top:15px;
    right:15px;
    z-index:1000;
    background:#1e88e5;
    color:white;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
    font-size:18px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="btn-back" onclick="volver()">⬅ VOLVER</div>
<div class="btn-gps" onclick="irMiUbicacion()">📍</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
    authDomain: "smartmarket-zone-e7559.firebaseapp.com",
    projectId: "smartmarket-zone-e7559"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* MAPA */
let map = L.map('map').setView([10.48, -66.90], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userMarker;

/* UBICACIÓN AUTOMÁTICA */
navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    map.setView([lat, lng], 15);

    userMarker = L.marker([lat, lng]).addTo(map)
        .bindPopup("📍 Estás aquí")
        .openPopup();

    cargarComercios(lat, lng);

}, () => {
    alert("Activa el GPS para mejores resultados");
    cargarComercios();
});

/* CARGAR TIENDAS */
async function cargarComercios(userLat = null, userLng = null){

    const snap = await db.collection("comercios").get();

    snap.forEach(doc => {
        const c = doc.data();

        // FILTRO POR CERCANÍA (opcional simple)
        if(userLat && userLng){
            const distancia = calcularDistancia(userLat, userLng, c.lat, c.lng);
            if(distancia > 10) return; // máximo 10km
        }

        const marker = L.marker([c.lat, c.lng]).addTo(map);

        marker.bindPopup(`
            <b>${c.nombre}</b><br>
            🕒 ${c.abre} - ${c.cierra}<br><br>
            <button onclick="verCatalogo('${doc.id}')" style="padding:8px;border:none;background:#1e88e5;color:white;border-radius:8px;cursor:pointer;">
                VER CATÁLOGO
            </button>
        `);
    });
}

/* DISTANCIA (KM) */
function calcularDistancia(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;

    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;
}

/* BOTONES */
function volver(){
    window.location.href = "cliente.html";
}

function irMiUbicacion(){
    map.locate({setView:true, maxZoom:16});
}

/* IR A CATÁLOGO */
function verCatalogo(id){
    window.location.href = "catalogo.html?comercio=" + id;
}
</script>

</body>
</html>
