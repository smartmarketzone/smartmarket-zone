<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartMarket Venezuela - Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #1e88e5; --cyan: #4fc3f7; --dark: #0f2027; --yellow: #ffeb3b; }
        body {
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif;
            background: var(--dark); color: white;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #1e3c72 0%, #0f2027 100%);
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            padding: 40px 30px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            text-align: center;
        }

        h1 { font-weight: 900; color: var(--cyan); margin-bottom: 5px; font-size: 26px; letter-spacing: -1px; }
        p { font-size: 11px; opacity: 0.7; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }

        .input-group { margin-bottom: 20px; text-align: left; position: relative; }
        label { display: block; font-size: 10px; font-weight: 900; color: var(--cyan); margin-bottom: 8px; text-transform: uppercase; }
        
        input, select {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.4); color: white; font-family: 'Montserrat'; outline: none; box-sizing: border-box;
            transition: 0.3s; font-size: 14px;
        }

        input:focus { border-color: var(--yellow); box-shadow: 0 0 15px rgba(255, 235, 59, 0.2); }

        .eye-icon {
            position: absolute; right: 15px; top: 38px; 
            cursor: pointer; color: var(--cyan); font-size: 20px;
            z-index: 10; user-select: none;
        }

        .btn-auth {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            background: var(--blue); color: white; font-weight: 900; cursor: pointer;
            margin-top: 15px; transition: 0.4s; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(30, 136, 229, 0.3);
        }
        .btn-auth:hover { background: #1565c0; transform: translateY(-3px); box-shadow: 0 15px 25px rgba(30, 136, 229, 0.5); }

        .toggle-text { font-size: 11px; margin-top: 25px; cursor: pointer; color: var(--yellow); font-weight: 800; text-decoration: underline; }
        
        #extraFields { display: none; margin-bottom: 20px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="auth-card">
    <h1 id="authTitle">BIENVENIDO</h1>
    <p id="authDesc">Accede a la red comercial de Venezuela</p>

    <div id="extraFields">
        <div class="input-group">
            <label>Tu Nombre Real</label>
            <input type="text" id="userName" placeholder="Ej: Gabriel Castro">
        </div>
        <div class="input-group">
            <label>¿Qué buscas hoy?</label>
            <select id="userType">
                <option value="persona">Soy Cliente (Quiero comprar)</option>
                <option value="comercio">Soy Comercio (Quiero vender)</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <label>Correo Electrónico</label>
        <input type="email" id="userEmail" placeholder="tu@correo.com">
    </div>

    <div class="input-group">
        <label>Contraseña</label>
        <input type="password" id="userPass" placeholder="••••••••" style="padding-right: 50px;">
        <span class="eye-icon" id="toggleEye" onclick="mostrarClave()">👁️</span>
    </div>

    <button class="btn-auth" id="btnMain" onclick="authAccion()">Entrar al Sistema</button>

    <div class="toggle-text" id="btnToggle" onclick="toggleAuth()">¿Nuevo en la app? Crea tu cuenta</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let esRegistro = false;
    const ADMIN_EMAIL = "gabriel01cvenus@gmail.com";

    function mostrarClave() {
        const passInput = document.getElementById('userPass');
        const eyeIcon = document.getElementById('toggleEye');
        if (passInput.type === "password") {
            passInput.type = "text";
            eyeIcon.innerText = "🔒"; 
        } else {
            passInput.type = "password";
            eyeIcon.innerText = "👁️";
        }
    }

    function toggleAuth() {
        esRegistro = !esRegistro;
        document.getElementById('authTitle').innerText = esRegistro ? "NUEVA CUENTA" : "BIENVENIDO";
        document.getElementById('authDesc').innerText = esRegistro ? "Regístrate en SmartMarket" : "Accede a la red de Venezuela";
        document.getElementById('btnMain').innerText = esRegistro ? "Registrarme" : "Entrar al Sistema";
        document.getElementById('btnToggle').innerText = esRegistro ? "¿Ya tienes cuenta? Inicia sesión" : "¿Nuevo en la app? Crea tu cuenta";
        document.getElementById('extraFields').style.display = esRegistro ? "block" : "none";
    }

    async function authAccion() {
        const email = document.getElementById('userEmail').value.trim();
        const pass = document.getElementById('userPass').value.trim();
        const nombre = document.getElementById('userName').value.trim();
        const tipo = document.getElementById('userType').value;

        if (!email || !pass) return alert("⚠️ Ingresa correo y contraseña.");

        try {
            if (esRegistro) {
                if (!nombre) return alert("⚠️ Escribe tu nombre para el registro.");
                const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
                await db.collection("usuarios").doc(userCredential.user.uid).set({
                    nombre: nombre,
                    email: email,
                    tipo: tipo,
                    creado: new Date()
                });
                redirigir(email, tipo);
            } else {
                const userCredential = await auth.signInWithEmailAndPassword(email, pass);
                const doc = await db.collection("usuarios").doc(userCredential.user.uid).get();
                if (doc.exists) {
                    redirigir(email, doc.data().tipo);
                } else {
                    redirigir(email, "persona");
                }
            }
        } catch (error) {
            alert("❌ Error: " + error.message);
        }
    }

    function redirigir(email, tipo) {
        // LÓGICA DE REDIRECCIÓN MAESTRA
        if (email === ADMIN_EMAIL) {
            window.location.href = "admin.html";
        } else if (tipo === "comercio") {
            // Si es comercio pero no tiene local registrado, debería ir a registro_comercio
            // Por simplicidad, lo mandamos al panel y el panel decidirá
            window.location.href = "comercio.html";
        } else {
            window.location.href = "index.html";
        }
    }
</script>

</body>
</html>
