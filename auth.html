<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartMarket - Entrar</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif;
            background: #0f2027; color: white;
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            padding: 40px 30px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { font-weight: 900; color: #4fc3f7; margin-bottom: 10px; font-size: 24px; }
        p { font-size: 11px; opacity: 0.7; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; text-align: left; position: relative; }
        label { display: block; font-size: 10px; font-weight: 900; color: #4fc3f7; margin-bottom: 5px; text-transform: uppercase; }
        
        input, select {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3); color: white; font-family: 'Montserrat'; outline: none; box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: #4fc3f7; background: rgba(0,0,0,0.5); }

        /* Icono del Ojo para la Clave */
        .eye-icon {
            position: absolute; right: 12px; top: 32px; 
            cursor: pointer; color: #4fc3f7; font-size: 18px;
            user-select: none; z-index: 10;
        }

        .btn-auth {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: #1e88e5; color: white; font-weight: 900; cursor: pointer;
            margin-top: 10px; transition: 0.3s; text-transform: uppercase;
        }
        .btn-auth:hover { background: #1565c0; transform: translateY(-2px); }

        .toggle-text { font-size: 11px; margin-top: 20px; cursor: pointer; color: #ffeb3b; font-weight: 700; text-decoration: underline; }
        
        #extraFields { display: none; margin-bottom: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
    </style>
</head>
<body>

<div class="auth-card">
    <h1 id="authTitle">HOLA DE NUEVO</h1>
    <p id="authDesc">Inicia sesión para continuar en San Joaquín</p>

    <div id="extraFields">
        <div class="input-group">
            <label>Nombre Completo</label>
            <input type="text" id="userName" placeholder="Ej: Juan Pérez">
        </div>
        <div class="input-group">
            <label>Tipo de Usuario</label>
            <select id="userType">
                <option value="persona">Soy Persona (Comprador)</option>
                <option value="comercio">Soy Comercio (Vendedor)</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <label>Correo Electrónico</label>
        <input type="email" id="userEmail" placeholder="correo@ejemplo.com">
    </div>

    <div class="input-group">
        <label>Contraseña</label>
        <input type="password" id="userPass" placeholder="••••••••" style="padding-right: 45px;">
        <span class="eye-icon" id="toggleEye" onclick="mostrarClave()">👁️</span>
    </div>

    <button class="btn-auth" id="btnMain" onclick="authAccion()">Entrar</button>

    <div class="toggle-text" id="btnToggle" onclick="toggleAuth()">¿No tienes cuenta? Regístrate aquí</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let esRegistro = false;

    // Función para ver/ocultar clave
    function mostrarClave() {
        const passInput = document.getElementById('userPass');
        const eyeIcon = document.getElementById('toggleEye');
        if (passInput.type === "password") {
            passInput.type = "text";
            eyeIcon.innerText = "🔒"; 
        } else {
            passInput.type = "password";
            eyeIcon.innerText = "👁️";
        }
    }

    // Cambiar entre Login y Registro
    function toggleAuth() {
        esRegistro = !esRegistro;
        document.getElementById('authTitle').innerText = esRegistro ? "CREAR CUENTA" : "HOLA DE NUEVO";
        document.getElementById('authDesc').innerText = esRegistro ? "Únete a la red comercial de San Joaquín" : "Inicia sesión para continuar";
        document.getElementById('btnMain').innerText = esRegistro ? "Registrarme" : "Entrar";
        document.getElementById('btnToggle').innerText = esRegistro ? "¿Ya tienes cuenta? Inicia sesión" : "¿No tienes cuenta? Regístrate aquí";
        document.getElementById('extraFields').style.display = esRegistro ? "block" : "none";
    }

    async function authAccion() {
        const email = document.getElementById('userEmail').value.trim();
        const pass = document.getElementById('userPass').value.trim();
        const nombre = document.getElementById('userName').value.trim();
        const tipo = document.getElementById('userType').value;

        if (!email || !pass) return alert("⚠️ Por favor, ingresa correo y contraseña.");
        if (esRegistro && !nombre) return alert("⚠️ Por favor, ingresa tu nombre.");

        try {
            if (esRegistro) {
                // PROCESO DE REGISTRO
                const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
                const user = userCredential.user;
                
                // Guardar perfil extendido en Firestore
                await db.collection("usuarios").doc(user.uid).set({
                    nombre: nombre,
                    email: email,
                    tipo: tipo,
                    creado: new Date()
                });

                alert("✅ ¡Cuenta creada con éxito!");

                // Redirección inteligente al registrarse
                if (tipo === "comercio") {
                    window.location.href = "registro_comercio.html";
                } else {
                    window.location.href = "index.html";
                }

            } else {
                // PROCESO DE LOGIN
                const userCredential = await auth.signInWithEmailAndPassword(email, pass);
                const user = userCredential.user;

                // Verificar qué tipo de usuario es para mandarlo a su sitio
                const doc = await db.collection("usuarios").doc(user.uid).get();
                
                if (doc.exists) {
                    const data = doc.data();
                    if (data.tipo === "comercio") {
                        window.location.href = "comercio.html";
                    } else {
                        window.location.href = "index.html";
                    }
                } else {
                    // Si no tiene perfil creado aún (usuarios viejos), mandarlo al mapa
                    window.location.href = "index.html";
                }
            }
        } catch (error) {
            let mensaje = "Error en la autenticación";
            if (error.code === "auth/weak-password") mensaje = "La contraseña debe tener al menos 6 caracteres.";
            if (error.code === "auth/email-already-in-use") mensaje = "Este correo ya está registrado.";
            if (error.code === "auth/user-not-found") mensaje = "Usuario no encontrado.";
            if (error.code === "auth/wrong-password") mensaje = "Contraseña incorrecta.";
            alert("❌ " + mensaje);
        }
    }
</script>

</body>
</html>
