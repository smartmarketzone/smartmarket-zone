<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso | SmartMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Outfit', sans-serif;
    background:linear-gradient(135deg,#1a73e8,#00d2ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:white;
    padding:30px;
    border-radius:20px;
    width:320px;
    text-align:center;
}

h1 {
    margin-bottom:10px;
}

input {
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #ddd;
}

button {
    width:100%;
    padding:12px;
    border:none;
    background:#1a73e8;
    color:white;
    border-radius:10px;
    margin-top:10px;
    cursor:pointer;
}

.toggle {
    margin-top:15px;
    font-size:14px;
    cursor:pointer;
    color:#1a73e8;
}

.roles {
    display:flex;
    gap:10px;
    margin-top:10px;
}

.role {
    flex:1;
    padding:10px;
    border-radius:10px;
    background:#f1f5f9;
    cursor:pointer;
}
.selected {
    background:#1a73e8;
    color:white;
}
</style>
</head>

<body>

<div class="box">
    <h1 id="titulo">Iniciar sesión</h1>

    <div class="roles">
        <div class="role selected" onclick="seleccionar(this)">Persona</div>
        <div class="role" onclick="seleccionar(this)">Comercio</div>
    </div>

    <input type="text" placeholder="Correo">
    <input type="password" placeholder="Contraseña">

    <button onclick="entrar()">Continuar</button>

    <div class="toggle" onclick="toggleModo()">
        ¿No tienes cuenta? Regístrate
    </div>
</div>

<script>
let registro = false;

function toggleModo(){
    registro = !registro;
    document.getElementById("titulo").innerText = registro ? "Registrarse" : "Iniciar sesión";
}

function seleccionar(el){
    document.querySelectorAll(".role").forEach(r => r.classList.remove("selected"));
    el.classList.add("selected");
}

function entrar(){
    localStorage.setItem("usuarioLogueado","true");
    window.location.href = "app.html";
}
</script>

</body>
</html>
