<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartMarket VZLA - Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #1e88e5; --cyan: #4fc3f7; --dark: #0f2027; --yellow: #ffeb3b; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .auth-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); width: 90%; max-width: 400px; text-align: center; }
        h1 { font-weight: 900; color: var(--cyan); margin: 0; font-size: 24px; }
        p { font-size: 10px; opacity: 0.6; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group { margin-bottom: 15px; text-align: left; position: relative; }
        label { display: block; font-size: 10px; font-weight: 900; color: var(--cyan); margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-family: 'Montserrat'; outline: none; box-sizing: border-box; }
        .btn-auth { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--blue); color: white; font-weight: 900; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-auth:hover { background: #1565c0; transform: translateY(-2px); }
        .toggle-text { font-size: 11px; margin-top: 20px; cursor: pointer; color: var(--yellow); font-weight: 700; }
        #extraFields { display: none; }
    </style>
</head>
<body>

<div class="auth-card">
    <h1 id="authTitle">SMARTMARKET</h1>
    <p id="authDesc">Acceso Nacional Venezuela</p>

    <div id="extraFields">
        <div class="input-group">
            <label>Nombre Completo</label>
            <input type="text" id="userName" placeholder="Nombre Apellido">
        </div>
        <div class="input-group">
            <label>Tipo de Cuenta</label>
            <select id="userType">
                <option value="persona">Persona Natural</option>
                <option value="comercio">Comercio / Tienda</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <label>Correo Electrónico</label>
        <input type="email" id="userEmail" placeholder="admin@ejemplo.com">
    </div>

    <div class="input-group">
        <label>Contraseña</label>
        <input type="password" id="userPass" placeholder="••••••••">
    </div>

    <button class="btn-auth" id="btnMain" onclick="authAccion()">Entrar</button>
    <div class="toggle-text" id="btnToggle" onclick="toggleAuth()">¿No tienes cuenta? Regístrate</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA6tYooh4CtX7ww9GRyXWhuakl2nLovtsY",
        authDomain: "smartmarket-zone-e7559.firebaseapp.com",
        projectId: "smartmarket-zone-e7559"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let esRegistro = false;
    const ADMIN_EMAIL = "gabriel01cvenus@gmail.com";

    function toggleAuth() {
        esRegistro = !esRegistro;
        document.getElementById('authTitle').innerText = esRegistro ? "REGISTRO" : "SMARTMARKET";
        document.getElementById('extraFields').style.display = esRegistro ? "block" : "none";
        document.getElementById('btnMain').innerText = esRegistro ? "Crear Cuenta" : "Entrar";
        document.getElementById('btnToggle').innerText = esRegistro ? "¿Ya tienes cuenta? Inicia Sesión" : "¿No tienes cuenta? Regístrate";
    }

    async function authAccion() {
        const email = document.getElementById('userEmail').value.trim();
        const pass = document.getElementById('userPass').value.trim();
        const nombre = document.getElementById('userName').value.trim();
        const tipo = document.getElementById('userType').value;

        if (!email || !pass) return alert("Completa los campos.");

        try {
            if (esRegistro) {
                if(!nombre) return alert("Escribe tu nombre.");
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.collection("usuarios").doc(res.user.uid).set({ nombre, email, tipo, creado: new Date() });
                redirigir(email, tipo);
            } else {
                const res = await auth.signInWithEmailAndPassword(email, pass);
                const doc = await db.collection("usuarios").doc(res.user.uid).get();
                redirigir(email, doc.exists ? doc.data().tipo : 'persona');
            }
        } catch (e) { alert("Error: " + e.message); }
    }

    function redirigir(email, tipo) {
        if (email === ADMIN_EMAIL) window.location.href = "admin.html";
        else if (tipo === "comercio") window.location.href = "comercio.html";
        else window.location.href = "index.html";
    }
</script>
</body>
</html>
