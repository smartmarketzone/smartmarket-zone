<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso | SmartMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">

<style>
:root {
    --blue:#1a73e8;
    --accent:#00d2ff;
    --dark:#0f172a;
}

/* FONDO REAL TIPO RED */
body {
    margin:0;
    font-family:'Outfit', sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    overflow:hidden;
}

/* EFECTO RED */
.network {
    position:absolute;
    width:100%;
    height:100%;
    background:
        radial-gradient(circle at 20% 30%, rgba(0,210,255,0.3) 2px, transparent 2px),
        radial-gradient(circle at 70% 60%, rgba(26,115,232,0.3) 2px, transparent 2px),
        radial-gradient(circle at 40% 80%, rgba(0,210,255,0.3) 2px, transparent 2px);
    background-size: 200px 200px;
}

/* LÍNEAS */
.network::after {
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 80px 80px;
}

/* CARD */
.box {
    position:relative;
    background:white;
    padding:35px;
    border-radius:25px;
    width:340px;
    text-align:center;
    box-shadow:0 25px 60px rgba(0,0,0,0.5);
    z-index:10;
}

/* LOGO */
.logo {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

.logo-icon {
    width:35px;
    height:35px;
    border-radius:10px;
    background: linear-gradient(135deg,#1a73e8,#00d2ff);
    display:flex;
    align-items:center;
    justify-content:center;
}

.pin {
    width:10px;
    height:10px;
    background:white;
    border-radius:50%;
    position:relative;
}

.pin::after {
    content:'';
    position:absolute;
    bottom:-6px;
    left:50%;
    transform:translateX(-50%);
    width:4px;
    height:8px;
    background:white;
    border-radius:3px;
}

.logo-text {
    font-weight:900;
    font-size:22px;
}

/* INPUT */
.input-box {
    position:relative;
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    border:1px solid #e5e7eb;
}

/* OJO */
.eye {
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}

/* BOTÓN */
button {
    width:100%;
    padding:14px;
    border:none;
    background:var(--dark);
    color:white;
    border-radius:12px;
    margin-top:10px;
    font-weight:700;
    cursor:pointer;
}

button:hover {
    background:var(--blue);
}

.msg {
    font-size:13px;
    color:red;
}

.toggle {
    margin-top:15px;
    font-size:14px;
    cursor:pointer;
    color:#64748b;
}
</style>
</head>

<body>

<div class="network"></div>

<div class="box">

    <div class="logo">
        <div class="logo-icon"><div class="pin"></div></div>
        <div class="logo-text">SmartMarket</div>
    </div>

    <h1 id="titulo">Iniciar sesión</h1>

    <input id="correo" type="email" placeholder="Correo electrónico">

    <div class="input-box">
        <input id="password" type="password" placeholder="Contraseña">
        <span class="eye" onclick="togglePass()">👁</span>
    </div>

    <button onclick="procesar()">Continuar</button>

    <div class="msg" id="mensaje"></div>

    <div class="toggle" onclick="toggleModo()" id="toggleText">
        ¿No tienes cuenta? Regístrate
    </div>

</div>

<script>
let registro = false;

function togglePass(){
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}

function toggleModo(){
    registro = !registro;

    document.getElementById("titulo").innerText = registro 
        ? "Crear cuenta" 
        : "Iniciar sesión";

    document.getElementById("toggleText").innerText = registro
        ? "¿Ya tienes cuenta? Inicia sesión"
        : "¿No tienes cuenta? Regístrate";

    document.getElementById("mensaje").innerText = "";
}

function procesar(){
    const correo = document.getElementById("correo").value;
    const pass = document.getElementById("password").value;
    const msg = document.getElementById("mensaje");

    if(!correo || !pass){
        msg.innerText = "Completa todos los campos";
        return;
    }

    let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

    if(registro){
        const existe = usuarios.find(u => u.correo === correo);

        if(existe){
            msg.innerText = "Este correo ya está registrado";
            return;
        }

        usuarios.push({correo, pass});
        localStorage.setItem("usuarios", JSON.stringify(usuarios));

        localStorage.setItem("usuarioLogueado","true");

        // 👇 AQUÍ IRÁ LA NUEVA PANTALLA
        window.location.href = "seleccion.html";

    } else {
        const usuario = usuarios.find(u => u.correo === correo && u.pass === pass);

        if(!usuario){
            msg.innerText = "Correo o contraseña incorrectos";
            return;
        }

        localStorage.setItem("usuarioLogueado","true");
        window.location.href = "app.html";
    }
}
</script>

</body>
</html>
