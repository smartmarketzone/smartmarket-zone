<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso | SmartMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Outfit', sans-serif;
    background: linear-gradient(135deg, #1a73e8, #00d2ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: white;
    padding: 40px;
    border-radius: 25px;
    width: 300px;
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #1a73e8;
    color: white;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
    <h1>SmartMarket</h1>

    <input type="text" placeholder="Correo">
    <input type="password" placeholder="Contraseña">

    <button onclick="entrar()">Entrar</button>
</div>

<script>
function entrar() {
    localStorage.setItem("usuarioLogueado", "true");
    window.location.href = "app.html";
}
</script>

</body>
</html>
